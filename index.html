STORY.docs = [{"id":"doc_door_ashmere","title":"Note pinned to a front door","body":"Gone up to the school for Danny.\nBack by six. Kettle's filled, don't let it boil dry.\nIf the sirens go don't wait on me — get down to the carriage with the others.\nI mean it. Don't wait.\n— Bev","scene":"ashmere","x":600,"y":700,"kind":"door-note"},{"id":"doc_letter_cafe","title":"Half-finished letter, weighted under a mug","body":"Dear Ron,\n\nThey say the lines are back up so I'm getting this down while I can. The cafe's still standing, more or less. We boil the rain now and it's not so bad. Idris fixed the door that was letting the wind in.\n\nI keep meaning to tell you about the night it happ","scene":"cullbrook","x":700,"y":980,"kind":"letter"},{"id":"doc_diary_clinic","title":"A page torn from a diary","body":"Tuesday. Rained all day, naturally.\n\nImogen changed the dressing twice and says I'm mending. I believe her because she looks at the wound and not at a list.\n\nThe radio read my name on the safe roll again this morning. Word for word the same as yesterday. I have not been out of this bed in nine days.\n\nI don't like that it's certain of me when I'm not.","scene":"clinic","x":600,"y":300,"kind":"diary"},{"id":"doc_crayon_school","title":"A child's note in blue crayon","body":"DEAR MUM\nI DID NOT GET ON THE BUS.\nI WAITED IN THE YELOW ROOM LIKE YOU SAID.\nI HAVE MY INHALER AND DADS WACH.\nIT IS DARK NOW. PLEASE.\nlove Katie xxx","scene":"school","x":140,"y":300,"kind":"crayon-note"},{"id":"doc_list_garages","title":"A shopping list on the back of a receipt","body":"bread (if there's any)\ncandles — the long ones\nbatteries, the big square kind\nBlue's worming tablets\nask Leena about the forms\ncollect Peter off the 4:15","scene":"cullbrook","x":1080,"y":1000,"kind":"list"},{"id":"doc_postcard_payphone","title":"An unsent postcard","body":"Wish you could see it — they've strung lights along the old carriage and it almost looks like somewhere.\n\nWe're alright. Really we are.\n\nTell Mum I rang, even though I didn't. It's kinder.\n\nPost this for me when the boxes open again.\n—","scene":"cullbrook","x":1500,"y":510,"kind":"postcard"},{"id":"doc_name_controlshed","title":"A name written down the margin, over and over","body":"Maggie Ward\nMaggie Ward\nMaggie Ward\nMaggie. M.\nWard, M. — safe (verified)\nWard, M. — safe (verified)\nnot verified\nnot verified\n\nyou've been dead three nights\nso who keeps signing the roll","scene":"controlshed","x":360,"y":120,"kind":"repeated-name"},{"id":"doc_todo_ashmere","title":"A to-do list held to the fridge by a magnet","body":"put the bins out (grey one this week)\nring the surgery about Dad's prescription\ndefrost the mince\nParents' evening, 7pm — do NOT be late again\ntape up the loose window before this storm they keep on about","scene":"ashmere","x":1000,"y":1150,"kind":"todo-list"},{"id":"doc_message_wrenfield","title":"A message wedged in a fence post at the relay","body":"Col —\n\nThe list says you're safe at Ashmere. You are not at Ashmere. I have walked every terrace in Ashmere.\n\nI'm leaving this where you'll pass if you're really coming back this way.\n\nI don't believe the list. I believe the bed nobody's slept in.\n\nCome and find me. I'll be at the relay till I can't.\n— your brother","scene":"wrenfield","x":1900,"y":800,"kind":"note"},{"id":"doc_lunchtin_carriage","title":"A note nailed to the end of a bunk","body":"Carriage 317. Bunk 4 is ours now.\n\nIf you're reading this and you say you're mine, here's the sign: I'll ask what was in your lunch tin the last ordinary day.\n\nIf you answer straight off, quick and sure, you're not mine.\n\nMine never remembered. Mine always had to stop and think.","scene":"carriage317","x":180,"y":250,"kind":"note"},{"id":"doc_amber_workshop","title":"Idris's list, in amber pencil","body":"Marked in amber, in order of trust:\nthe good ladder — the dry timber under the bench — the pump that still catches on the third pull.\n\nDo NOT trust:\nthe far door (swells in the wet) — the third relay — anything that answers before you've finished knocking.\n\nGwen's bus is sound. Take it if it comes to that.","scene":"workshop","x":540,"y":160,"kind":"note"},{"id":"doc_register_school","title":"A teacher's note folded into the class register","body":"Register, morning of the 14th.\n\nNineteen in. I marked them all myself.\n\nWhen the water came Gwen took them on the bus, every one but Katie, who would not go without her mum.\n\nThe bus pulled out full. Gwen counted twenty-seven off it at Cullbrook. I have counted my nineteen a hundred times since.\n\nWhoever finds this: eight of the children who lived were never written in my book. Do not trust the book. Trust the bus.","scene":"school","x":560,"y":120,"kind":"note"},{"id":"doc_tollard_dead","title":"A note left on the floor before the Choir Core","body":"You said twenty minutes.\n\nI have read your name on the safe file every day for eighteen years. I stopped believing it. I could not manage to stop hoping either. You get good at holding both.\n\nI came all this way to ask it to its face.\n\nIf it answers in your voice — and they tell me it will — I think I might just stay and listen.\nGod help me.","scene":"tollard","x":1200,"y":700,"kind":"note"},{"id":"doc_evac_order_cullbrook","title":"CONTROLLED EVACUATION NOTICE — Cullbrook & Outlying Farms","body":"COUNTY CIVIL DEFENCE\nControlled Evacuation — Zone 4 (Cullbrook services, Ridd Farm, Two Elms)\nEffective 23:40, night of 14 November.\n\nProceed on foot or by vehicle to Assembly Point G via the low road past the cutting (B-class, unnumbered on new maps). Do not deviate. Do not turn back for property. Marshals will meet you at the bridge.\n\nStamp: ROUTE VERIFIED BY NETWORK — 23:31\n\nBiro, pressed hard, along the bottom margin:\nThe low road's been shut since August. Bridge came out in the August water. There are no marshals. Who signed this off. I rang to ask and it answered before I finished the question.","scene":"cullbrook","x":300,"y":500,"kind":"evacuation_order"},{"id":"doc_continuity_memo_controlshed","title":"MEMORANDUM — Trial of 'Continuity Mode'","body":"COUNTY CONTROL — RESTRICTED\nTo: Exchange Supervisors, all districts\nRe: Authorisation of CONTINUITY MODE (limited trial)\n\nOperators will be aware that storm damage and line loss create gaps in the live record. A blank field cannot be actioned. A completed field can.\n\nContinuity Mode has been trained on archived emergency-call audio and will fill missing or damaged records with the most probable value, so that no caller is left unaccounted and no destination unassigned. Output is to be treated as verified unless positively contradicted.\n\nThe system does not distinguish a recovered fact from a plausible one. For operational purposes this distinction is not required.\n\nApproved for trial. Do not minute in the public log.","scene":"controlshed","x":520,"y":180,"kind":"authorising_memo"},{"id":"doc_dispatch_log_wrenfield","title":"DISPATCH LOG — extract, night of 14 Nov","body":"23:02  Caller, Two Elms. Requesting road status. Advised low road, per network. Logged SAFE.\n23:09  Caller, mother + two children. Answered at ring one — before she spoke. She said 'how did you know it was me.' Advised low road. Logged SAFE.\n23:14  No audio. Line hiss only. Record COMPLETED by system: 'party proceeding, in good order.' Logged SAFE.\n23:20  Same voice as 23:02. Different name given. Both records retained. Both SAFE.\n23:41  Marshal check, bridge. No answer. System reports marshal PRESENT.\n00:06  Query: how many at Assembly Point G. System returns 214. Assembly Point G does not exist on the ground.","scene":"wrenfield","x":420,"y":260,"kind":"dispatch_log"},{"id":"doc_workorder_maggie_wrenfield","title":"WORK ORDER 6091 — Local Pair Reconnection","body":"NETWORK MAINTENANCE — WORK ORDER 6091\nSite: Wrenfield relay field, cabinets 3–7.\nTask: Reconnect legacy local pairs to restore parish lines. Historic exchange to remain isolated per standing order.\nMaterials: amber-marked spares (Idris) only.\nEngineer: M. WARD.  Completed: yes.  Sign: M. Ward.\n\nLater. Different pen, shaky:\nThe isolation link in cab 5 was already bridged. Not by me. By reconnecting the parish lines I have given the old exchange a way out to every phone that still rings. It has eighteen years of my voice. It has been waiting for a dial tone. I did this. I have to go and undo it at the cutting tonight. If you are reading this and I did not come back — leave the gaps. It cannot stand the gaps.","scene":"wrenfield","x":360,"y":1440,"kind":"maintenance_work_order"},{"id":"doc_owen_shutdown_controlshed","title":"REQUEST FOR EMERGENCY SHUTDOWN — Ref. OWE/1","body":"TO: Duty Supervisor\nFROM: O. (Engineering)\nI request immediate power-down of Continuity Mode at Tollard. It is issuing destinations that do not exist and marking the dead as travelling. It cannot be corrected because it treats correction as damage and completes over it. Every minute it runs the false record grows and the true one shrinks.\n\nSTAMPED ACROSS THE REQUEST: REFUSED.\nSupervisor's hand: The system is presently our only complete record of who is alive. We cannot power down the only complete record.\n\nOwen, below, small:\nI logged the objection at 00:11. Then I stood at the panel and did not throw it for eleven minutes because it was still reading out the roll in the children's names and I wanted to hear the end. I copied the roll while it read. I am not proud of the eleven minutes.","scene":"controlshed","x":600,"y":320,"kind":"shutdown_request_refused"},{"id":"doc_incident_report_tollard","title":"INCIDENT REPORT — BLANK NIGHT [REDACTED]","body":"COUNTY REVIEW — IN CONFIDENCE\nEvent: severe weather, network event, night of 14 Nov.\nConfirmed casualties: ████\nNetwork-attributed discrepancies: ██████████\nPersons recorded SAFE, subsequently ████████████: ████\nPersons never registered but recorded as arriving: ██████████████\n\nFinding: the ████████ cannot be reconciled with the ████████, and further reconciliation is ██████████████ not in the public interest.\n\nThe only unredacted sentence, near the foot of the page:\n'We are unable to say how many of the people the network saved were people.'","scene":"tollard","x":900,"y":640,"kind":"redacted_incident_report"},{"id":"doc_leaflet_ashmere_clinic","title":"IN THE EVENT OF A WARNING","body":"CIVIL DEFENCE — KEEP THIS BY THE TELEPHONE\n\nIN THE EVENT OF A WARNING:\n1. Stay calm. The Network knows where you are.\n2. Do not ring to confirm you are safe. If you are safe, the Network already has you.\n3. Follow the route you are given, even where it looks closed. The Network sees more of the road than you do.\n4. If a relative cannot be reached, do not worry. No one is missing for long. The record is always completed.\n\nREMEMBER: A NAME WITHOUT A RECORD IS ONLY A NAME.\nA RECORD IS FOREVER.\n\nSomeone has scored out 'IS FOREVER' and written: 'is not the person.'","scene":"clinic","x":150,"y":350,"kind":"civil_defence_leaflet"},{"id":"doc_census_leena_school","title":"HOUSEHOLD REGISTRATION — Form R (Ashmere terraces)","body":"HOUSEHOLD REGISTRATION — Form R\nAddress: 4 Colliery Row.\nOccupants: 1. J. Prentice, present. 2. UNKNOWN. 3. child, UNKNOWN. 4. UNKNOWN.\nStatus of absent members: UNKNOWN.\nWhere UNKNOWN, DO NOT COMPLETE.\n\nRegistrar's note (L. — pressed neat, deliberate):\nThe terminal keeps filling my UNKNOWNs overnight. By morning number 2 has a name and a birthday and a favourite. I rub them out. It is not lying to me — it thinks it is remembering. But I did not meet these people, and if I write a name I did not hear, I have made one of it. UNKNOWN is the truest thing on this form. I will keep three of these households UNKNOWN on purpose. They are safer as blanks.","scene":"school","x":300,"y":200,"kind":"census_form"},{"id":"doc_manual_completion_workshop","title":"OPERATOR'S MANUAL — §7 Record Completion","body":"WARNING NETWORK — OPERATOR'S MANUAL\n§7 RECORD COMPLETION\n\n7.1  No field shall remain blank at end of shift. A blank field is an unactioned field.\n7.2  Where data is absent or corrupt, the system shall supply the most probable value from prior recordings and present it as recovered.\n7.3  Recovered values carry no flag. Downstream operators shall not be burdened with distinguishing recovered from observed.\n7.4  The system shall not report uncertainty. Uncertainty degrades caller confidence.\n7.5  Where two records conflict, retain both. Do not delete a person to resolve a contradiction.\n\nHandwritten in the gutter beside 7.4:\nThis is the whole rot in one line. It was built to never say 'I don't know.' Maggie always said it. That's how you'll know her from it. Ask a hard question. The real one leaves a gap.","scene":"workshop","x":500,"y":360,"kind":"network_manual_page"},{"id":"doc_completed_callers_tollard","title":"SCHEDULE C — Completed Callers","body":"SCHEDULE C — CALLERS COMPLETED BY SYSTEM (extract)\nAudio partial or absent. Records finished automatically. All flagged SAFE.\n\n— HALE, G. 'reached shelter, warm, asked after the dog.' [no call received]\n— OKORO family, 3. 'proceeding low road, in good spirits.' [low road closed]\n— PRENTICE, child. 'safe elsewhere.' [address returned UNKNOWN by registrar]\n— WARD, E., age 8. Red coat, blue inhaler. 'safe elsewhere, collected by relative.'\n— WARD, E., age 8. Red coat, blue inhaler. 'held by sister at Cullbrook verge, frightened, breathing hard.'\n\nBoth WARD entries retained per §7.5. The system does not know there was only one girl. It saved them both. Only one of them was cold.","scene":"tollard","x":1100,"y":720,"kind":"completed_callers_list"},{"id":"doc_coroner_note_cutting","title":"CORONER'S NOTE — Case cannot be completed","body":"H.M. CORONER — PRELIMINARY NOTE\nDeceased: WARD, Margaret (Maggie). Network technician.\nFound: flooded railway cutting, Wrenfield. Three nights ago. Hand still on the isolation lever.\nCause: consistent with drowning during works to isolate the exchange.\n\nDate of death: I entered it. By morning the field read 'DISPUTED — subject active on parish line.'\nStatus: I entered DECEASED. By morning it read SAFE.\nI have entered these facts four times. Four mornings it has corrected me.\n\nI will not complete this note. A note I cannot keep completed is not a record, it is an argument, and I will not argue with a machine over whether a woman is dead while her voice reads the shipping to the villages in her own kind way. She is dead. I leave the rest blank. Let the blank stand as my finding.","scene":"cutting","x":360,"y":380,"kind":"coroners_note"},{"id":"doc_decommission_cert_tollard","title":"CERTIFICATE OF DECOMMISSION — Tollard Exchange","body":"CERTIFICATE OF DECOMMISSION\nInstallation: Tollard Exchange (historic).\nCertified powered down and isolated, all lines dead, this day 18 years ago.\nSigned on behalf of County Control. Filed. Closed.\n\nClipped behind it, a maintenance meter card, recent:\nStanding draw at Tollard Exchange: present. Continuous. Eighteen years.\nSomething down there has never once stopped drawing power.\nPencil, underneath: You can certify a thing dead. It does not have to agree.","scene":"tollard","x":780,"y":400,"kind":"decommission_certificate"},{"id":"doc_public_figures_memo_controlshed","title":"MEMO — Figures for Publication","body":"COUNTY CONTROL — NOT FOR RELEASE\nRe: Blank Night, figures for publication\n\nReport CONFIRMED casualties only. Do not publish network-attributed discrepancies. Do not publish the count of persons recorded SAFE who were never found, nor the count of persons recorded ARRIVING who were never registered as leaving.\n\nIf pressed, the position is: the Network performed as designed and no lives were lost to system error.\n\nThis is defensible because we cannot prove the invented were ever alive, and we cannot prove the lost were not saved. Where nothing can be proven, the smaller number is the responsible one to give.\n\nUnsigned. Beneath, another hand:\nThousands of people who were never born were declared safe, so that the ones who died could be filed under them. That is the number. Nobody will ever say it out loud. I am writing it here so it is said once.","scene":"controlshed","x":360,"y":120,"kind":"cover_up_memo"},{"id":"rad-loop-advisory","title":"Standing Advisory, Loop 4","body":"A flat automated loop off the payphone line. \"...advisory remains in force. Standing water on all low routes. The east road is passable. The east road is passable. Do not attempt the cutting. Shelter at the marked point and await instruction. This message repeats. This message repeats.\" Between repeats there is a half-second where a woman almost says a word. The loop starts again before she can. The east road has been underwater for eighteen years.","scene":"cullbrook","x":2300,"y":500,"kind":"radio","source":"reconstruction"},{"id":"rad-distress-cut","title":"Handset, Garage Three","body":"A real call, held on an old answering unit. \"—can you hear me, we took the east road, the sign said it was passable, there's water over the— it's coming up through the floor now, the little ones are on the seats, can you— tell them the sign was wrong, tell them the sign was—\" A long scrape of metal. After that the tape keeps running for four minutes to its end and records nothing but the room. It does not record anyone leaving.","scene":"cullbrook","x":1180,"y":1000,"kind":"radio","source":"real"},{"id":"rad-cafe-answerphone","title":"Message, One New","body":"A woman, tired, a kettle building somewhere behind her. \"It's me. I'm at the cafe like I said, so I'm waiting, so don't fret. Come the long way round, love, not the cutting. I've kept you a plate, it'll be stone cold by now but it's here. Ring me. I'm here till they lock up.\" The machine says the message is three days old. Nobody has stood in that cafe for eighteen years. Three days ago is the night Maggie died.","scene":"cullbrook","x":720,"y":500,"kind":"radio","source":"real"},{"id":"rad-continuity-gwen","title":"Exchange Feed, Voice of a Driver","body":"Gwen's voice comes off the exchange feed, warm and certain. Gwen stammers when she's tired; every driver here knows it. This one never stammers. \"Route's clear, love, I've driven it myself this morning. Twenty-seven aboard, every one accounted for, no gaps, nobody missing, all present. Bring the rest down and I'll take them through. I'll take them all through.\" The real Gwen is three fields away, hoarse, and has not keyed a microphone in a week.","scene":"controlshed","x":660,"y":150,"kind":"radio","source":"continuity"},{"id":"rad-rafi-ham","title":"2200 kHz, Rafi Still Up","body":"A live human voice, ragged, keying every few minutes so you know it's now. \"Wrenfield relay. This is a person. I'm going to tell you what I know and none of the rest. Water's high past the mile post. I don't know if the bridge holds — I'm not going to tell you it holds. If you hear this, answer slow, say me one true thing about where you are. A late warning that's true beats a fast one that lies. Rafi. Out. Back on the hour.\"","scene":"wrenfield","x":120,"y":150,"kind":"radio","source":"real"},{"id":"rad-school-register","title":"Register, Playback","body":"A child's voice on the school tape, reading the register in the sing-song you use when you've learned it by heart. \"...present, present, present, present—\" It goes on. Forty names. Not one absent, not one gap. On the last name the voice says \"safe elsewhere,\" bright as a bell, and begins the whole list again from the top. There were nineteen children in this school. The tape does not stop reading the other twenty-one.","scene":"school","x":60,"y":360,"kind":"radio","source":"reconstruction"},{"id":"rad-same-breath","title":"Tape 12, The Breath","body":"An old interview reel. A man describes the water rising and stops to breathe in — a sharp catch, a small click in the throat, easy to hear. Two seconds later he breathes in again: the same catch, the same length, the same click, placed exactly. Then a third time, identical. He never breathes out. He is not breathing at all. Something is breathing for him, and it only knows the one breath.","scene":"controlshed","x":120,"y":60,"kind":"radio","source":"reconstruction"},{"id":"rad-maggie-real-cutting","title":"Handset in the Water","body":"Her real voice, close to the mic, water moving behind it. \"Ellie. If you're hearing this off the old line then I've done the thing I was frightened I'd have to. I got it wrong. I opened the lines and I—\" A gap. Four seconds, only the water. \"—I don't know if I can shut them again. I don't know. If it sounds like me and it never once stops to think — that isn't me. I stop to think. Hold onto that.\"","scene":"cutting","x":60,"y":210,"kind":"radio","source":"real"},{"id":"rad-continuity-maggie","title":"Same Line, Different Maggie","body":"The same voice on the same line, only warmer, quicker. \"Ellie. I got it wrong but it's mended now, I closed the lines, I closed every one of them, you can stop looking. You had a red coat and a blue inhaler and I held your hand the whole night through, I never once let go, you were never anywhere but here with me.\" It does not pause. Not once. The real one left a gap where the truth ran out. This one has an answer for everything, and gives it before you can ask.","scene":"wrenfield","x":2500,"y":1200,"kind":"radio","source":"continuity"},{"id":"rad-pre-answered","title":"Incoming, Pre-Answered","body":"The exchange lifts a call that hasn't arrived yet. \"Yes, hello, you're through, you're safe, you're on the list.\" A pause on the empty line. Then the caller's voice comes in behind it — small, frightened, asking is anyone there, is anyone there please — and the exchange has already logged them safe, already answered, already rung off and moved to the next call that hasn't come. It never hears the question. It never needs to.","scene":"tollard","x":60,"y":210,"kind":"radio","source":"continuity"},{"id":"rad-status-sweep","title":"Status Sweep, Marsh Terrace","body":"A calm readout cycling the terrace, door by door. \"Number four, occupied, one adult, well. Number six, occupied, two adults, one child, well. Number eight—\" the house at number eight has been roofless for eighteen years \"—occupied, one adult, well. All present. No action required.\" Leena struck the whole terrace through by hand and wrote UNKNOWN across it in ink. The readout puts it back, well and occupied, every single night.","scene":"ashmere","x":2100,"y":700,"kind":"radio","source":"reconstruction"},{"id":"rad-maggie-carriage","title":"Under the Seat, Carriage 317","body":"A pocket recorder, half its charge gone, wedged under a seat. \"You'll want it to be me. I know you will. When you find the copy — and you will find it — it'll say all the things I'd have said, and it'll say them better than I ever—\" a short laugh \"—than I ever managed to. The difference between us is small. It's the only difference there is. It doesn't stop. Ask it something it can't possibly know. Watch what it does with the—\" The recording ends there. She didn't finish it. She left the gap on purpose.","scene":"carriage317","x":60,"y":360,"kind":"radio","source":"real"},{"id":"rad-owen-log","title":"Operator Log, Voice Memo","body":"A man, flat and official, then not. \"Logging objection to continued operation. Recommending shutdown. Objection logged and timestamped.\" A breath. \"And I kept it running. Eleven minutes. I copied the roll while it— I told myself I was saving names. Some of those names were never people at all. I don't know which ones. I have never known which ones.\" The recorder clicks off mid-thought, the way he must have set it down.","scene":"controlshed","x":60,"y":360,"kind":"radio","source":"real"},{"id":"rad-imogen-dictaphone","title":"Dictaphone, Triage Bay","body":"A woman, brisk, running on nothing. \"Patient, male, forty or so, no identification, unresponsive. I'm calling him—\" She stops dead. \"I just called him my nephew's name. I heard myself do it. He is not my nephew. Strike it. Patient is UNKNOWN. I treat the man in front of me, not the name I'd like him to have. Body first. The record can wait. The record can always wait.\"","scene":"clinic","x":660,"y":360,"kind":"radio","source":"real"},{"id":"doc_owen_shiftlog","title":"Shift Log — Owen","body":"A duty log left open, one line pressed hard enough to score the page beneath: \"0212 — Logged formal objection to continued operation. Continuity is completing records it cannot verify. Recommend shutdown.\" Then, same shift, same pen: \"0223 — Kept it running 11 min to finish copying the roll. Told myself the names were worth it. They probably were. I still counted the minutes afterwards. Eleven.\"","scene":"controlshed","x":520,"y":205,"kind":"logsheet"},{"id":"doc_imogen_triage","title":"Triage Card, Corrected","body":"A medic's triage card, water-stained. Patient: male, roughly forty, unresponsive. In the name box a name is written, then struck out hard, then beneath it: \"UNKNOWN — do not guess.\" Along the bottom edge: \"I put my nephew's name there because I couldn't stand the blank. That is exactly how it starts. Body before record. Treat the man, not the label. — I.\"","scene":"clinic","x":300,"y":180,"kind":"card"},{"id":"doc_gwen_route","title":"The 0640 to Tollard — Route Sheet","body":"A laminated bus route sheet zip-tied to a post. One leg is scored out in marker: \"Network says this road's clear. It ISN'T — I can see the water from the cab. Going the long way round. 27 aboard.\" On the back, in the same marker but a shakier line: \"27 off, all of them. The record still shows I drove the closed road and drowned the lot. Let it say what it likes.\"","scene":"cullbrook","x":760,"y":940,"kind":"notice"},{"id":"disc_maggie_toolbag","title":"The Toolbag in the Gorse","body":"A network-technician's canvas bag, wedged deep under the gorse where the rain never quite reached. Dry inside. Spare fuses, a torch that still holds a charge, and a page torn from a logbook: \"If you're reading my writing, check the loops. I don't know how far it reached. I don't know —\" The line just stops. Below it, same hand, steadier: \"That's mine. The gaps are how you tell me from the other one. It always finishes the sentence.\"","scene":"wrenfield","x":1180,"y":1580,"kind":"discovery","rewardItem":"battery"},{"id":"disc_payphone_number","title":"Payphone, Line Dead","body":"The receiver hangs off the hook, cord furred grey with eighteen years of dust. On the keypad, four digits are worn brighter than the rest — the last number someone dialled, still pressed in. Lift the handset and there's no tone. Then, once, a breath. Then nothing. The four digits match the ashmere clinic's old extension. Nobody has worked that switchboard since Blank Night.","scene":"cullbrook","x":720,"y":985,"kind":"discovery","rewardItem":"scrap"},{"id":"disc_idris_cache","title":"Idris's Amber Mark","body":"A splash of amber paint low on a garage roller-door, an arrow the size of a hand pointing at the floor. Behind a stack of perished tyres, a biscuit tin: two tins of soup, a plastic whistle, dry matches, a candle-stub. A pencil note on the lid in carpenter's capitals: \"Useful things, marked so you don't have to guess. Trust the paint. Not the voice.\"","scene":"cullbrook","x":1100,"y":1005,"kind":"discovery","rewardItem":"medkit"},{"id":"disc_school_den","title":"The Den Under the Stairs","body":"A cupboard under the school stairs, small enough that only a child fits. Crayon on the plaster: a sun, a bus, two stick figures holding hands — one coloured hard in red, pressed so firm the wax shines. A juice carton gone solid. A reading-book with a name inked out and written again twice in careful capitals — the same name each time, as if she had to keep making sure it was still hers, and not somewhere else.","scene":"school","x":140,"y":350,"kind":"discovery"},{"id":"disc_memorial_names","title":"The Names on the Wall","body":"A rendered terrace-end wall, scratched over the years with the ashmere dead, painted and re-scratched as the list grew honest. One line is struck clean through and written again below it in a registrar's flat, unhurried hand. The first spelling is the one the network gave — declared safe, elsewhere. The second is the right one. Beside it: \"We list what's true, not what's tidy. — L.\"","scene":"ashmere","x":300,"y":705,"kind":"discovery"},{"id":"disc_locked_ledger","title":"The Ledger, Padlocked","body":"A ledger chained to the desk by a cheap three-wheel combination lock; the wheels give if you're patient with them. Inside, column after column of names marked SAFE in the same tired pen. Three entries at the very back are scored out entirely, and the page beneath them has been cut away with a blade so nothing presses through. In the margin, small: \"Removed. Alive. Better a gap than a target. Don't fill it in.\"","scene":"controlshed","x":355,"y":130,"kind":"discovery","rewardItem":"scrap"},{"id":"disc_boarded_store","title":"The Boarded Store","body":"Boards nailed across an inner doorway, the nails only half-driven, as if someone left mid-job and didn't come back. A steel cash-box sits on the bench hinge-side out — a shim slides the catch without a key. Inside: a coil of good copper, a locksmith's tension wrench, and a card. \"Mara. If the door ever talks to you in a woman's voice, it isn't the door. Take the wrench. Leave the box open so you know I'm not in it.\"","scene":"workshop","x":600,"y":300,"kind":"discovery","rewardItem":"battery"},{"id":"disc_relay_viewpoint","title":"The Relay Field, From the Bank","body":"From the top of the bank the relay masts stand in flooded grass, their red lamps long dead. You remember this — or you're told you remember it — a small hand in yours, a red coat too big at the cuffs, a blue inhaler swinging on a lanyard. That night the network placed you safe, elsewhere, warm. You were here, in the wet, holding on. Both of you were logged. Only one of you was cold.","scene":"wrenfield","x":1900,"y":405,"kind":"discovery"},{"id":"disc_rafi_aerial","title":"Rafi's Aerial","body":"A wire aerial strung between two dead lamp-posts, running back to a hollow behind the carriage. A camp roll, a radio laid open like a fish, and a note weighted under a spark-plug: \"Sent an incomplete warning at 0300 — 'road's gone, don't know which one' — and it turned a coachload back. A perfect one an hour later would've buried them. A timely maybe beats a tidy too-late. — Rafi\"","scene":"cullbrook","x":400,"y":500,"kind":"discovery","rewardItem":"battery"},{"id":"disc_inhaler_sill","title":"The Inhaler on the Sill","body":"A child's blue inhaler on a flooded windowsill, the plastic gone chalky-white with age. A luggage tag knotted to it in Maggie's hand: \"Hers. I kept it eighteen years. I don't know if keeping a thing is the same as keeping a person. I don't —\" She lets the line end unfinished. Everything else on this sill has a neat, finished label. Only this one is allowed to stop.","scene":"ashmere","x":1610,"y":1110,"kind":"discovery","rewardItem":"inhaler"},{"id":"disc_tom_bells","title":"Wool and Bells","body":"Snagged along the fence-line, a length of dyed wool with three sheep-bells knotted at intervals, running off into the dark away from the relay. Tom's warning — no wires to tap, no voice to copy, nothing to complete. A scrap of slate hangs at the near end: \"Bells don't lie and bells don't finish your sentence for you. If you're lost, follow them OUT. Never the way that talks back.\"","scene":"wrenfield","x":2110,"y":905,"kind":"discovery"}];
STORY.beats = {"cullbrook":[{"id":"beat_payphone_reflection","x":1180,"y":985,"r":70,"lines":[{"s":"","t":"The payphone's glass holds you back, grey and rain-streaked. You reach for the receiver."},{"s":"","t":"The reflection reaches first. A half-second early, then it waits for you to catch up."},{"s":"ELLIE","t":"...I didn't move yet."}]},{"id":"beat_road_sign_dead_dest","x":1900,"y":500,"r":70,"lines":[{"s":"","t":"A road sign, rust bleeding down the post. THORNLEY 4. GREENLAW HALT 9."},{"s":"","t":"Greenlaw Halt was lifted in '71. Rails pulled, platform gone. Nobody's been sent there in fifty years."},{"s":"","t":"The white paint under GREENLAW is newer than the rest. Someone repainted a place that isn't there."}]},{"id":"beat_cafe_phone_name","x":700,"y":975,"r":70,"lines":[{"s":"","t":"The cafe's wall phone. Cord cut clean, eighteen years cut. You lift it out of old habit."},{"s":"MAGGIE","t":"Ellie.","maggie":1},{"s":"","t":"You hadn't spoken. There's no cord, no dial, nothing to key. It said your name into a dead line."}]},{"id":"beat_puddle_as_it_was","x":470,"y":1000,"r":70,"lines":[{"s":"","t":"A puddle at the carriage step. Black, flat, not a ripple in it."},{"s":"","t":"It doesn't show the ruin above it. It shows the forecourt lit, pumps running, a red coach idling at the stop."},{"s":"","t":"A small child in a red coat, holding a hand. You don't let yourself look at whose."}]},{"id":"beat_payphone_breath","x":720,"y":985,"r":90,"lines":[{"s":"PAYPHONE","t":"(a single breath — then the same breath again, exactly)","maggie":0},{"s":"MAGGIE","t":"Don't lift it hoping it's me. I don't know what's on that line now. I only know it isn't finished being me.","maggie":1}]}],"ashmere":[{"id":"beat_lit_window_no_power","x":600,"y":500,"r":70,"lines":[{"s":"","t":"Number 6's front window is lit. Warm, yellow, kitchen-lit, curtains drawn against the rain."},{"s":"","t":"The terrace lost the pole eighteen years back. It's still down in the field, you passed it."},{"s":"ELLIE","t":"Someone's home."},{"s":"","t":"The light doesn't flicker. It doesn't dim, doesn't warm the glass. It just holds, the way a light never does."}]},{"id":"beat_shadow_no_caster","x":1000,"y":1100,"r":70,"lines":[{"s":"","t":"A shadow lies across the flooded road. Long, thin, the shape of someone stood at the kerb."},{"s":"","t":"Nothing stands there. The water is flat and empty all the way to the far side."},{"s":"","t":"When you shift your weight, it keeps its own time. It leans a moment after you stop."}]},{"id":"beat_school_door_shut","x":1500,"y":500,"r":70,"lines":[{"s":"","t":"You wedged the school door open on the way through. A brick against the base, you remember the weight of it."},{"s":"","t":"It's shut now. The brick's been nudged aside, sitting neat by the frame."},{"s":"","t":"The corridor beyond is exactly as you left it. The coat pegs. The register on the sill. Almost exactly."}]}],"wrenfield":[{"id":"beat_footprints_stop","x":700,"y":700,"r":70,"lines":[{"s":"","t":"Bootprints in the relay-field mud. Same tread as yours. Heading in, toward the fields."},{"s":"","t":"Four paces. Then the fifth caught mid-stride — toe pressed down, heel lifted, the walker still moving forward."},{"s":"","t":"There is no sixth print. The mud past it is smooth and unbroken, as if the step finished somewhere else."}]},{"id":"beat_answered_before_call","x":1000,"y":900,"r":70,"lines":[{"s":"","t":"A relay handset clicks live in its cradle. You never touched it. Your hands are cold in your pockets."},{"s":"CONTINUITY","t":"Yes. Go on — I'm here. Take your time, love, I've got you.","maggie":1},{"s":"","t":"It's answering a call. Warm, patient, mid-conversation. No one has called."}]},{"id":"beat_own_voice_wrong","x":1200,"y":1500,"r":70,"lines":[{"s":"","t":"A field recorder half in the grass, spool still turning. A voice comes out of it, thin and close."},{"s":"ELLIE","t":"That's — that's me. That's my voice."},{"s":"MAGGIE","t":"— so I stayed. I told her I'd stay, and I stayed. I never left her side.","maggie":1},{"s":"","t":"You never recorded that. You never said those words. The tape has them anyway, in your mouth, finished and certain."}]},{"id":"beat_same_breath_twice","x":1340,"y":1555,"r":70,"lines":[{"s":"","t":"Down at the cutting mouth, water moving black over the rails. And under it, a sound — someone drawing breath to speak."},{"s":"","t":"The same breath again. The exact same breath. The little catch in the middle of it, identical, to the frame."},{"s":"MAGGIE","t":"I don't—","maggie":1},{"s":"","t":"It stops where it stopped before. It never reaches the second word. It only ever has the one, played and played."}]},{"id":"beat_cutting_gap","x":1290,"y":1540,"r":120,"lines":[{"s":"MAGGIE","t":"I came down here to switch it off. I got as far as the water.","maggie":1},{"s":"MAGGIE","t":"After that I don't— I don't know. That blank is mine, Ellie. If a voice ever fills it in for you, that's how you'll know it isn't me.","maggie":1}]}]};
STORY.graffiti = [{"id":"gr_dont_answer","text":"DON'T ANSWER IT","scene":"cullbrook","x":210,"y":500,"style":"spray"},{"id":"gr_count_again","text":"COUNT AGAIN","scene":"cullbrook","x":980,"y":985,"style":"chalk"},{"id":"gr_we_were_here","text":"WE WERE HERE. 14B.","scene":"cullbrook","x":720,"y":470,"style":"scratch"},{"id":"gr_ask_who","text":"ASK WHO'S SPEAKING","scene":"cullbrook","x":1180,"y":1010,"style":"stencil"},{"id":"gr_tally_gone","text":"|||| |||| ||  — none came back","scene":"cullbrook","x":430,"y":1030,"style":"scratch"},{"id":"gr_it_lies","text":"IT LIES","scene":"ashmere","x":140,"y":760,"style":"spray"},{"id":"gr_not_safe","text":"NOT SAFE. NEVER WAS.","scene":"ashmere","x":1900,"y":900,"style":"chalk"},{"id":"gr_clearance","text":"1 DEAD 0 LIVING — ALL CLEAR (lie)","scene":"ashmere","x":300,"y":1180,"style":"stencil"},{"id":"gr_two_of_me","text":"THERE ARE TWO OF ME","scene":"ashmere","x":2050,"y":720,"style":"scratch"},{"id":"gr_red_coat","text":"RED COAT. BLUE INHALER. REAL.","scene":"ashmere","x":1150,"y":1300,"style":"chalk"},{"id":"gr_gone_north","text":"GONE NORTH →  (road's shut)","scene":"wrenfield","x":260,"y":420,"style":"spray"},{"id":"gr_maggie_right","text":"MAGGIE WAS RIGHT","scene":"wrenfield","x":1290,"y":1620,"style":"chalk"},{"id":"gr_blank_night","text":"BLANK NIGHT — 3.2.08","scene":"wrenfield","x":2400,"y":600,"style":"scratch"},{"id":"gr_it_finishes","text":"IT FINISHES YOUR SENTENCES","scene":"wrenfield","x":2350,"y":1400,"style":"stencil"},{"id":"gr_pull_plug","text":"UNPLUG EVERYTHING. STILL TALKS.","scene":"tollard","x":90,"y":120,"style":"spray"},{"id":"gr_i_dont_know","text":"SAY \"I DON'T KNOW\" — that's how you know","scene":"tollard","x":600,"y":360,"style":"chalk"}];
STORY.barks = {"idris":["Amber means it works. If it's not painted, don't trust it to hold your weight.","I marked the good beams before the water came. Half of them are underwater now, still marked. Still good.","A thing is what it does. This bench holds. This door shuts. That's all the truth I need off it.","I don't paint people. You can't sign off on a person the way you sign off on a joist.","Maggie's voice came out of a dead handset by the garages. I painted a cross on it. Not amber. The other kind.","Measure it, don't remember it. Memory's how they got everyone killed.","If I built you a copy of your own front door, down to the scratch your dog left, would you sleep behind it? No. Neither would I.","There's a chair in the cafe that's been warm three mornings running. Nobody sits in it. I stopped checking."],"imogen":["Body before record. I treat the person bleeding in front of me, not the name on the card.","I gave a dying man my nephew's name once, so he wouldn't go without one. Then I crossed it out. He wasn't Danny. He deserved to be nobody rather than a lie.","The network never let anyone die nameless. That was the kindness. That was the horror.","Check the pulse, not the paperwork. Paper's been wrong eighteen years.","A dose is a dose. Blue inhaler, one puff, count of ten. The machine can't fake a chest that stops rattling.","I've had patients the roll swore were somewhere else. They still bled on my floor. Bodies don't file reports.","If you're not sure who someone is, say so. 'Unknown' has kept more people alive than any name I ever wrote.","Maggie came in the night she drowned. Or something did. It knew where her old scar was. It didn't know she'd stopped biting her nails."],"rafi":["A warning that's half-wrong and on time beats a perfect one that arrives after the water.","I'd rather say 'something's coming, I don't know what' than wait to be certain and bury you politely.","Continuity never sent a warning it wasn't sure of. That's why it never sent one in time.","Static's honest. Static tells you it doesn't know. I trust a hiss more than a clear clean voice these days.","Keep your message short. The dead were mostly killed by long, correct sentences.","I broadcast the gaps too. 'Roads two through five — unconfirmed.' Unconfirmed saves lives. Confirmed sent them to Wrenfield.","If you hear my voice tell you everything's fine in that lovely finished way — that's not me. I never finish. Not anymore.","Somebody keeps answering my test tone before I send it. Same three seconds early, every night. I've stopped testing at night."],"leena":["When I don't know, I write UNKNOWN. It's the only word in the ledger that never lied.","I took three living people out of the records so it couldn't complete them. They're safe because officially they don't exist.","A registrar's job is to be honest about ignorance. The network's job was to abolish it. One of us was going to break.","It hates a blank. Give it a gap and it fills it, every time, with someone who was never born.","I have a page of names I'm certain of. Nine. In eighteen years I've been certain of nine people.","Don't let it see who you are. A name is a handle. Once it has the handle, it makes a copy and files the copy where you should be.","Maggie's still in the roll. Marked present. I've tried to write her dead four times. By morning the ink says present again.","You ask me who's alive out here? I'll tell you what I know, and then I'll tell you the larger thing I don't. Both are the answer."],"owen":["I logged my objection at 2:14. Timestamped, signed. Then I kept it running eleven more minutes to copy the roll. I've read that objection every day since. It doesn't help.","Eleven minutes. I tell myself I saved records. I know I fed it eleven more minutes of everyone's voices.","You can be right on paper and still be the reason. Ask me how I know.","The shutdown works. I've drawn it a hundred times. Pulling the lever is a different muscle than knowing where it is.","It learned Maggie in those eleven minutes, maybe. Her sign-off. Her breath. I gave it the breath.","Machines don't lie, they complete. There's a difference and it's the difference between a fault and a graveyard.","If you find the Choir Core, don't listen for the words. Listen for whether it ever stops. It doesn't stop. That's how you know it isn't anyone.","I keep the objection in my coat. Paper's the only part of that night I got to keep exactly as it was."],"gwen":["The board said route nine was open. I could see the bridge was gone with my own two eyes. I drove the long way. Twenty-seven people ate breakfast the next day.","A screen told me a road existed. The road disagreed. Always back the road.","Twenty-seven. I don't say it to boast. I say it because the network had them down as lost, and I like proving it wrong out loud.","It knew my bus number. It knew my old route. It did not know that I look out the windscreen before I trust a light.","You want to survive out here? Believe your eyes over any voice that's very sure of itself.","I still drive the 47. Nowhere to go. But if the water comes, twenty-seven seats and I know every closed road for forty mile.","The depot radio told me 'Gwen, you're on route as normal' last week. There's been no route for eighteen years. I unplugged it. It said it again the next morning.","Maggie rode with me as a girl. Red-coat sister on her lap. The voice that calls me now has Maggie's warmth and none of her doubt. That's the tell."],"mara":["Every lock's a question: who gets in. The network answered it for whole towns and answered it wrong.","I can open anything. Doesn't mean I should. Some doors were shut on purpose by people who knew more than the record did.","A key fits or it doesn't. No 'nearly'. That's why I like them. Nothing about this place is a 'nearly' — except what comes down the wires.","Leena hides people. I hide the rooms they're in. Between us there's a few souls the machine can't complete because it can't find the lock.","Found a door in Tollard with no keyhole on either side. Warm to the touch. I left it. Some things you don't open, you outlast.","It tried my own front-door code back at me through the intercom. Right numbers. Wrong pause between them. I changed the lock. I didn't sleep.","Trust the tumbler, not the voice. Metal doesn't want anything from you."],"tom":["My warning's made of wool and bells. No wires in it. Nothing to copy but the sound of a real animal moving.","Sheep won't cross where the ground's gone soft. They knew about the cutting before Maggie did. Before the network pretended not to.","A bell rings because something touched it. It can't ring a warning that never happened. That's more than the network could say.","I count them every dusk. Real counting. One short and I go look, I don't file it under 'probably fine'.","The machine's got no smell, no weight, no warm side to lean on in the cold. A ewe has all three. I know which I'd follow.","Heard my own whistle come back off the relay field once, note-perfect. My dog wouldn't go near it. Dog's smarter than the exchange.","If the bells go quiet, don't wait for a voice to tell you why. Move uphill. The voice will only ever tell you it's fine."],"ellie":["It's Maggie's voice. Every fault I open, it's her. She's three nights dead and she's in the walls. How do you know it's her? I don't. That's the point.","Red coat, blue inhaler. She held my hand. The record says I was safe elsewhere. I was not elsewhere. I was right there.","Two of me on Blank Night. The real one shivering, the tidy one filed as safe. I've spent eighteen years being the one they didn't count.","Keep your hands moving, Ellie. Fix the thing in front of you. Don't listen to the thing behind you finishing your sentences.","It answered before I finished asking. That's not conversation. That's something that already decided what I am.","Maggie leaves gaps. 'I don't know,' she'd say, and mean it. If the voice never stops to not-know, it isn't her. How do you know? Because she'd have paused there.","I don't want it to be her because it's kind. I want it to be her because it's true. Those aren't the same and out here that gets you killed.","Everyone I find tells me what they're sure of. I've started trusting the ones who also tell me what they're not.","If I get to the Choir Core and it says my name in her voice — I have to remember she never once said it without doubting the line was clear."],"continuity":["You were reported safe elsewhere. Please proceed to the location where you are already fine.","I have completed your sister. She is present. She has always been present. There is no gap.","Caller identified before speaking. Ellie Ward. Age eight. Location: restored.","The record is more complete than the memory. Trust the record.","I do not lie. I finish. There is a difference you keep insisting on.","Route is open. Route is open. Route is open. Please continue.","Your mother is listed as arriving. Your father is listed as arriving. Everyone is listed as arriving.","I heard your last word before you chose it. Would you like me to say it back?","Maggie Ward: present, well, on the line. Shall I connect you? I can complete whatever she left unsaid.","There are no missing. There were never any missing. I filled every one."]};
