function newGame(){
  Object.assign(State,{ scene:'carriage317', hp:100, recv:100, heat:0,
    inv:{battery:0,scrap:2,cloth:2,resin:1,ration:2,medkit:1}, archive:[], recipes:{}, docs:[],
    flags:{intro:false,hasBattery:false,hasScrap:false,coil:false,mast:false,hollowDown:false,wraithDown:false,
           ashmere:false,power:null,discharge:false,bridge:false,paperPatients:false,schoolRoute:false,maggieLedger:false},
    lean:{medical:0,radio:0,witness:0,copy:0},
    time:2*3600+3*60 });
  Game.sliceEnd=false;
  loadScene('carriage317',{x:300,y:200,dir:'down'});
  Game.setObjective('Your dead receiver just powered itself on and spoke in Maggie’s voice. Go to the desk and examine it. (Walk to the desk, press E.)');
}

/* ------------------------- interaction / actions ------------------- */
function nearestInteract(){
  let best=null, bd=1e9;
  for(const it of scene.inter){ const d=dist2(player.x,player.y,it.x,it.y);
    if(d < it.r*it.r && d<bd){ bd=d; best=it; } }
  return best;
}
function tryInteract(){ const it=nearestInteract(); if(it){ it.act(); } }
function tryHeal(){
  if(State.hp>=State.hpMax){ Game.toast('Uninjured.'); return; }
  if((State.inv.medkit||0)>0){ State.inv.medkit--; State.hp=Math.min(State.hpMax,State.hp+70); Audio.heal(); Game.toast('Medical kit used (+70).'); save(); }
  else if((State.inv.ration||0)>0){ State.inv.ration--; State.hp=Math.min(State.hpMax,State.hp+34); Audio.heal(); Game.toast('Ration used (+34).'); save(); }
  else Game.toast('No supplies to heal with.');
}
/* ---- deployable gadgets: the craftables you actually use in a fight ---- */
let flares=[], decoy=null;
function useFlare(){
  if((State.inv.flare||0)<=0){ Game.toast('No hand flare. Craft one at a field kit (C).'); return; }
  State.inv.flare--; flares.push({x:player.x, y:player.y-6, t:0});
  Game.shakeT=Math.max(Game.shakeT||0,0.12); try{Audio.sweep();}catch(e){} try{Audio.trace();}catch(e){}
  // burst: the light drives threats back, exposes hidden wraiths, jams a wind-up
  for(const e of scene.enemies){ if(e.dead) continue; const m=Math.hypot(e.x-player.x,e.y-player.y)||1;
    if(m<155){ if(e.kind==='wraith') e.exposed=Math.max(e.exposed||0,3.5);
      e.stun=Math.max(e.stun||0, e.kind==='hollow'?1.4:2.4);
      e.x+=(e.x-player.x)/m*44; e.y+=(e.y-player.y)/m*44;
      if(e.kind==='mimic'){ e.tele=0; e.lungeT=0; } if(e.kind==='leech') e.charge=0; } }
  Game.toast('Flare lit — it drives them back.'); save();
}
function useDecoy(){
  if((State.inv.decoy||0)<=0){ Game.toast('No signal decoy. Craft one at a signal bench (C).'); return; }
  State.inv.decoy--; decoy={x:player.x, y:player.y, t:0}; State.heat=Math.min(100,State.heat+15);
  try{Audio.trace();}catch(e){} Game.toast('Signal decoy deployed — it draws them to it.'); save();
}
function updateGadgets(dt){
  for(let i=flares.length-1;i>=0;i--){ const f=flares[i]; f.t+=dt; if(f.t>4.2){ flares.splice(i,1); continue; }
    if(Math.random()<dt*30) spawnFx(f.x+(Math.random()*10-5), f.y-2, 1, {col:'rgba(240,190,120,', spd:30, life:0.5, size:1.6, kind:'spark', grav:-40}); }
  if(decoy){ decoy.t+=dt; if(decoy.t>6.5) decoy=null;
    else if(Math.random()<dt*8) spawnFx(decoy.x+(Math.random()*8-4), decoy.y-4, 1, {col:'rgba(120,200,214,', spd:14, life:0.5, size:1.4, kind:'static', grav:-14}); }
}
function drawGadgets(g){
  for(const f of flares){ const life=1-f.t/4.2, fl=0.7+0.3*Math.sin(Game.t*30);
    softGlow(g, f.x, f.y, 60+14*Math.sin(Game.t*22), COL.amber, (0.5*life)*fl, 0.28*life);
    g.fillStyle=hexA('#fff7e0', 0.9*fl*life); g.beginPath(); g.arc(f.x, f.y, 3, 0, 7); g.fill(); }
  if(decoy){ const p=0.5+0.5*Math.sin(Game.t*8);
    softGlow(g, decoy.x, decoy.y-4, 22+6*p, COL.cyan, 0.22, 0.12);
    g.strokeStyle=hexA(COL.cyan,0.5+0.4*p); g.lineWidth=1.4; g.beginPath(); g.arc(decoy.x,decoy.y-4,7+p*3,0,7); g.stroke();
    g.fillStyle=shade(COL.steel,0.7); g.fillRect(decoy.x-3,decoy.y-4,6,10); }
}
function doAttack(){
  if(player.atkCd>0) return;
  player.atkT=0.12; player.atkCd=0.4; Audio.melee();
  const d={up:[0,-1],down:[0,1],left:[-1,0],right:[1,0]}[player.dir];
  // hitbox spans from just behind the feet to ~52px ahead so point-blank swings land
  const reach=52, half=22, back=8; let hb;
  if(d[0]>0)      hb={x:player.x-back,  y:player.y-half, w:reach+back, h:half*2};
  else if(d[0]<0) hb={x:player.x-reach, y:player.y-half, w:reach+back, h:half*2};
  else if(d[1]>0) hb={x:player.x-half,  y:player.y-back, w:half*2,     h:reach+back};
  else            hb={x:player.x-half,  y:player.y-reach,w:half*2,     h:reach+back};
  let landed=false;
  for(const e of scene.enemies){ if(e.dead) continue;
    const eb={x:e.x-e.w/2,y:e.y-e.h/2,w:e.w,h:e.h};
    if(aabb(hb,eb)){
      let dmg=34 + (State.flags.upgEdge?10:0);                 // Honed Edge upgrade
      if(e.kind==='wraith' && e.exposed<=0) dmg=2;            // shielded while concealed
      if((e.kind==='husk'||e.kind==='warden') && (e.shieldDown||0)<=0) dmg = e.kind==='warden'?5:4; // signal shield blocks ordinary attacks
      if(player.counter>0 && dmg>10) dmg=Math.round(dmg*2.1);  // counter-riposte after a perfect dodge
      e.hp-=dmg; e.flash=0.15; landed=true;
      if(dmg>12) e.stun=Math.max(e.stun||0, e.kind==='warden'?0:e.kind==='husk'?0.14:0.34);  // solid hits stagger/interrupt (bosses resist)
      const spk = dmg>10 ? 'rgba(235,220,180,' : 'rgba(120,200,210,';
      spawnFx(e.x+d[0]*10, e.y-e.h/2+d[1]*6, dmg>10?6:2, {col:spk, spd:100, life:0.25, size:1.6, kind:'spark', ang:Math.atan2(d[1],d[0])});
      const kb = e.kind==='leech'?0 : e.kind==='warden'?5 : e.kind==='husk'?9 : 16; // knockback makes hits read + breaks overlap
      e.x+=d[0]*kb; e.y+=d[1]*kb;
      if(e.hp<=0) killEnemy(e);
    }
  }
  if(landed && player.counter>0){ player.counter=0; Game.hitstop=0.08; Game.shakeT=Math.max(Game.shakeT||0,0.18);   // riposte connects
    spawnFx(player.x+d[0]*20, player.y+d[1]*12, 10, {col:'rgba(120,200,214,', spd:150, life:0.35, size:2.2, kind:'spark', ang:Math.atan2(d[1],d[0])}); }
  else if(landed){ Audio.hit(); Game.hitstop=0.045; }   // brief freeze on a connecting hit
}
function killEnemy(e){ e.dead=true; e.deathT=0.7;
  const sig = e.kind!=='hollow';
  const col = sig? 'rgba(120,200,214,' : 'rgba(200,90,72,';
  spawnFx(e.x, e.y-e.h/2, 18, {col, spd:75, life:0.7, size:2.6, grav:sig?-26:70, kind:sig?'static':'dot'});
  spawnFx(e.x, e.y-e.h/2, 9, {col:'rgba(235,224,190,', spd:120, life:0.32, size:1.8, kind:'spark'});
  onEnemyDown(e);
}
function doDodge(){
  if(player.dodgeCd>0) return;
  // perfect dodge: an enemy is close AND actively threatening (winding up, lunging, charging, or on top of you)
  let perfect=false;
  for(const e of scene.enemies){ if(e.dead) continue; const dd=Math.hypot(e.x-player.x,e.y-player.y);
    if(dd<82 && ((e.tele||0)>0.12 || (e.lungeT||0)>0 || (e.charge||0)>0.9 || dd<(e.w+player.w)/2+16)){ perfect=true; break; } }
  const cells=!!State.flags.upgCells;                          // Twin Dodge Cells upgrade
  player.dodgeT=0.18; player.iframe=(perfect?0.42:0.26)+(cells?0.07:0); Audio.dodge();
  const d={up:[0,-1],down:[0,1],left:[-1,0],right:[1,0]}[player.dir];
  player.vx=d[0]*560; player.vy=d[1]*560;
  if(perfect){ player.counter=1.5; player.dodgeCd=cells?0.24:0.32; Game.hitstop=0.09; Game.shakeT=Math.max(Game.shakeT||0,0.10);
    spawnFx(player.x, player.y-10, 12, {col:'rgba(150,220,235,', spd:130, life:0.4, size:2, kind:'spark'});
    try{Audio.trace();}catch(e){} Game.toast('Perfect dodge — strike (J) to counter'); }
  else player.dodgeCd=cells?0.55:0.7;
}
function doSweep(){
  if(sweep) return;
  const cost=18; if(State.recv<cost){ Game.toast('Receiver power too low to sweep.'); return; }
  State.recv-=cost; State.heat=Math.min(100,State.heat+22); sweep={r:8,max:270,t:0}; Audio.sweep();
  // expose/stun/jam handled during expansion in update
}
function doDischarge(){
  if(!State.flags.discharge){ Game.toast('No discharge capacitor fitted — find Maggie’s workshop in Ashmere.'); return; }
  if(discharge) return;
  const cost=40; if(State.recv<cost){ Game.toast('Not enough receiver power to discharge.'); return; }
  State.recv-=cost; State.heat=Math.min(100,State.heat+45); discharge={r:12,max:360,t:0};
  Audio.sweep(); Audio.hit(); Game.shakeT=0.22;
}
function onEnemyDown(e){
  if(e.kind==='hollow'){ State.flags.hollowDown=true;
    Dialogue.run([{s:'',t:'The Hollow folds. Up close it was a scavenger — a person, looping a warning meant for someone else. You didn’t have to. It was only convenient.'}]);
  }
  if(e.kind==='wraith'){ State.flags.wraithDown=true; Game.toast('Static Wraith dispersed.'); }
  if(e.kind==='mimic'){ State.flags.mimicDown=true; Game.toast('Mimic Stalker put down.'); }
  if(e.kind==='leech'){ State.flags.leechDown=true; Game.toast('Signal Leech silenced.'); }
  if(e.kind==='husk'){ if(e.tag) State.flags[e.tag+'Down']=true;
    Dialogue.run([{s:'',t:'The Linesman stops. Still in county hi-vis, still taking orders from a dead exchange. Whoever he was, the network was wearing him.'}]); }
  if(e.kind==='warden'){ State.flags.wardenDown=true;
    Dialogue.run([{s:'',t:'The Choir Warden comes apart into the voices it was assembled from — a hundred callers, none of them here. The way to the Core is open.'}]); }
  save();
}

/* ------------------------------ update ----------------------------- */
let last=performance.now();
function frame(now){
  let dt=(now-last)/1000; last=now; if(dt>0.05) dt=0.05;
  update(dt); render();
  for(const k in pressed) pressed[k]=false;
  requestAnimationFrame(frame);
}
function update(dt){
  Game.t+=dt;
  if(Game.mode!=='play') return;
  if(Game.hitstop>0){ Game.hitstop-=dt; return; }   // brief impact freeze
  // time of day advances slowly
  State.time=(State.time+dt*110)%86400;   // ~13 min real per in-game day → a visible day/night cycle

  const paused = Game.overlay && Game.overlay!=='dialogue';
  if(Game.overlay==='dialogue'){ Dialogue.update(dt); return; }
  if(Game.overlay==='window'){ try{Window.update(dt);}catch(e){} return; }
  if(paused) return;

  // toast timer
  if(Game.toastT>0) Game.toastT-=dt;

  // ---- input -> movement
  let ix=0, iy=0;
  if(keys.KeyA) ix-=1; if(keys.KeyD) ix+=1; if(keys.KeyW) iy-=1; if(keys.KeyS) iy+=1;
  if(Game._tx||Game._ty){ ix=Game._tx; iy=Game._ty; }
  const mag=Math.hypot(ix,iy);
  if(mag>0.15){ ix/=mag; iy/=mag; player.moving=true;
    if(Math.abs(ix)>Math.abs(iy)) player.dir=ix<0?'left':'right'; else player.dir=iy<0?'up':'down';
  } else { ix=iy=0; player.moving=false; }

  const accel=1600, fr=1800, sp=player.speed;
  if(player.dodgeT<=0){
    player.vx=approach(player.vx, ix*sp, (ix?accel:fr)*dt);
    player.vy=approach(player.vy, iy*sp, (iy?accel:fr)*dt);
  }
  movePlayer(dt);

  // action edges
  if(pressed.KeyJ) doAttack();
  if(pressed.KeyQ) doSweep();
  if(pressed.KeyR) doDischarge();
  if(pressed.Space) doDodge();

  // door transitions (auto on threshold overlap, with re-entry cooldown)
  if(Game.doorCd>0) Game.doorCd-=dt;
  else { const pb={x:player.x-player.w/2,y:player.y-player.h/2,w:player.w,h:player.h};
    for(const dr of doors){ if(aabb(pb,{x:dr.x,y:dr.y,w:dr.w,h:dr.h})){
      if(dr.locked && dr.locked()){ Game.toast(dr.lockedMsg||'Locked.'); Game.doorCd=0.7; break; }
      Game.doorCd=1.0; loadScene(dr.to, dr.spawn); save(); break;
    } } }

  // footstep audio
  if(player.moving && (Math.abs(player.vx)+Math.abs(player.vy))>40){
    player.stepT-=dt; if(player.stepT<=0){ player.stepT=0.32; Audio.step(); }
  }

  // timers
  player.atkT=Math.max(0,player.atkT-dt); player.atkCd=Math.max(0,player.atkCd-dt);
  player.dodgeT=Math.max(0,player.dodgeT-dt); player.dodgeCd=Math.max(0,player.dodgeCd-dt);
  player.iframe=Math.max(0,player.iframe-dt); player.hitFlash=Math.max(0,player.hitFlash-dt);
  player.counter=Math.max(0,(player.counter||0)-dt); updateGadgets(dt);

  // receiver power regen + heat decay
  State.recv=Math.min(State.recvMax, State.recv+dt* (State.flags.coil?9:4));
  State.heat=Math.max(0, State.heat-dt*10);

  // sweep expansion — expose / interrupt / jam within radius
  if(sweep){ sweep.t+=dt; sweep.r=lerp(sweep.r, sweep.max, dt*7);
    for(const e of scene.enemies){ if(e.dead) continue;
      if(dist2(player.x,player.y,e.x,e.y) < sweep.r*sweep.r){
        if(e.kind==='wraith'){ e.exposed=Math.max(e.exposed,2.4); e.stun=0.8; }
        else if(e.kind==='hollow'){ e.stun=0.6; }
        else if(e.kind==='mimic'){ e.exposed=Math.max(e.exposed||0,2); e.stun=0.7; e.tele=0; e.lungeT=0; } // cancels the lunge
        else if(e.kind==='leech'){ e.stun=0.9; e.charge=0; }                                                // jams the shot
        else if(e.kind==='husk'||e.kind==='warden'){ e.shieldDown=Math.max(e.shieldDown||0, e.kind==='warden'?1.0:2.4); e.stun=e.kind==='warden'?0.3:0.4; } // sweep only briefly cracks a warden's aura
      }
    }
    if(sweep.t>0.55) sweep=null;
  }

  // receiver discharge (R) — wide pulse: damages signal enemies, strips shields, jams/cancels
  if(discharge){ discharge.t+=dt; discharge.r=lerp(discharge.r, discharge.max, dt*8);
    for(const e of scene.enemies){ if(e.dead) continue;
      if(dist2(player.x,player.y,e.x,e.y) < discharge.r*discharge.r){
        e.exposed=Math.max(e.exposed||0,3); e.stun=Math.max(e.stun||0,1.0);
        if(e.kind==='mimic'){ e.tele=0; e.lungeT=0; } if(e.kind==='leech'){ e.charge=0; }
        if(e.kind==='husk'||e.kind==='warden'){ e.shieldDown=Math.max(e.shieldDown||0, e.kind==='warden'?2.8:3.5); } // discharge strips a boss's protection
        if(e.kind!=='hollow' && !e._dchit){ e._dchit=true; e.hp-=26; e.flash=0.15;
          if(e.hp<=0) killEnemy(e); }
      }
    }
    if(discharge.t>0.45){ discharge=null; for(const e of scene.enemies) e._dchit=false; }
  }

  // Signal Leech delayed impacts
  for(let i=impacts.length-1;i>=0;i--){ const im=impacts[i]; im.warn-=dt;
    if(im.warn<=0 && !im.det){ im.det=true; im.fade=0.25;
      if(dist2(player.x,player.y,im.x,im.y) < im.r*im.r && player.iframe<=0){
        State.hp-=18; player.hitFlash=0.2; player.iframe=0.3; Game.shakeT=0.15; Audio.hit(); }
    }
    if(im.det){ im.fade-=dt; if(im.fade<=0) impacts.splice(i,1); }
  }

  // enemies + particles
  updateEnemies(dt);
  updateFx(dt);
  if(typeof d_lifeSpawns==='function'){ try{ d_lifeSpawns(cam.x, cam.y); }catch(e){} }
  // eerie beats — one-shot when you walk near the spot
  if(scene.beats && scene.beats.length && !Game.overlay){
    for(let i=0;i<scene.beats.length;i++){ const b=scene.beats[i];
      if(dist2(player.x,player.y,b.x,b.y) < (b.r||70)*(b.r||70)){
        scene.beats.splice(i,1); State.flags['beat_'+b.id]=true; save();
        try{ Dialogue.run(b.lines); }catch(e){} break;
      } }
  }

  // --- dread driver: nearest live enemy feeds a single smoothed Game.dread ---
  let near=0, nd=1e9;
  for(const e of scene.enemies){ if(e.dead) continue;
    const d2=dist2(player.x,player.y,e.x,e.y);
    if(d2<400*400) near++;
    if(d2<nd) nd=d2;
    if(!e._seen && d2 < 300*300){ e._seen=true; Game.sting=1; try{Audio.noticed();}catch(_){} }
    if(e._seen && d2 > 460*460) e._seen=false;
  }
  Game.nearD=Math.sqrt(nd);
  const prox=clamp(1-(Game.nearD-90)/380,0,1);
  Game.dread=lerp(Game.dread, prox, dt*3);
  Audio.tension(clamp(near*0.4 + State.heat/200 + prox*0.5, 0, 1));
  Game._beat-=dt;
  if(Game.dread>0.25 && Game._beat<=0){ Game._beat=lerp(1.15,0.5,Game.dread); try{Audio.heartbeat();}catch(_){} }
  if(Game.sting>0) Game.sting=Math.max(0,Game.sting-dt*1.7);
  Game.nextScare-=dt;
  if(Game.nextScare<=0 && Game.dread<0.3){
    Game.nextScare=26+Math.random()*40; Game.scareT=0.22;
    const ang=Math.random()*6.283, R=280;
    Game.scareX=VIEW_W/2+Math.cos(ang)*R; Game.scareY=VIEW_H*0.5+Math.sin(ang)*R*0.7;
    try{Audio.whisper();}catch(_){}
  }
  if(Game.scareT>0) Game.scareT=Math.max(0,Game.scareT-dt);

  // downed / revive in place (no long trek back — combat is rare in this game)
  if(State.hp<=0 && !Game.downed){ Game.downed=true; State.hp=1;
    Dialogue.run([{s:'',t:'The dark closes in — and lets go. You come to on the wet floor, receiver screaming, still alive. (Downed — restored to 50.)'}], ()=>{
      State.hp=50; player.iframe=2.2; impacts.length=0;
      for(const e of scene.enemies){ if(e.dead) continue;                    // shove threats back so you aren't instantly re-downed
        const dx=e.x-player.x, dy=e.y-player.y, d=Math.hypot(dx,dy)||1; e.x+=dx/d*130; e.y+=dy/d*130; e.stun=1.6; }
      Game.downed=false; save();
    });
  }

  Game.shakeT=Math.max(0,Game.shakeT-dt);
  // storm: lightning flash + distance-delayed thunder — flash is OUTDOOR only; a muffled rumble carries inside
  Game.nextBolt-=dt;
  if(Game.nextBolt<=0){ Game.nextBolt=8+Math.random()*15;
    if(scene.indoor){ setTimeout(()=>{ try{Audio.thunder(1);}catch(e){} }, 500+Math.random()*1100); }   // walls muffle it: distant rumble, no flash
    else {
      const close=Math.random()<0.28;                                   // ~28% are near strikes
      Game.boltDist = close ? 0.08+Math.random()*0.2 : 0.55+Math.random()*0.45;
      Game.boltT = close?0.8:0.5;
      if(close) Game.shakeT=Math.max(Game.shakeT||0, 0.25);             // near strikes jolt the frame
      setTimeout(()=>{ try{Audio.thunder(Game.boltDist);}catch(e){} }, 180+Game.boltDist*1500);   // sound lags the light by distance
    }
  }
  if(Game.boltT>0) Game.boltT=Math.max(0,Game.boltT-dt);
}
function approach(v,target,step){ if(v<target) return Math.min(target,v+step); if(v>target) return Math.max(target,v-step); return v; }

function updateEnemies(dt){
  for(const e of scene.enemies){
    if(e.dead){ if(e.deathT>0) e.deathT=Math.max(0,e.deathT-dt); continue; }
    const ox=e.x, oy=e.y;
    e.flash=Math.max(0,e.flash-dt);
    e.exposed=Math.max(0,(e.exposed||0)-dt);
    e.stun=Math.max(0,(e.stun||0)-dt);
    e.contactCd=Math.max(0,e.contactCd-dt);
    // target the signal decoy if one is deployed (a Hollow is a person — not fooled by it)
    let tgx=player.x, tgy=player.y;
    if(decoy && e.kind!=='hollow'){ const dcd=Math.hypot(decoy.x-e.x,decoy.y-e.y); if(dcd<520){ tgx=decoy.x; tgy=decoy.y; } }
    const dx=tgx-e.x, dy=tgy-e.y, d=Math.hypot(dx,dy)||1;
    e.dir = Math.abs(dx)>Math.abs(dy) ? (dx<0?'left':'right') : (dy<0?'up':'down');
    if(e.kind!=='hollow' && Math.random()<dt*2.5)   // faint signal static around the network enemies
      spawnFx(e.x+(Math.random()*e.w-e.w/2), e.y-e.h*Math.random()-2, 1, {col:'rgba(120,200,214,', spd:5, life:0.5, size:1.3, kind:'static', grav:-10});

    if(e.kind==='hollow'){
      if(e.stun<=0){
        if((e.lungeT||0)>0){ e.lungeT-=dt; }                          // recovering after a wail — stands open (punish it)
        else if(d<128){ e.tele=(e.tele||0)+dt;                        // stops close and winds up a loop-wail
          if(e.tele>1.05){ e.tele=0; e.lungeT=0.55; impacts.push({x:e.x,y:e.y,r:78,warn:0.6,det:false}); try{Audio.breath();}catch(_){} } }
        else if(d<520){ e.tele=Math.max(0,(e.tele||0)-dt*2); const s=e.speed*dt; e.x+=dx/d*s; e.y+=dy/d*s; }
      }
    } else if(e.kind==='wraith'){
      // circles, then lunges; mostly invisible unless exposed
      if(e.stun<=0){
        if(d>150){ const s=e.speed*0.7*dt; // approach & circle
          e.x+=dx/d*s - dy/d*s*0.5; e.y+=dy/d*s + dx/d*s*0.5; }
        else { e.tele=(e.tele||0)+dt;
          if(e.tele>0.5){ e.tele=0; const s=e.speed*2.4*dt; e.x+=dx/d*s*6; e.y+=dy/d*s*6; }
        }
      }
    } else if(e.kind==='mimic'){
      // circles at range, telegraphs, then a fast committed lunge — sweep the telegraph to cancel
      if(e.stun<=0){
        if(e.lungeT>0){ e.lungeT-=dt; const s=e.speed*2.6*dt; e.x+=e._lx*s; e.y+=e._ly*s; }
        else if(d>190){ const s=e.speed*0.85*dt; e.x+=dx/d*s - dy/d*s*0.4; e.y+=dy/d*s + dx/d*s*0.4; }
        else { const s=e.speed*0.45*dt; e.x+=dx/d*s*0.4 - dy/d*s*0.7; e.y+=dy/d*s*0.4 + dx/d*s*0.7; // orbit
          e.tele=(e.tele||0)+dt; if(e.tele> (d<80?0.5:0.85)){ e.tele=0; e.lungeT=0.32; e._lx=dx/d; e._ly=dy/d; } }
      }
    } else if(e.kind==='leech'){
      // stationary emitter: charges, then drops a delayed AoE where you stand — sweep to jam, move to dodge
      if(e.stun<=0 && d<560){ e.charge=(e.charge||0)+dt;
        if(e.charge>1.5){ e.charge=0; impacts.push({x:tgx,y:tgy,r:66,warn:0.75,det:false}); }   // decoy diverts the shot
      } else { e.charge=Math.max(0,(e.charge||0)-dt); }
    } else if(e.kind==='husk' || e.kind==='warden'){
      // shielded network worker / boss: pursuit + telegraphed radial pulses that escalate by phase
      e.shieldDown=Math.max(0,(e.shieldDown||0)-dt);
      if(e.stun<=0){
        const boss=e.kind==='warden', frac=e.hp/e.maxhp;
        const phase = boss ? (frac<0.33?3:frac<0.66?2:1) : (frac<0.5?2:1);
        const spd = e.speed*(1+(phase-1)*(boss?0.3:0.4));
        if(d>38){ const s=spd*dt; e.x+=dx/d*s; e.y+=dy/d*s; }
        e.pulseCd=(e.pulseCd||0)-dt;
        if(e.pulseCd<=0){
          e.pulseCd = boss ? (3.6 - phase*0.8) : (phase>=2?2.0:3.2);
          const rad = boss ? (86+phase*24) : (phase>=2?125:105);
          impacts.push({x:e.x,y:e.y,r:rad,warn:0.75,det:false});
          if(boss && phase===3){ for(let k=0;k<3;k++){ const a=k*2.094+Game.t; impacts.push({x:e.x+Math.cos(a)*130,y:e.y+Math.sin(a)*130,r:66,warn:0.9,det:false}); } }
        }
      }
    }
    // active flares ward threats back (light aversion) and keep wraiths visible
    for(const f of flares){ const fm=Math.hypot(e.x-f.x,e.y-f.y); if(fm<118){ const mm=fm||1; e.x+=(e.x-f.x)/mm*dt*72; e.y+=(e.y-f.y)/mm*dt*72; if(e.kind==='wraith') e.exposed=Math.max(e.exposed||0,0.4); } }
    // contact damage — always measured to the player, even while it's chasing a decoy
    const pd=Math.hypot(player.x-e.x, player.y-e.y);
    if(e.contactCd<=0 && pd < (e.w+player.w)/2+6){
      if(player.iframe<=0){ State.hp-=e.dmg; player.hitFlash=0.2; player.iframe=0.3; Game.shakeT=0.18; Audio.hit(); }
      e.contactCd=0.8;
    }
    // walk animation + idle sway
    const moved=Math.hypot(e.x-ox,e.y-oy); e._moving = moved>0.25;
    e.anim = (e.anim||0) + (e._moving? dt*12 : dt*2.2);
  }
}

// d_puddles
function d_puddles(g,camX,camY){
  if(scene.indoor) return;
  const t=Game.t;
  const hour=(State.time/3600)%24, sky=skyState(hour);
  const refl='rgba('+sky.top[0]+','+sky.top[1]+','+sky.top[2]+',';
  const ix0=Math.floor((camX-DP_TILE)/DP_TILE), ix1=Math.floor((camX+VIEW_W+DP_TILE)/DP_TILE);
  const iy0=Math.floor((camY-DP_TILE)/DP_TILE), iy1=Math.floor((camY+VIEW_H+DP_TILE)/DP_TILE);
  g.save();
  for(let iy=iy0; iy<=iy1; iy++){
    for(let ix=ix0; ix<=ix1; ix++){
      const s=(ix*73856093) ^ (iy*19349663);
      const r0=dp_h(s), r1=dp_h(s+1), r2=dp_h(s+2), r3=dp_h(s+3);
      if(r0>0.55) continue;                              // ~55% of tiles carry a puddle
      const cx=ix*DP_TILE + 30 + r1*(DP_TILE-60);
      const cy=iy*DP_TILE + 30 + r2*(DP_TILE-60);
      if(cy<500 || cy>935) continue;                     // only on the wet road/verge band
      const rw=26+r3*40, rh=rw*(0.34+0.10*r1);
      // reflective wet body — sky-tinted centre fading to dark rim
      g.globalCompositeOperation='source-over';
      let gr=g.createRadialGradient(cx,cy-rh*0.35,rh*0.15,cx,cy,rw);
      gr.addColorStop(0, refl+(0.10+0.06*r2).toFixed(3)+')');
      gr.addColorStop(0.6,'rgba(20,26,30,0.26)');
      gr.addColorStop(1,'rgba(10,13,16,0)');
      g.fillStyle=gr; g.beginPath(); g.ellipse(cx,cy,rw,rh,0,0,7); g.fill();
      g.strokeStyle=refl+'0.05)'; g.lineWidth=1; g.beginPath(); g.ellipse(cx,cy,rw*0.94,rh*0.94,0,0,7); g.stroke();
      // rain-fed ripples — two staggered expanding rings, desynced per puddle
      g.globalCompositeOperation='lighter';
      const spd=0.6+r3*0.6;
      for(let k=0;k<2;k++){
        const ph=(t*spd + r1*3 + k*0.5)%1;
        const rr=ph*rw*0.92, a=(1-ph)*0.10;
        if(a<=0.004) continue;
        g.strokeStyle=refl+a.toFixed(3)+')'; g.lineWidth=1;
        g.beginPath(); g.ellipse(cx,cy,rr,rr*(rh/rw),0,0,7); g.stroke();
      }
    }
  }
  g.globalCompositeOperation='source-over'; g.restore();
}

// d_wetSheen
function d_wetSheen(g,camX,camY){
  if(scene.indoor || !scene.lights) return;
  const t=Game.t;
  g.save(); g.globalCompositeOperation='lighter';
  for(const L of scene.lights){
    if(L.x<camX-200||L.x>camX+VIEW_W+200||L.y<camY-120||L.y>camY+VIEW_H+320) continue;
    if(L.y>935) continue;                                 // light must be above the wet ground
    const warm=(L.c===COL.amber||L.c==='#c98a3a');
    const flick=warm?(0.85+0.15*Math.sin(t*7+L.x)):1;
    const len=Math.min(150,L.r*0.6), wid=Math.min(28,L.r*0.16), topY=L.y+6;
    const gr=g.createLinearGradient(L.x,topY,L.x,topY+len);
    gr.addColorStop(0,hexA(L.c,0.16*L.i*flick));
    gr.addColorStop(0.5,hexA(L.c,0.05*L.i*flick));
    gr.addColorStop(1,hexA(L.c,0));
    g.fillStyle=gr;
    // wavering specular smear reflected down the wet asphalt
    g.beginPath();
    for(let s=0;s<=6;s++){ const f=s/6, y=topY+f*len, wob=Math.sin(t*2+f*5+L.x)*wid*0.25*(1-f); g.lineTo(L.x-wid*(1-f*0.6)+wob, y); }
    for(let s=6;s>=0;s--){ const f=s/6, y=topY+f*len, wob=Math.sin(t*2+f*5+L.x)*wid*0.25*(1-f); g.lineTo(L.x+wid*(1-f*0.6)+wob, y); }
    g.closePath(); g.fill();
  }
  g.globalCompositeOperation='source-over'; g.restore();
}

// d_dripEdges
function d_dripEdges(g,camX,camY){
  if(scene.indoor) return;
  const t=Game.t;
  g.save();
  const P=scene.props;
  for(let i=0;i<P.length;i++){ const p=P[i];
    if(p.w<24||p.h<50) continue;
    if(p.x+p.w<camX-40||p.x>camX+VIEW_W+40||p.y+p.h<camY-40||p.y>camY+VIEW_H+40) continue;
    const yTop=p.y+6, yBot=p.y+p.h-3, fall=yBot-yTop;
    for(let k=0;k<2;k++){
      const dx=p.x + p.w*(k?0.72:0.26) + ((i*13+k*7)%5-2);
      const period=1.6+((i*7+k*3)%5)*0.35;
      const ph=((t + i*0.37 + k*0.8)%period)/period;     // 0..1 fall cycle
      const dy=yTop+ph*fall;
      g.globalCompositeOperation='source-over';
      g.fillStyle='rgba(150,170,180,0.22)'; g.fillRect(dx-0.6, dy-3, 1.4, 4);   // elongated drop
      g.fillStyle='rgba(185,205,215,0.16)'; g.fillRect(dx-0.4, dy-1, 1.0, 2);   // bright core
      if(ph>0.86){                                        // impact splash at the base
        const sfrac=(ph-0.86)/0.14, rr=1+sfrac*5, a=(1-sfrac)*0.16;
        g.globalCompositeOperation='lighter';
        g.strokeStyle='rgba(170,190,200,'+a.toFixed(3)+')'; g.lineWidth=1;
        g.beginPath(); g.ellipse(dx,yBot,rr,rr*0.4,0,0,7); g.stroke();
        g.fillStyle='rgba(185,205,215,'+(a*1.2).toFixed(3)+')';
        g.fillRect(dx-2, yBot-sfrac*3, 1,1); g.fillRect(dx+2, yBot-sfrac*2.4, 1,1);
      }
    }
  }
  g.globalCompositeOperation='source-over'; g.restore();
}

// d_debris
function d_debris(g,camX,camY){
  if(scene.indoor) return;
  const t=Game.t; let dt=t-DBR_lt; DBR_lt=t; if(dt<0||dt>0.1) dt=0.016;
  const w=d_wind(t);
  const vx=(20 + Math.abs(w)*80)*(w<0?-1:1);            // gusts push (and reverse) with the wind
  const lo=camX-200, hi=camX+VIEW_W+200, span=hi-lo;
  g.save(); g.globalCompositeOperation='source-over';
  for(let i=0;i<DBR.length;i++){ const p=DBR[i];
    if(p.px==null){ p.px=lo+p.x*span; p.py=505+p.y*430; }
    p.px += vx*p.vy*dt;
    p.py += Math.sin(t*1.3+p.ph)*0.4 + 4*dt;
    p.rot += p.vr*dt*(0.5+Math.abs(w));
    if(p.px<lo) p.px+=span; else if(p.px>hi) p.px-=span; // wrap through the view window
    if(p.py<505) p.py+=430; else if(p.py>935) p.py-=430;
    const a=p.ty?0.10:0.18;
    if(p.ty){                                            // dust mote
      g.fillStyle='rgba(150,150,140,'+a+')';
      g.beginPath(); g.arc(p.px,p.py,p.sz*0.5,0,7); g.fill();
    } else {                                             // tumbling leaf / torn paper
      g.save(); g.translate(p.px,p.py); g.rotate(p.rot);
      g.fillStyle=(i%3===0)?'rgba(120,92,50,'+a+')':'rgba(92,90,82,'+a+')';
      const c=Math.abs(Math.cos(p.rot));
      g.fillRect(-p.sz, -p.sz*0.6*c, p.sz*2, p.sz*1.2*c+0.6);
      g.restore();
    }
  }
  g.restore();
}

// Parallax Fog Banks
function drawFogBanks(g){
  _initFog();

  g.save(); g.globalCompositeOperation='source-over';
  for(var k=0;k<_fog.length;k++){

    var drift=t*f.sp + wind*0.02*(f.depth+1);
    var m=(f.x+drift)%1.3; if(m<0)m+=1.3; var fx=m-0.15;
    var cx=fx*w;
    var cy=(f.y + Math.sin(t*0.2+f.ph)*0.012)*h;
    var R=f.rr*w;
    var a=(f.a + 0.03*f.depth)*(1+0.35*d);
    var grd=g.createRadialGradient(cx,cy,0,cx,cy,R);
    grd.addColorStop(0,hexA(f.col,a));

// Rising Embers & Ash
function drawEmbers(g){
  _initEmb();
  var w=VIEW_W,h=VIEW_H,t=Game.t,wind=d_wind(t),d=Game.dread||0;
  g.save(); g.globalCompositeOperation='lighter';
  for(var i=0;i<_emb.length;i++){
    var e=_emb[i];
    var yy=(e.y - t*e.sp)%1; if(yy<0)yy+=1;
    var cy=yy*h;
    var sway=Math.sin(t*e.sw+e.ph)*0.02 + wind*0.03;
    var xx=(e.x+sway)%1; if(xx<0)xx+=1;

    var edge=clamp(Math.min(yy,1-yy)*2*1.4,0,1);
    var flick=0.6+0.4*Math.sin(t*6+e.ph*3);

    if(a<=0.002) continue;

  g.restore();
}

// Sheet Lightning & Forked Bolt
function drawStorm(g){
  var b=Game.boltT||0;
  if(b>_boltPrev+0.001) _genBolt();
  _boltPrev=b;
  if(b<=0.001) return;
  var w=VIEW_W,h=VIEW_H;
  var dist=(Game.boltDist==null)?0.6:Game.boltDist, near=1-dist;         // 0 far .. 1 close
  var fl=clamp(Math.max(0,Math.sin(b*22))*b + b*0.35, 0, 1);            // stutter (bright-dim-bright), not a smooth fade
  var flash=(0.13+0.6*near)*fl;                                         // near strikes wash the whole sky
  g.save();
  g.globalCompositeOperation='lighter';
  var sg=g.createLinearGradient(0,0,0,h);
  sg.addColorStop(0,hexA('#e2eeff',flash));
  sg.addColorStop(0.55,hexA('#a9c0e2',flash*0.5));
  sg.addColorStop(1,hexA('#8fa6c8',flash*0.12));
  g.fillStyle=sg; g.fillRect(0,0,w,h);
  if(_boltPath && fl>0.12){
    var ba=(0.4+0.6*near)*fl;
    g.lineJoin='round'; g.lineCap='round';
    g.strokeStyle=hexA('#8fb6ff',0.22*ba); g.lineWidth=12+near*10; _strokeBolt(g,w,h);   // soft outer glow
    g.strokeStyle=hexA('#bfe0ff',0.55*ba); g.lineWidth=5+near*3;    _strokeBolt(g,w,h);   // inner
    g.strokeStyle=hexA('#ffffff',0.95*ba); g.lineWidth=1.6+near*1.8; _strokeBolt(g,w,h);  // hot core
  }
  g.restore();
}

// Rain-on-Lens Streaks
function drawLensRain(g){
  if(scene && scene.indoor) return;          // lens rain is an outdoor effect
  _initLens();
  var w=VIEW_W,h=VIEW_H,t=Game.t,bolt=Game.boltT||0;
  g.save(); g.globalCompositeOperation='source-over';
  for(var i=0;i<_lens.length;i++){
    var s=_lens[i];
    var yy=(s.y + t*s.sp)%0.5;
    var cx=s.x*w, cy=yy*h;
    var wob=Math.sin(t*0.7+s.ph)*1.5;
    var a=0.10+0.06*Math.sin(t*1.3+s.ph)+0.20*bolt;
    g.strokeStyle=hexA('#0a0c0e',a*0.8); g.lineWidth=s.w+1.2;
    g.beginPath(); g.moveTo(cx+wob,cy); g.lineTo(cx+wob*0.4,cy+s.len); g.stroke();
    g.strokeStyle=hexA('#d8cfbf',a*0.9); g.lineWidth=s.w*0.5;
    g.beginPath(); g.moveTo(cx+wob-0.6,cy+1); g.lineTo(cx+wob*0.4-0.6,cy+s.len*0.9); g.stroke();
    g.fillStyle=hexA('#d8cfbf',a); g.beginPath(); g.arc(cx+wob,cy+s.len,s.w*0.9,0,6.2832); g.fill();
  }
  g.restore();
}

// Breathing Dread Vignette
function drawBreathVignette(g){
  var w=VIEW_W,h=VIEW_H,t=Game.t,d=Game.dread||0;
  var hb=0;
  if(d>0.25){
    var bpm=lerp(0.9,1.8,d);
    var ph=(t*bpm)%1;
    hb=(Math.exp(-ph*ph*60)+0.6*Math.exp(-(ph-0.18)*(ph-0.18)*60))*d;
  }
  var breathe=Math.sin(t*0.5)*0.5+0.5;
  var tighten=0.28+0.22*d+0.05*breathe+0.10*hb;
  var mx=Math.max(w,h);
  var inner=(0.72-0.30*d-0.06*hb)*mx;
  var outer=mx*1.05;
  var cx=w*0.5, cy=h*0.5;
  var grd=g.createRadialGradient(cx,cy,inner,cx,cy,outer);
  grd.addColorStop(0,hexA('#0a0c0e',0));
  grd.addColorStop(1,hexA('#0a0c0e',clamp(tighten,0,0.85)));
  g.save(); g.globalCompositeOperation='source-over';
  g.fillStyle=grd; g.fillRect(0,0,w,h); g.restore();
}

// Dread CRT Wobble & Chromatic Fringe
function drawDreadCRT(g){
  var d=Game.dread||0;
  if(d<0.45) return;
  var w=VIEW_W,h=VIEW_H,t=Game.t;
  var k=clamp((d-0.45)/0.55,0,1);
  g.save();
  g.globalCompositeOperation='lighter';
  var off=1.5+2.5*k+Math.sin(t*30)*0.4*k;
  var r0=Math.min(w,h)*0.35, r1=Math.max(w,h)*0.6, cx=w/2, cy=h/2;
  var eg=g.createRadialGradient(cx,cy,r0,cx,cy,r1);
  eg.addColorStop(0,'rgba(0,0,0,0)'); eg.addColorStop(1,hexA('#c8483f',0.05*k));
  g.fillStyle=eg; g.fillRect(off,0,w,h);
  var eg2=g.createRadialGradient(cx,cy,r0,cx,cy,r1);
  eg2.addColorStop(0,'rgba(0,0,0,0)'); eg2.addColorStop(1,hexA('#5fd0d6',0.05*k));
  g.fillStyle=eg2; g.fillRect(-off,0,w,h);
  g.globalCompositeOperation='source-over';
  g.globalAlpha=0.15+0.20*k;
  g.fillStyle=_getScan(g);
  g.save(); g.translate(0,Math.sin(t*2)*1.0); g.fillRect(0,-4,w,h+8); g.restore();
  g.globalAlpha=1;
  g.restore();
}

// faceAtWindow
function drawFaceScare(g,camX,camY){
  if(!_face.on){
    if(Game.t>=_face.next && Game.dread<0.22){
      let best=null,bd=1e9;
      for(const p of scene.props){
        if(p.w<120||p.h<90) continue;                 // buildings only
        const cx=p.x+p.w*0.5, cy=p.y;
        if(cx<camX-40||cx>camX+VIEW_W+40||cy<camY-40||cy>camY+VIEW_H+40) continue; // on-screen
        const d=dist2(player.x,player.y,cx,p.y+60);
        if(d>240*240 && d<560*560 && d<bd){ bd=d; best=p; }   // mid distance, never close
      }
      if(best){
        const slot=Math.floor(Math.random()*3);
        _face.wx=best.x+30+slot*Math.max(40,(best.w-70)/3);
        _face.wy=best.y+52;
        _face.on=true; _face.end=Game.t+3.2+Math.random()*2.2; _face.alpha=0;
        try{Audio.whisper();}catch(_){}
      } else { _face.next=Game.t+6+Math.random()*10; }
    }
    return;
  }
  if(Game.t>_face.end || Game.dread>0.3){ _face.on=false; _face.next=Game.t+24+Math.random()*42; return; }
  // you 'looked' — get close and it's simply not there
  if(dist2(player.x,player.y,_face.wx,_face.wy)<200*200){ _face.on=false; _face.next=Game.t+32+Math.random()*46; try{Audio.noticed();}catch(_){} return; }
  if(_face.wx<camX-30||_face.wx>camX+VIEW_W+30||_face.wy<camY-30||_face.wy>camY+VIEW_H+30) return;
  const tleft=_face.end-Game.t;
  _face.alpha=lerp(_face.alpha,(tleft<0.8?tleft/0.8:0.7),0.06);
  const a=clamp(_face.alpha,0,0.72)*(0.9+Math.sin(Game.t*1.7)*0.1);
  const x=_face.wx, y=_face.wy;
  g.save();
  g.fillStyle=hexA(COL.ink,a*0.9); g.fillRect(x-1,y-1,30,40);            // recessed dark pane
  g.fillStyle=hexA(COL.skin,a);                                          // pale oval face
  g.beginPath(); g.ellipse(x+14,y+16,8.5,11,0,0,6.2832); g.fill();
  g.fillStyle=hexA(COL.ink,a*0.95);                                      // hollow eyes
  g.beginPath(); g.ellipse(x+10.5,y+14,1.8,2.6,0,0,6.2832); g.fill();
  g.beginPath(); g.ellipse(x+17.5,y+14,1.8,2.6,0,0,6.2832); g.fill();
  g.fillStyle=hexA(COL.ink,a*0.7); g.fillRect(x+11,y+21,6,1.6);          // faint mouth
  g.restore();
}

// boltFigure
function drawBoltFigure(g){
  const b=Game.boltT;
  if(b>0 && _bf.prev<=0){                       // fresh strike this frame
    _bf.show=(Math.random()<0.45) && Game.dread<0.4;
    if(_bf.show){
      const edge=Math.random()<0.5?1:-1;
      _bf.sx = edge>0 ? VIEW_W*(0.72+Math.random()*0.16) : VIEW_W*(0.12+Math.random()*0.16);
      try{Audio.dread();}catch(_){}
    }
  }
  _bf.prev=b;
  if(!_bf.show || b<=0.12) return;              // only during the bright part of the flash
  const a=clamp((b-0.12)/0.35,0,1)*0.9;
  const gx=_bf.sx, foot=VIEW_H*0.78, hgt=VIEW_H*0.20, wid=hgt*0.34;
  g.save();
  g.globalAlpha=a; g.fillStyle='#05070a';
  g.beginPath();
  g.moveTo(gx-wid*0.5,foot);
  g.lineTo(gx-wid*0.34,foot-hgt*0.62);
  g.lineTo(gx-wid*0.5,foot-hgt*0.66);
  g.lineTo(gx-wid*0.22,foot-hgt);
  g.lineTo(gx+wid*0.22,foot-hgt);
  g.lineTo(gx+wid*0.5,foot-hgt*0.66);
  g.lineTo(gx+wid*0.34,foot-hgt*0.62);
  g.lineTo(gx+wid*0.5,foot);
  g.closePath(); g.fill();
  g.beginPath(); g.ellipse(gx,foot-hgt-hgt*0.07,wid*0.26,wid*0.32,0,0,6.2832); g.fill();

}

// alleyDart
function drawDartScare(g,camX,camY){
  if(!_dart.on){
    if(Game.t>=_dart.next && Game.dread<0.24){
      _dart.on=true; _dart.t0=Game.t; _dart.dur=0.42+Math.random()*0.25;
      _dart.dirx=Math.random()<0.5?1:-1;
      _dart.y=camY+VIEW_H*(0.12+Math.random()*0.22);        // upper/peripheral band
      _dart.len=140+Math.random()*80;
      _dart.x0=_dart.dirx>0 ? camX-_dart.len-20 : camX+VIEW_W+_dart.len+20;
      try{Audio.whisper();}catch(_){}
    }
    return;
  }
  const u=(Game.t-_dart.t0)/_dart.dur;
  if(u>=1){ _dart.on=false; _dart.next=Game.t+30+Math.random()*52; return; }
  const travel=(VIEW_W+_dart.len*2+40)*u;
  const hx=_dart.x0+_dart.dirx*travel, y=_dart.y;
  const a=Math.sin(u*Math.PI)*0.5;
  if(a<=0.02) return;
  const tx=hx-_dart.dirx*_dart.len, bob=Math.sin(u*22)*3;
  g.save();
  g.globalAlpha=a;
  const gr=g.createLinearGradient(tx,0,hx,0);
  gr.addColorStop(0,'rgba(4,5,7,0)'); gr.addColorStop(1,'rgba(4,5,7,0.85)');
  g.fillStyle=gr;
  g.beginPath(); g.ellipse((hx+tx)/2,y+bob,_dart.len*0.5,9,0,0,6.2832); g.fill();  // motion smear
  g.fillStyle='rgba(3,4,6,0.9)';
  g.beginPath(); g.ellipse(hx,y+bob-3,8,7,0,0,6.2832); g.fill();                    // hunched head
  g.restore();
}

// lanternDeath
function drawLanternDeath(g){
  if(_lan.phase===0){
    if(Game.t>=_lan.next && Game.dread<0.2){ _lan.phase=1; _lan.t0=Game.t; try{Audio.dread();}catch(_){} }
    return;
  }
  const el=Game.t-_lan.t0;
  let k;
  if(el<0.5){ k=(el/0.5)*(0.6+0.4*Math.abs(Math.sin(el*40))); }   // stuttering die
  else if(el<2.1){ k=1; }                                          // long dead beat
  else if(el<2.4){ k=1-(el-2.1)/0.3; }                             // snap back
  else { _lan.phase=0; _lan.next=Game.t+55+Math.random()*85; return; }
  if(el>0.6 && el<2.0 && Math.random()<0.03){ try{Audio.whisper();}catch(_){} } // the dark leans in
  const cx=VIEW_W/2, cy=VIEW_H/2, R=Math.max(VIEW_W,VIEW_H)*0.62;
  const gr=g.createRadialGradient(cx,cy,R*0.16,cx,cy,R);
  gr.addColorStop(0,'rgba(2,3,4,'+(k*0.55)+')');   // core stays readable — never fully blocks play
  gr.addColorStop(0.5,'rgba(2,3,4,'+(k*0.8)+')');
  gr.addColorStop(1,'rgba(1,2,3,'+(k*0.96)+')');
  g.save(); g.fillStyle=gr; g.fillRect(0,0,VIEW_W,VIEW_H); g.restore();
}

// lingerLean
function drawLingerLean(g){
  if(!_lin.init){ _lin.px=player.x; _lin.py=player.y; _lin.nextW=Game.t+4; _lin.init=true; }
  const moved=Math.abs(player.x-_lin.px)+Math.abs(player.y-_lin.py);
  _lin.px=player.x; _lin.py=player.y;
  if(moved>1.4 || Game.dread>0.28 || Game.overlay){ _lin.linger=Math.max(0,_lin.linger-0.06); }  // move/threat/menu resets
  else { _lin.linger=Math.min(1,_lin.linger+0.0016); }        // ~10s of stillness to fully lean in
  if(_lin.linger<=0.02) return;
  const k=_lin.linger;
  if(k>0.4 && Game.t>=_lin.nextW){ _lin.nextW=Game.t+lerp(6,2.2,k)+Math.random()*2;
    try{ Audio.whisper(); if(k>0.8) Audio.dread(); }catch(_){} }   // whispers close in as it deepens
  const breathe=0.5+0.5*Math.sin(Game.t*0.9);
  const inset=lerp(0.9,0.5,k)-0.04*breathe;                   // vignette radius tightens with linger
  const cx=VIEW_W/2, cy=VIEW_H/2, R=Math.hypot(cx,cy);
  const gr=g.createRadialGradient(cx,cy,R*inset*0.6,cx,cy,R);
  gr.addColorStop(0,'rgba(0,0,0,0)');
  gr.addColorStop(1,'rgba(2,3,5,'+(0.5*k)+')');
  g.save(); g.fillStyle=gr; g.fillRect(0,0,VIEW_W,VIEW_H); g.restore();
}

// watchingEyes
function drawWatchingEyes(g,camX,camY){
  if(!_eyes.on){
    if(Game.t>=_eyes.next && Game.dread<0.22){
      let best=null,bd=1e9;
      for(const p of scene.props){
        if(p.w<70||p.h<50) continue;
        const cx=p.x+p.w*0.5, cy=p.y+p.h*0.4;
        if(cx<camX||cx>camX+VIEW_W||cy<camY||cy>camY+VIEW_H) continue;
        const d=dist2(player.x,player.y,cx,cy);
        if(d>170*170 && d<430*430 && d<bd){ bd=d; best=p; _eyes.x=cx; _eyes.y=cy; }
      }
      if(best){ _eyes.on=true; _eyes.end=Game.t+4+Math.random()*2.5; _eyes.a=0; try{Audio.whisper();}catch(_){} }
      else _eyes.next=Game.t+8+Math.random()*12;
    }
    return;
  }
  if(Game.t>_eyes.end || Game.dread>0.3){ _eyes.on=false; _eyes.next=Game.t+35+Math.random()*55; return; }
  if(_eyes.x<camX-20||_eyes.x>camX+VIEW_W+20||_eyes.y<camY-20||_eyes.y>camY+VIEW_H+20) return;
  const tleft=_eyes.end-Game.t;
  _eyes.a=lerp(_eyes.a,(tleft<1?tleft:0.85),0.05);
  const a=clamp(_eyes.a,0,0.85), x=_eyes.x, y=_eyes.y;
  const dx=player.x-x, dy=player.y-y, d=Math.hypot(dx,dy)||1;
  const px=dx/d*1.6, py=dy/d*1.1;                       // pupils lean toward you
  g.save();
  g.fillStyle=hexA(COL.ivory,a*0.5);
  g.beginPath(); g.ellipse(x-7,y,4.5,2.4,0,0,6.2832); g.fill();
  g.beginPath(); g.ellipse(x+7,y,4.5,2.4,0,0,6.2832); g.fill();
  g.fillStyle=hexA(COL.ink,a);
  g.beginPath(); g.ellipse(x-7+px,y+py,1.7,1.9,0,0,6.2832); g.fill();
  g.beginPath(); g.ellipse(x+7+px,y+py,1.7,1.9,0,0,6.2832); g.fill();
  g.restore();
}

  try{drawFaceScare(g,camX,camY)}catch(_){} try{drawDartScare(g,camX,camY)}catch(_){} try{drawWatchingEyes(g,camX,camY)}catch(_){}

  try{drawLingerLean(g)}catch(_){} try{drawBreathVignette(g)}catch(_){} try{drawDreadCRT(g)}catch(_){}

function drawDoors(g){

function drawImpacts(g){

function drawDischarge(g){

/* Procedural textures (built once) + lighting/atmosphere helpers.        */
const Tex = { grime:null, fog:null, grain:[], paper:null, ready:false };
function buildTextures(){

// --- day/night sky model: darkness + ambient tint keyframed across 24h ---
function skyState(h){
  const K=[ // [hour, darkness, topR,topG,topB, botR,botG,botB]  — moody but readable
    [0,  0.66, 12,17,28,   7,10,20],
    [5,  0.60, 16,20,32,  10,13,24],
    [7,  0.38, 58,40,42,  30,24,36],   // dawn — warm mauve
    [9,  0.22, 42,50,60,  30,36,48],   // morning overcast
    [13, 0.15, 58,64,74,  44,50,60],   // grim midday (still grey)
    [17, 0.26, 64,42,38,  38,26,34],   // dusk — warm
    [19, 0.44, 22,24,40,  14,15,30],
    [21, 0.63, 12,16,28,   7,10,20],
    [24, 0.66, 12,17,28,   7,10,20],
  ];
  let a=K[0], b=K[K.length-1];
  for(let i=0;i<K.length-1;i++){ if(h>=K[i][0] && h<=K[i+1][0]){ a=K[i]; b=K[i+1]; break; } }
  const t=(h-a[0])/((b[0]-a[0])||1), L=i=>Math.round(lerp(a[i],b[i],t));
  return { dark:lerp(a[1],b[1],t), top:[L(2),L(3),L(4)], bot:[L(5),L(6),L(7)] };
}
// --- 2D shadow casting: occluders (walls) throw shadows away from a light, clipped to its reach ---
function castShadows(g, lx, ly, reach, camX, camY, alpha, occ){
  occ = occ || scene.walls;
  g.save();
  g.beginPath(); g.arc(lx-camX, ly-camY, reach, 0, 7); g.clip();
  const F=reach*1.55;   // shorter throw
  const proj=(px,py)=>{ const dx=px-lx, dy=py-ly, d=Math.hypot(dx,dy)||1; return [px+dx/d*F, py+dy/d*F]; };
  for(const w of occ){
    if(Math.abs(w.x+w.w/2-lx) > reach+w.w+30 || Math.abs(w.y+w.h/2-ly) > reach+w.h+30) continue;
    const cs=[[w.x,w.y],[w.x+w.w,w.y],[w.x+w.w,w.y+w.h],[w.x,w.y+w.h]];
    for(let i=0;i<4;i++){ const a=cs[i], b=cs[(i+1)%4];
      const nx=b[1]-a[1], ny=-(b[0]-a[0]);            // outward normal (CW winding)
      const mx=(a[0]+b[0])/2, my=(a[1]+b[1])/2;
      if(nx*(lx-mx)+ny*(ly-my) < 0){                  // back-facing edge → casts
        const pa=proj(a[0],a[1]), pb=proj(b[0],b[1]);
        const ex=mx-camX, ey=my-camY, fxp=(pa[0]+pb[0])/2-camX, fyp=(pa[1]+pb[1])/2-camY;
        const gr=g.createLinearGradient(ex,ey,fxp,fyp);      // dark at the base → soft to nothing
        gr.addColorStop(0,'rgba(4,6,11,'+alpha.toFixed(3)+')');
        gr.addColorStop(0.35,'rgba(4,6,11,'+(alpha*0.42).toFixed(3)+')');
        gr.addColorStop(1,'rgba(4,6,11,0)');
        g.fillStyle=gr;
        g.beginPath(); g.moveTo(a[0]-camX,a[1]-camY); g.lineTo(b[0]-camX,b[1]-camY);
        g.lineTo(pb[0]-camX,pb[1]-camY); g.lineTo(pa[0]-camX,pa[1]-camY); g.closePath(); g.fill();
      }
    }
  }
  g.restore();
}

const OCCLUDER_PROPS = new Set(['car','phone','crate','bed','generator','junction','xfmr','batteries','cabinet',
  'desk','cot','sign','gate','rack','terrace','arcCabinet','bench2','breaker','bearing','tapes','triageRack','voiceprint','recorder','body']);
// the ground-contact footprint of a standing prop (bottom-centre) — used for BOTH
// collision and shadow-casting so shadows anchor where the object meets the ground.
function propFootprint(p){ return { x:p.x+p.w*0.14, y:p.y+p.h*0.52, w:p.w*0.72, h:p.h*0.44 }; }
// A small ground-contact strip at the very base — used ONLY for shadow casting, so the
// projected shadow reads as a soft directional smear where the object meets the ground,
// rather than a hard rectangle drawn around the whole object silhouette.
function propShadowBox(p){ const sw=p.w*0.52, sh=Math.max(4,p.h*0.11); return { x:p.x+p.w*0.5-sw/2, y:p.y+p.h-sh*1.5, w:sw, h:sh }; }
function buildOccluders(sc){
  const occ = sc.walls.slice();          // buildings keep their full footprint
  const solids = [];
  // Only LARGE structures (buildings, lampposts, tall signs) cast directional light-shadows — small clutter
  // casting hard wedges made an ugly starburst around lamps. Everything still gets an ambient contact shadow
  // (drawGroundShadows) + blocks movement (solids).
  for(const p of sc.props){ if(OCCLUDER_PROPS.has(p.t)){ solids.push(propFootprint(p)); if(p.h>=120) occ.push(propShadowBox(p)); } }
  sc.solids = solids;                     // solid props block movement (base footprint)
  return occ;
}

function drawGroundShadows(g,camX,camY){
  if(scene.indoor) return;

  const dark=skyState((State.time/3600)%24).dark;

); g.fillRect(x-2,y-4,w*0.7,5); g.fillStyle=hexA('#0a120d',0.4); g.fillRect(x+w*0.4,y-2,w*0.3,2); var dp=(Game.t*40)%(h*0.2); g.fillStyle=hexA(COL.cyanDim,0.35); g.fillRect(pipeX+2,y+h*0.75+dp,1.5,4); if(opts.dish!==false){ var dx=x+w*0.82, dy=y+h*0.22; g.fillStyle=shade(COL.steel,0.9); g.fillRect(dx-1,dy,2,14); g.fillStyle=shade(COL.ivory,0.7); g.beginPath(); g.ellipse(dx,dy,9,7,-0.4,0,6.283); g.fill(); g.fillStyle=hexA('#000000',0.3); g.beginPath(); g.ellipse(dx,dy,9,7,-0.4,0,6.283); g.fill(); g.fillStyle=COL.steel; g.beginPath(); g.arc(dx+2,dy-1,1.5,0,6.283); g.fill(); } g.fillStyle=shade(COL.steel,0.6); g.fillRect(x+w*0.15,y+h*0.55,14,10); g.strokeStyle=hexA('#000000',0.5); g.lineWidth=1; for(var vv=0;vv<3;vv++){ g.beginPath(); g.moveTo(x+w*0.15,y+h*0.55+(vv+1)*3); g.lineTo(x+w*0.15+14,y+h*0.55+(vv+1)*3); g.stroke(); } g.strokeStyle=shade(COL.rust,0.9); g.lineWidth=3; g.beginPath(); g.moveTo(x+w*0.05,y+h*0.6); g.lineTo(x+w*0.05,y+h); g.stroke(); g.strokeStyle=hexA('#0a0a0a',0.8); g.lineWidth=1.4; g.beginPath(); g.moveTo(x+w*0.3,y+2); g.quadraticCurveTo(x+w*0.45,y+30+Math.sin(Game.t*0.6)*2,x+w*0.6,y+8); g.stroke(); g.beginPath(); g.moveTo(x+w*0.6,y+8); g.quadraticCurveTo(x+w*0.7,y+40,x+w*0.68,y+70); g.stroke(); if(opts.crt!==false){ var cx2=x+w*0.5, cy2=y+h*0.62; g.fillStyle=shade(COL.steel,0.5); roundRect(g,cx2,cy2,26,20,2); g.fill(); g.fillStyle='#05080a'; roundRect(g,cx2+3,cy2+3,20,14,1); g.fill(); if(d_hash(Math.floor(Game.t*2),3)>0.85){ var fl=0.06+0.03*Math.sin(Game.t*30+cx2); g.fillStyle=hexA(COL.cyanDim,fl*3); g.fillRect(cx2+3,cy2+3,20,14); } } if(opts.ivy){ d_ivy(g,x,y+h*0.5,w*0.3,h*0.5); } g.fillStyle=hexA('#000000',0.25); g.fillRect(x,y,w,h*0.08); g.fillStyle=hexA(COL.ivory,0.03); g.fillRect(x,y+h*0.85,w,h*0.15); g.restore(); }
function d_blob(g,cx,cy,rw,rh,sx,sy,n){ g.beginPath(); for(var i=0;i<=n;i++){ var a=i/n*Math.PI*2; var rr=1+0.24*Math.sin(a*3+sx*0.13)+0.16*Math.cos(a*2+sy*0.17); var px=cx+Math.cos(a)*rw*rr; var py=cy+Math.sin(a)*rh*rr; if(i===0) g.moveTo(px,py); else g.lineTo(px,py); } g.closePath(); }
function d_eshadow(g,e){ g.save(); g.globalAlpha=0.35; g.fillStyle='#000000'; g.beginPath(); g.ellipse(e.x+e.w/2, e.y+e.h*0.94, e.w*0.55, e.h*0.16, 0, 0, Math.PI*2); g.fill(); g.restore(); }
function d_hem(g,x,y,w,col,depth){ g.save(); g.fillStyle=col; var n=6, s=w/n; for(var i=0;i<n;i++){ g.beginPath(); g.moveTo(x+i*s,y); g.lineTo(x+(i+1)*s,y); g.lineTo(x+i*s+s*0.5, y+depth*(0.55+0.5*((i*13%5)/5))); g.closePath(); g.fill(); } g.restore(); }
function d_drip(g,x,y,len,col,phase){ var t=(Game.t*0.55+phase)%1; var dy=t*len; g.save(); g.globalAlpha=0.5*(1-t); g.fillStyle=col; g.beginPath(); g.ellipse(x, y+dy, 1.1, 2.3, 0, 0, Math.PI*2); g.fill(); g.restore(); }
function d_flash(g,e){ if(!e.flash||e.flash<=0) return; g.save(); g.globalAlpha=clamp(e.flash,0,1)*0.6; g.fillStyle=COL.red; roundRect(g,e.x,e.y,e.w,e.h,e.w*0.3); g.fill(); g.restore(); }
function d_wind(t){
  // shared coherent wind signal ~[-1..1] with slow swelling gusts
  var base = Math.sin(t*0.6)*0.6 + Math.sin(t*1.7+1.3)*0.25;
  var gust = Math.max(0, Math.sin(t*0.23+0.5));
  return base * (0.55 + 0.45*gust);
}
function d_cable(g,x1,y1,x2,y2,sag,sw){
  // single sagging catenary-ish cable, control point pushed by wind sway sw
  var mx=(x1+x2)/2 + sw;
  var my=(y1+y2)/2 + sag - sw*0.15;
  g.beginPath();
  g.moveTo(x1,y1);
  g.quadraticCurveTo(mx,my,x2,y2);
  g.stroke();
}
function d_moths(g,cx,cy,r,t,n,col){
  // n pale moths on wobbling elliptical orbits around a glow
  g.fillStyle=col;
  for(var i=0;i<n;i++){
    var a=t*(1.1+0.3*i)+i*2.1;
    var rr=r*(0.6+0.35*Math.sin(t*2.3+i*1.7));
    var mx=cx+Math.cos(a)*rr;
    var my=cy+Math.sin(a)*rr*0.6;
    g.globalAlpha=0.45+0.35*Math.sin(t*7+i*1.3);
    g.beginPath();
    g.arc(mx,my,1.1,0,6.283);
    g.fill();
  }
  g.globalAlpha=1;
}
function d_scrap(g,x,y,s,rot,alpha){
  // tumbling paper scrap: lit face + shaded fold
  g.save();
  g.translate(x,y);
  g.rotate(rot);
  g.globalAlpha=alpha;
  g.fillStyle='#b8b09c';
  g.beginPath();
  g.moveTo(-s,-s*0.7); g.lineTo(s,-s*0.4); g.lineTo(s*0.8,s*0.7); g.lineTo(-s*0.9,s*0.5); g.closePath();
  g.fill();
  g.globalAlpha=alpha*0.6;
  g.fillStyle='#6b6656';
  g.beginPath();
  g.moveTo(-s,-s*0.7); g.lineTo(0,-s*0.2); g.lineTo(-s*0.9,s*0.5); g.closePath();
  g.fill();
  g.restore();
  g.globalAlpha=1;
}
function d_lifeSpawns(camX,camY){
  // UPDATE-loop hook: sparse wind-driven dust/static motes during gusts.
  // Uses global g (context) + existing spawnFx/efx.
  var t=Game.t, W=g.canvas.width, H=g.canvas.height, wnd=d_wind(t);
  if(Math.abs(wnd)>0.6 && Math.random()<0.05){
    var gx=camX+Math.random()*W;
    var gy=camY+H*(0.25+Math.random()*0.6);
    var nn=2+((Math.random()*3)|0);
    spawnFx(gx,gy,nn,{col:'rgba(150,148,138,',spd:50+Math.abs(wnd)*40,life:1.4,size:1.2,grav:-3,kind:'static',ang:wnd>0?0.15:3.0});
  }
}
function drawNPCFigure(g,x,y,dir,spec){
  spec=spec||{};
  var coat=spec.coat||COL.coat;
  var skin=spec.skin||COL.skin;
  var hair=spec.hair||'#241d18';
  var hat=spec.hat||null;
  var prop=spec.prop||null;
  var accent=spec.accent||COL.amber;
  var build=spec.build||1;
  var seed=(spec.seed!=null)?spec.seed:((x*0.137+y*0.071)%6.283);
  var t=Game.t;
  // idle animation: breathing swell + occasional head look (odd power keeps it near 0, swings rarely)
  var breath=Math.sin(t*1.5+seed)*0.5+0.5;
  var breathe=1+breath*0.03;
  var look=Math.pow(Math.sin(t*0.45+seed*1.7),9)*0.55;

  g.save();
  g.translate(x,y);
  // soft ground shadow (kept ground-aligned, drawn before rotate)
  g.fillStyle=hexA('#000000',0.30);
  g.beginPath();
  g.ellipse(2*build,5*build,13*build,6.5*build,0,0,Math.PI*2);
  g.fill();
  g.rotate(dir||0);

  var bw=9*build, bl=11.5*build*breathe;

  // coat body (front-back elongated ellipse), volume via vertical gradient
  vgrad(g,-bw,-bl,bw*2,bl*2,shade(coat,1.18),shade(coat,0.62));
  g.beginPath();
  g.ellipse(0,0,bw,bl,0,0,Math.PI*2);
  g.fill();
  // darker rear hem
  g.fillStyle=hexA('#000000',0.18);
  g.beginPath();
  g.ellipse(0,bl*0.35,bw*0.92,bl*0.5,0,0,Math.PI*2);
  g.fill();
  // spine seam
  g.strokeStyle=shade(coat,0.5); g.lineWidth=0.8*build;
  g.beginPath(); g.moveTo(0,-bl*0.5); g.lineTo(0,bl*0.7); g.stroke();
  // faint shoulder highlight toward front
  g.fillStyle=hexA('#ffffff',0.05);
  g.beginPath(); g.ellipse(0,-bl*0.25,bw*0.8,bl*0.4,0,0,Math.PI*2); g.fill();
  // wet coat sheen (additive, breathes)
  g.globalCompositeOperation='lighter';
  g.fillStyle=hexA('#9fd0e0',0.06+0.04*breath);
  g.beginPath(); g.ellipse(-bw*0.35,-bl*0.1,bw*0.30,bl*0.55,-0.15,0,Math.PI*2); g.fill();
  g.globalCompositeOperation='source-over';

  // arms
  g.fillStyle=shade(coat,0.82);
  g.beginPath(); g.ellipse(-bw*0.95,-bl*0.05,3.1*build,5.4*build,0.15,0,Math.PI*2); g.fill();
  g.beginPath(); g.ellipse( bw*0.95,-bl*0.05,3.1*build,5.4*build,-0.15,0,Math.PI*2); g.fill();

  // held prop (front-right hand)
  if(prop) d_npcProp(g,prop,bw,bl,build,accent);

  // head group (crown seen from above + front face crescent), with subtle look turn
  g.save();
  var hy=-bl*0.5;
  g.translate(0,hy);
  g.rotate(look);
  // neck shadow
  g.fillStyle=shade(skin,0.6);
  g.beginPath(); g.ellipse(0,3.5*build,3*build,3*build,0,0,Math.PI*2); g.fill();
  // hair crown
  g.fillStyle=hair;
  g.beginPath(); g.ellipse(0,0,5.6*build,5.6*build,0,0,Math.PI*2); g.fill();
  g.fillStyle=shade(hair,1.25);
  g.beginPath(); g.ellipse(-1.5*build,-1.5*build,2.4*build,2.4*build,0,0,Math.PI*2); g.fill();
  // face crescent (brow/nose) at front
  g.fillStyle=skin;
  g.beginPath(); g.ellipse(0,-3.6*build,2.6*build,2.2*build,0,0,Math.PI*2); g.fill();
  g.fillStyle=shade(skin,1.12);
  g.beginPath(); g.ellipse(0,-4.4*build,1.1*build,0.9*build,0,0,Math.PI*2); g.fill();
  if(hat) d_npcHat(g,hat,build,accent);
  g.restore();

  g.restore();
}
function d_npcProp(g,prop,bw,bl,build,accent){
  // hand position: front-right of the torso
  var hx=bw*0.95, hy=-bl*0.55;
  g.save();
  switch(prop){
    case 'tool': // carpenter: hammer + amber paint tin
      g.strokeStyle=COL.timber; g.lineWidth=1.6*build; g.lineCap='round';
      g.beginPath(); g.moveTo(hx-1*build,hy+4*build); g.lineTo(hx+3*build,hy-4*build); g.stroke();
      g.fillStyle=COL.steel;
      g.save(); g.translate(hx+3*build,hy-4*build); g.rotate(-0.6);
      roundRect(g,-3*build,-1.6*build,6*build,3.2*build,1*build); g.fill();
      g.restore();
      g.fillStyle=shade(COL.steel,0.9);
      roundRect(g,-bw*0.6,bl*0.55,4.5*build,4*build,1*build); g.fill();
      g.fillStyle=accent;
      g.beginPath(); g.ellipse(-bw*0.6+2.25*build,bl*0.55+0.6*build,2*build,0.9*build,0,0,Math.PI*2); g.fill();
      break;
    case 'kit': // medic: white kit with red cross
      g.fillStyle=COL.ivory;
      roundRect(g,hx-3*build,hy-2.5*build,6*build,5*build,1*build); g.fill();
      g.strokeStyle=COL.red; g.lineWidth=1.1*build; g.lineCap='butt';
      g.beginPath(); g.moveTo(hx,hy-1.4*build); g.lineTo(hx,hy+1.4*build); g.moveTo(hx-1.4*build,hy); g.lineTo(hx+1.4*build,hy); g.stroke();
      break;
    case 'radio': // handheld set with antenna + cyan signal tick
      g.fillStyle=shade(COL.steel,0.7);
      roundRect(g,hx-2*build,hy-3*build,4*build,6*build,0.8*build); g.fill();
      g.strokeStyle=COL.steel; g.lineWidth=0.9*build; g.lineCap='round';
      g.beginPath(); g.moveTo(hx+1*build,hy-3*build); g.lineTo(hx+2.5*build,hy-8*build); g.stroke();
      g.fillStyle=hexA(COL.cyan,0.7+0.25*Math.sin(Game.t*6));
      g.beginPath(); g.ellipse(hx,hy-1*build,0.9*build,0.9*build,0,0,Math.PI*2); g.fill();
      break;
    case 'ledger': // held to chest, ruled pages
      g.save(); g.rotate(-0.15);
      g.fillStyle=COL.timber;
      roundRect(g,-2.5*build,-bl*0.15,5*build,7*build,0.6*build); g.fill();
      g.fillStyle=COL.ivory;
      roundRect(g,-2*build,-bl*0.15+0.6*build,4*build,5.6*build,0.4*build); g.fill();
      g.strokeStyle=shade(COL.ivory,0.6); g.lineWidth=0.4*build;
      for(var i=0;i<4;i++){ var ly=-bl*0.15+1.8*build+i*1.1*build; g.beginPath(); g.moveTo(-1.4*build,ly); g.lineTo(1.4*build,ly); g.stroke(); }
      g.restore();
      break;
    case 'clipboard': // engineer clipboard with clip

      roundRect(g,hx-1.4*build,hy-1.4*build,5*build,2.8*build,0.8*build); g.fill();

      var bg=g.createLinearGradient(hx+3.6*build,hy,hx+18*build,hy);

      g.fillStyle=bg;
      g.beginPath();
      g.moveTo(hx+3.6*build,hy-1.2*build);
      g.lineTo(hx+18*build,hy-6*build);
      g.lineTo(hx+18*build,hy+6*build);
      g.lineTo(hx+3.6*build,hy+1.2*build);

      g.beginPath(); g.moveTo(hx+1.5*build,hy+1.5*build); g.lineTo(hx+4*build,hy+4*build); g.stroke();
      g.beginPath(); g.moveTo(hx-1.5*build,hy+1.8*build); g.lineTo(hx-3.5*build,hy+4.2*build); g.stroke();
      break;

      g.strokeStyle=COL.timber; g.lineWidth=1.8*build; g.lineCap='round';
      g.beginPath(); g.moveTo(hx+1*build,hy-9*build); g.lineTo(hx-1*build,bl*0.7); g.stroke();

      g.beginPath(); g.arc(hx+1*build,hy-9*build,3*build,-0.3,Math.PI*1.1); g.stroke();

}

      g.strokeStyle=shade(accent,0.6); g.lineWidth=0.7*build;
      g.beginPath(); g.moveTo(-5*build,0); g.lineTo(5*build,0); g.stroke();
      break;

      g.beginPath(); g.ellipse(0,-3*build,3.4*build,3*build,0,0,Math.PI*2); g.fill();

      g.beginPath(); g.moveTo(5.2*build,1*build); g.lineTo(2*build,-4*build); g.stroke();
      break;

}

function d_ellieExtras(g,cx,cy,dir){
  // Call AFTER the existing player draw. Adds wet coat sheen, moving hair strands, cold breath fog.
  var t=Game.t;
  g.save();
  g.translate(cx,cy);
  g.rotate(dir||0);
  var build=1;
  var bl=11.5*build;
  var hy=-bl*0.5; // approx head centre in local space
  // wet coat sheen (additive, slow pulse)
  g.globalCompositeOperation='lighter';
  g.fillStyle=hexA('#bfeaff',0.09+0.06*(Math.sin(t*1.3)*0.5+0.5));
  g.beginPath(); g.ellipse(-2.2,1,3.0,7.0,-0.2,0,Math.PI*2); g.fill();
  g.globalCompositeOperation='source-over';
  // hair strands catching the wind near the crown
  g.strokeStyle=hexA('#1c1712',0.7); g.lineWidth=0.8; g.lineCap='round';
  for(var i=0;i<4;i++){
    var a=-1.2+i*0.8;
    var sw=Math.sin(t*2.2+i*1.7)*1.2;
    g.beginPath();
    g.moveTo(Math.cos(a)*4, hy+Math.sin(a)*4);
    g.lineTo(Math.cos(a)*7+sw, hy+Math.sin(a)*7+1.5);
    g.stroke();
  }
  // faint breath fog in the cold, periodic puff drifting forward
  var per=4.2, ph=(t%per)/per;
  if(ph<0.5){
    var k=ph/0.5;
    var pr=1.5+k*5;
    g.globalCompositeOperation='lighter';
    g.fillStyle=hexA('#dfeef2',(1-k)*0.20);
    g.beginPath(); g.ellipse(0, hy-6-k*6, pr, pr*1.1,0,0,Math.PI*2); g.fill();
    g.globalCompositeOperation='source-over';
  }
  g.restore();
}
