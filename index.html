function drawHollow(g,e){ const cx=e.x+e.w/2, fy=e.y+e.h*0.92;
const t=Game.t, ph=e.anim||0;
const px=(player&&player.x!=null)?player.x:cx;
const dir=Math.sign(px-cx)||1;
d_eshadow(g,e);

// --- loop / beat clock (never varies; doubles tempo on aggro) ---
const aggro=e.tele>0;
const tempo=aggro?2:1;
const loopT=t*tempo+ph;
const nod=Math.sin(loopT*2.3);
const nodTilt=Math.sin(loopT*2.3-0.6);
const beatPulse=Math.pow(0.5+0.5*Math.sin(loopT*2.3-1.2),6);
const flareRed=aggro;

// --- frame-buffer stutter / ghost-jump ---
const stutCyc=(t%3.6)/3.6;
const stutterAmt=stutCyc<0.16?(1-stutCyc/0.16):0;

// --- decay from remaining hp ---
const maxhp=e.maxhp||70;
const decay=Math.min(1,Math.max(0,1-(e.hp!=null?e.hp:maxhp)/maxhp));

// --- geometry (stooped, looms upward from fy) ---
const H=e.h*1.95, bodyW=e.w*0.98;
const gait=e._moving?Math.abs(Math.sin(t*6+ph))*e.h*0.06:0;
const swayX=Math.sin(t*0.85+ph)*3;
const jumpX=-dir*8*stutterAmt;
const baseY=fy, hipY=fy-H*0.34, shoY=fy-H*0.68-gait;
const leanX=dir*H*0.15;
const halfHip=bodyW*0.5, halfSho=bodyW*0.36;
const shcx=cx+leanX+swayX+jumpX;
const baseCx=cx+swayX*0.25+jumpX;
const gcx=cx+leanX+swayX;                 // pre-jump ghost centre

// head
const nodBob=nod*e.h*0.12;
const headTilt=nodTilt*0.16*dir;
const hx=shcx+dir*e.w*0.10;
const hy=shoY-bodyW*0.34+nodBob;
const hrx=e.w*0.44, hry=e.h*0.52;

// --- RGB-split after-image left behind on stutter ---
if(stutterAmt>0.01){
  g.save(); g.globalCompositeOperation='lighter';
  const gc=[[-3.5,COL.cyan],[3.5,COL.red]];
  for(let k=0;k<2;k++){
    g.globalAlpha=0.30*stutterAmt; g.fillStyle=gc[k][1];
    const ox=gc[k][0];
    roundRect(g,gcx-halfHip+ox,shoY-bodyW*0.30,bodyW,H*0.75,bodyW*0.42); g.fill();
    g.beginPath(); g.ellipse(gcx+dir*e.w*0.10+ox,hy,hrx,hry,0,0,Math.PI*2); g.fill();
  }
  g.restore();
}

// --- drooping charcoal capsule body ---
g.beginPath();
g.moveTo(baseCx-halfHip,baseY);
g.quadraticCurveTo(cx-halfHip*1.02+jumpX,hipY,shcx-halfSho,shoY);
g.quadraticCurveTo(shcx,shoY-bodyW*0.55,shcx+halfSho,shoY);
g.quadraticCurveTo(cx+halfHip*1.02+jumpX,hipY,baseCx+halfHip,baseY);
g.closePath();
vgrad(g,cx-halfHip,shoY-bodyW*0.55,bodyW,H,shade(COL.steel,0.55),COL.ink); g.fill();
// bruise-green edge banding
g.lineWidth=1.6; g.strokeStyle=hexA(shade(COL.grass,1.8),0.55); g.stroke();
g.lineWidth=1; g.strokeStyle=hexA(COL.cyanDim,0.25); g.stroke();
d_hem(g,baseCx,baseY,bodyW*0.9,COL.ink,5);
if(decay>0.3){
  d_drip(g,baseCx-halfHip*0.4,baseY-4,6+decay*8,shade(COL.grass,1.3),t*0.7);
  d_drip(g,baseCx+halfHip*0.3,baseY-4,5+decay*6,COL.cyanDim,t*0.9+1);
}
// scan-line tearing as it decays
if(decay>0.15){
  g.save(); g.globalAlpha=0.12*decay;
  for(let i=0;i<3;i++){
    const yy=shoY-bodyW*0.4+((t*40+i*50)%(H*0.75));
    g.fillStyle=(i%2)?COL.cyan:COL.red;
    g.fillRect(baseCx-halfHip,yy,bodyW,1.5);
  }
  g.restore();
}

// --- thin dangling two-segment arms (sway a beat behind torso) ---
const armLag=Math.sin(t*0.85+ph-1.0)*7;
const aY0=shoY+bodyW*0.04;
const armCap=fy-e.h*0.05;                 // never let hands cross the feet line
g.save();
g.lineCap='round'; g.lineJoin='round';
for(let s=-1;s<=1;s+=2){
  const front=(s===dir);
  const sx=shcx+s*halfSho*0.82, sy=aY0;
  const stretch=(front&&aggro)?(1+e.tele*0.8):1;   // late heavy over-reach
  const ex=sx+s*e.w*0.06+armLag*0.45, ey=Math.min(sy+H*0.20*stretch,armCap);
  const hnx=ex+armLag*0.8+((front&&aggro)?dir*e.w*0.35*e.tele:0), hny=Math.min(ey+H*0.22*stretch,armCap);
  g.strokeStyle=shade(COL.steel,0.5); g.lineWidth=e.w*0.13;
  g.beginPath(); g.moveTo(sx,sy); g.lineTo(ex,ey); g.lineTo(hnx,hny); g.stroke();
  g.strokeStyle=hexA(shade(COL.grass,1.6),0.4); g.lineWidth=1.4;
  g.beginPath(); g.moveTo(sx,sy); g.lineTo(ex,ey); g.lineTo(hnx,hny); g.stroke();
  g.fillStyle=shade(COL.steel,0.45); g.beginPath(); g.arc(hnx,hny,e.w*0.07,0,Math.PI*2); g.fill();
}
g.restore();

// --- amber human trace leaking when exposed ---
if(e.exposed>0){
  const pu=0.5+0.5*Math.sin(t*8);
  softGlow(g,shcx,shoY+bodyW*0.22,e.w*(0.4+0.2*pu),COL.amber,0.4*e.exposed,0.2*e.exposed);
}

// --- taut cyan cable into chest, pulses on each nod ---
const cabTx=hx-dir*hrx*0.55, cabTy=hy+hry*0.55;
const cabBx=shcx-dir*e.w*0.02, cabBy=shoY+bodyW*0.18;
g.strokeStyle=hexA(COL.cyan,0.45+0.5*beatPulse); g.lineWidth=1.4+beatPulse*1.4;
g.beginPath(); g.moveTo(cabTx,cabTy);
g.quadraticCurveTo((cabTx+cabBx)/2+Math.sin(t*3)*2,(cabTy+cabBy)/2,cabBx,cabBy);
g.stroke();
if(beatPulse>0.15) softGlow(g,cabBx,cabBy,e.w*0.5*beatPulse,COL.cyan,beatPulse*0.5,beatPulse*0.25);

// --- the tell: nodding hollow head ---
g.save(); g.translate(hx,hy); g.rotate(headTilt);
// heavy headphone band over the top
g.lineCap='round'; g.strokeStyle=shade(COL.steel,0.75); g.lineWidth=e.w*0.15;
g.beginPath(); g.arc(0,0,hrx*1.15,Math.PI*1.18,Math.PI*1.82); g.stroke();
// ear cups clamped over where ears would be
g.fillStyle=shade(COL.steel,0.62);
g.beginPath(); g.ellipse(-hrx*1.05,0,e.w*0.13,hry*0.55,0,0,Math.PI*2); g.fill();
g.beginPath(); g.ellipse( hrx*1.05,0,e.w*0.13,hry*0.55,0,0,Math.PI*2); g.fill();
g.strokeStyle=hexA(COL.cyanDim,0.6); g.lineWidth=1.2;
g.beginPath(); g.ellipse(-hrx*1.05,0,e.w*0.08,hry*0.35,0,0,Math.PI*2); g.stroke();
g.beginPath(); g.ellipse( hrx*1.05,0,e.w*0.08,hry*0.35,0,0,Math.PI*2); g.stroke();
// ragged black cavity
const seg=28;
g.beginPath();
for(let i=0;i<=seg;i++){
  const a=i/seg*Math.PI*2;
  const rr=1+0.12*Math.sin(a*5+t*4.5)*(0.5+0.5*Math.sin(i*2.7+t));
  const qx=Math.cos(a)*hrx*rr, qy=Math.sin(a)*hry*rr;
  i?g.lineTo(qx,qy):g.moveTo(qx,qy);
}
g.closePath();
g.fillStyle=COL.ink; g.fill();
// crawling / scrubbing static (clipped to cavity)
g.save(); g.clip();
const stat=shade(COL.concrete,2.1);
const scrub=Math.sin(t*2.6)*hrx*0.4;
const fr=Math.floor(t*20);
for(let i=0;i<52;i++){
  const rx=(Math.sin(i*12.9898+fr*0.7)*0.5+0.5);
  const ry=(Math.sin(i*4.14+fr*1.3)*0.5+0.5);
  const sx=-hrx+rx*hrx*2+scrub, sy=-hry+ry*hry*2;
  const a=0.18+0.55*(Math.sin(i*3.1+t*22)*0.5+0.5);
  g.fillStyle=hexA(flareRed?COL.red:stat,a);
  g.fillRect(sx,sy,1.7,1.7);
}
g.strokeStyle=hexA(flareRed?COL.red:stat,0.5+0.3*Math.sin(t*10)); g.lineWidth=1;
g.beginPath();
for(let i=0;i<=20;i++){
  const wx=-hrx+i/20*hrx*2;
  const wy=Math.sin(i*0.9+t*6+scrub)*hry*0.35;
  i?g.lineTo(wx,wy):g.moveTo(wx,wy);
}
g.stroke();
g.restore(); // end clip
// ragged rim
g.beginPath();
for(let i=0;i<=seg;i++){
  const a=i/seg*Math.PI*2;
  const rr=1+0.12*Math.sin(a*5+t*4.5)*(0.5+0.5*Math.sin(i*2.7+t));
  const qx=Math.cos(a)*hrx*rr, qy=Math.sin(a)*hry*rr;
  i?g.lineTo(qx,qy):g.moveTo(qx,qy);
}
g.closePath();
g.strokeStyle=hexA(flareRed?COL.red:shade(COL.grass,1.6),0.55); g.lineWidth=1.4; g.stroke();
if(flareRed) softGlow(g,0,0,hrx*1.4,COL.red,0.35+0.3*e.tele,0.2);
g.restore(); // end head transform

// --- Continuity 'completes' the swing: red arc toward player ---
if(e.tele>0){
  const py=(player&&player.y!=null)?player.y:e.y;
  const ang=Math.atan2(py-e.y,px-cx);
  const rr=e.w*(1.1+e.tele*1.3);
  g.save(); g.globalCompositeOperation='lighter';
  g.strokeStyle=hexA(COL.red,0.3+0.35*e.tele); g.lineWidth=3;
  g.beginPath(); g.arc(shcx,shoY,rr,ang-0.55,ang+0.55); g.stroke();
  g.restore();
}

d_flash(g,e);
}
function drawWraith(g,e){ const cx=e.x+e.w/2, fy=e.y+e.h*0.92;
const T = Game.t;
d_eshadow(g, e);

// --- exposure blend: how "resolved" the wraith is (0 hidden .. 1 fully exposed) ---
const exp = Math.max(0, Math.min(1, (e.exposed || 0)));
// hidden ghost never quite reaches 0 presence; keep a faint pulse so empty air feels wrong
const hidePulse = 0.5 + 0.5 * Math.sin(T * 1.7 + (e.anim || 0));

// person-tall, unnaturally narrow, ~1.5x tall
const H = e.h * 2.15;                 // total drawn height
const topY = fy - H;                  // head-top line
const bodyW = e.w * 0.62;             // narrow
const midY = fy - H * 0.5;

// drift wobble (slow when hidden, jittery when exposed)
const driftX = Math.sin(T * 0.9 + (e.anim || 0)) * (2 + exp * 3);
const cxx = cx + driftX;

// travelling scanline band position (loops up the region)
const bandY = fy - ((T * 60 + (e.anim || 0) * 40) % (H + 40));

g.save();

// ============================================================
// HIDDEN MODE — a drifting lens of distortion + travelling scanline
// visible whenever not fully exposed (fades out as exp rises)
// ============================================================
const hideA = (1 - exp);
if (hideA > 0.01) {
  g.save();
  g.globalAlpha = hideA;
  // soft rectangle of "bent" background: faint duplicated/offset ghost bands
  const lensX = cxx - bodyW * 0.75;
  const lensW = bodyW * 1.5;
  const heat = Math.sin(T * 3.1 + (e.anim || 0)) * 2.2; // heat-haze wobble
  for (let i = 0; i < 14; i++) {
    const yy = topY + (i / 13) * H;
    if (yy >= fy) break;                                  // never draw below fy
    const rh = Math.min(H / 13 + 1, fy - yy);             // clamp to ground line
    const off = Math.sin(T * 2.0 + i * 0.7 + (e.anim || 0)) * (1.6 + hidePulse * 1.4) + heat;
    // duplicated background smear: two faint offset grey slabs (lighter comp)
    g.globalCompositeOperation = 'lighter';
    g.fillStyle = hexA(shade(COL.concrete, 1.25), 0.05 * hideA);
    g.fillRect(lensX + off, yy, lensW, rh);
    g.fillStyle = hexA(COL.ink, 0.045 * hideA);
    g.fillRect(lensX - off, yy, lensW, rh);
  }
  g.globalCompositeOperation = 'source-over';
  // faint grey scanlines across the lens (the only steady cue)
  g.fillStyle = hexA(COL.ivory, 0.05 * hideA);
  for (let sy = topY; sy < fy - 1; sy += 4) {
    const w = bodyW * (0.9 + 0.25 * Math.sin(sy * 0.2 + T));
    g.fillRect(cxx - w * 0.5, sy, w, 1);
  }
  // travelling bright scanline band — the "something is here" tell (clamped to fy)
  g.globalCompositeOperation = 'lighter';
  const bandA = 0.16 * hideA * (0.6 + 0.4 * hidePulse);
  if (bandY < fy) {
    g.fillStyle = hexA(COL.cyan, bandA);
    g.fillRect(cxx - bodyW * 0.8, bandY, bodyW * 1.6, Math.min(2, fy - bandY));
  }
  if (bandY + 3 < fy) {
    g.fillStyle = hexA(COL.cyanDim, bandA * 0.6);
    g.fillRect(cxx - bodyW * 0.8, bandY + 3, bodyW * 1.6, Math.min(5, fy - (bandY + 3)));
  }
  g.globalCompositeOperation = 'source-over';
  g.restore();
}

// ============================================================
// EXPOSED MODE — snap into torn, chromatic-split humanoid
// three offset copies: red-shift (left), cyan-shift (right), grey core (lagging)
// ============================================================
if (exp > 0.02) {
  g.save();
  g.globalAlpha = exp;

  // per-frame RGB jitter — violent when exposed, driven off T so it shivers
  const sep = (3 + exp * 5) * (0.7 + 0.3 * Math.sin(T * 33)); // chromatic separation
  const coreLag = Math.sin(T * 6.0 + (e.anim || 0)) * (1.5 + exp * 2); // core lags/leads

  // silhouette generator: a lean too-tall humanoid, torn along scanlines.
  // draws a stack of horizontal tear-slabs offset per-row for the "ripped & retaped" look.
  function limbShape(colHex, dx, alpha, tearGain) {
    g.save();
    g.globalAlpha = alpha * exp;
    g.fillStyle = colHex;
    const rows = 26;
    for (let i = 0; i < rows; i++) {
      const t = i / (rows - 1);
      const yy = topY + t * H;
      if (yy >= fy) continue;                               // never draw below fy
      // body width profile: narrow head, slight shoulders, tapering legs
      let w;
      if (t < 0.13) w = bodyW * (0.32 + t * 1.2);            // head
      else if (t < 0.20) w = bodyW * (0.55);                 // neck pinch
      else if (t < 0.34) w = bodyW * (0.62 + (t - 0.20));    // shoulders
      else if (t < 0.66) w = bodyW * (0.9 - (t - 0.34) * 0.4); // torso taper
      else w = bodyW * (0.5 - (t - 0.66) * 0.3);             // legs (thin)
      w = Math.max(2, w);
      // per-row horizontal tear offset (scrolls upward)
      const tear = Math.sin((yy * 0.35) - T * 9 + (e.anim || 0)) * tearGain
                 + Math.sin(yy * 1.7 + T * 20) * (tearGain * 0.4);
      const rh = Math.min(H / rows + 0.8, fy - yy);          // clamp to ground line
      if (rh > 0) g.fillRect(cxx + dx + tear - w * 0.5, yy, w, rh);
    }
    g.restore();
  }

  g.globalCompositeOperation = 'lighter';
  // RED layer shifted left (reconstruction bleeding through)
  limbShape(COL.red, -sep, 0.55, 2.4 + exp * 2);
  // CYAN layer shifted right (the player's signal seeing it)
  limbShape(COL.cyan, sep, 0.55, 2.4 + exp * 2);
  g.globalCompositeOperation = 'source-over';
  // torn grey core between them, lagging
  limbShape(shade(COL.concrete, 1.15), coreLag, 0.8, 3.0 + exp * 2.5);

  // hollow black cavity where a face should be — a void in the head
  const headY = topY + H * 0.075;
  g.save();
  g.globalAlpha = (0.6 + 0.4 * Math.sin(T * 5)) * exp;
  g.fillStyle = COL.ink;
  g.beginPath();
  g.ellipse(cxx + coreLag, headY, bodyW * 0.15, bodyW * 0.22, 0, 0, Math.PI * 2);
  g.fill();
  g.restore();

  // scrolling tear-lines across whole body (bright rips being re-taped)
  g.save();
  g.globalCompositeOperation = 'lighter';
  for (let k = 0; k < 5; k++) {
    const ry = fy - ((T * 90 + k * (H / 5) + (e.anim || 0) * 30) % H);
    if (ry >= fy - 1) continue;                             // keep rips above ground line
    g.fillStyle = hexA(COL.ivory, 0.10 * exp);
    g.fillRect(cxx - bodyW * 0.7, ry, bodyW * 1.4, 1);
    // red/cyan fringe on the rip
    g.fillStyle = hexA(COL.red, 0.12 * exp);
    g.fillRect(cxx - bodyW * 0.7 - sep, ry, bodyW * 1.4, 1);
    g.fillStyle = hexA(COL.cyan, 0.12 * exp);
    g.fillRect(cxx - bodyW * 0.7 + sep, ry + 1, bodyW * 1.4, 1);
  }
  g.globalCompositeOperation = 'source-over';
  g.restore();

  // exposed edges glow cyan — lit by the player's own signal
  softGlow(g, cxx, midY, bodyW * 1.4, COL.cyan, 0.05 * exp, 0.10 * exp);

  g.restore();
}

// ============================================================
// TELEGRAPH — darting rush wind-up toward player (only meaningful when exposed)
// ============================================================
if ((e.tele || 0) > 0 && exp > 0.1) {
  const ang = Math.atan2(player.y - e.y, player.x - e.x);
  g.save();
  g.globalCompositeOperation = 'lighter';
  const reach = 26 + 30 * Math.min(1, e.tele);
  const gx = cxx + Math.cos(ang) * reach;
  const gy = midY + Math.sin(ang) * reach;
  // a smear of interference pointing at the player (motion streak)
  const grd = g.createLinearGradient(cxx, midY, gx, gy);
  grd.addColorStop(0, hexA(COL.cyan, 0.28 * Math.min(1, e.tele)));
  grd.addColorStop(0.5, hexA(COL.red, 0.18 * Math.min(1, e.tele)));
  grd.addColorStop(1, hexA(COL.cyan, 0));
  g.strokeStyle = grd;
  g.lineWidth = bodyW * 0.9;
  g.lineCap = 'round';
  g.beginPath();
  g.moveTo(cxx, midY);
  g.lineTo(gx, gy);
  g.stroke();
  // leading scanline sparks
  for (let i = 0; i < 4; i++) {
    const f = (i + (T * 3 % 1)) / 4;
    g.fillStyle = hexA(COL.cyan, 0.3 * (1 - f) * Math.min(1, e.tele));
    g.fillRect(cxx + Math.cos(ang) * reach * f - 3, midY + Math.sin(ang) * reach * f, 6, 1.5);
  }
  g.globalCompositeOperation = 'source-over';
  g.restore();
}

g.restore();
d_flash(g, e);
}
function drawMimic(g,e){ const cx=e.x+e.w/2, fy=e.y+e.h*0.92;

d_eshadow(g,e);

const t = Game.t;
const u = e.h;
const anim = e.anim||0;
const moving = e._moving;
const tele = Math.max(0, Math.min(1, e.tele||0));
const ex   = Math.max(0, Math.min(1, e.exposed||0));
const hpF  = e.maxhp ? Math.max(0,Math.min(1,e.hp/e.maxhp)) : 1;

// ---- facing toward player (smooth level head-turn) ----
const px = (typeof player!=='undefined'&&player)?player.x:cx;
const dx = px - cx;
const face = Math.max(-1,Math.min(1, dx/140));
const lungeDir = dx>=0?1:-1;

// ---- gait / breathing (unhurried gliding stalk) ----
const gait  = t*5.2 + anim;
const bob   = (moving?Math.sin(gait)*0.05:Math.sin(t*1.4+anim)*0.018)*u;
const sway  = (moving?Math.sin(gait)*0.05:Math.sin(t*1.25+anim)*0.015)*u;

// ---- micro-glitch: features jump 2-3px then snap (mask reseating) ----
const gseed = t*0.42 + anim*1.7;
const gph   = gseed - Math.floor(gseed);
const gA    = gph<0.09 ? (1-gph/0.09) : 0;
const gjx   = gA*Math.sin(t*57+anim)*2.7;
const gjy   = gA*Math.cos(t*41+anim)*1.9;

// ---- telegraph coil: lean back, compress, face stretches wider ----
const lean  = -lungeDir * u*0.42 * tele;
const coil  = tele*u*0.14;
const fStr  = 1 + 0.22*tele;

// ---- key positions (rise UP from fy) ----
const hipY   = fy - u*0.90 + coil*0.4 - bob;
const shldrY = fy - u*1.52 + coil     - bob;
const chestY = fy - u*1.20 + coil*0.7 - bob;
const faceCy = fy - u*1.92 + coil     - bob;
const bodyW  = u*0.64;

const leanF = lean, leanS = lean*0.7, leanH = lean*0.25;
const faceCx = cx + leanF + face*u*0.12;
const topX   = cx + leanS + sway;
const hipX   = cx + leanH + sway*0.5;

// ================= TELEGRAPH: red completion-glow gathering in chest =================
if(tele>0){
  g.save();
  g.globalCompositeOperation='lighter';
  const gr = u*(0.45+0.8*tele)*(0.85+0.15*Math.sin(t*17));
  softGlow(g, cx+leanS, chestY, gr, COL.red, 0.55*tele, 0.16*tele);
  g.restore();
}

// ================= LEGS (long, planted feet) =================
g.save();
g.lineCap='round';
const legSw = moving? Math.sin(gait)*u*0.17 : Math.sin(t*1.3+anim)*u*0.02;
g.lineWidth = u*0.185;
g.strokeStyle = shade(COL.ink,2.1);
g.beginPath();
g.moveTo(hipX - bodyW*0.24, hipY);
g.lineTo(cx - bodyW*0.26 + legSw, fy);
g.stroke();
g.beginPath();
g.moveTo(hipX + bodyW*0.24, hipY);
g.lineTo(cx + bodyW*0.26 - legSw, fy);
g.stroke();
g.restore();

// ================= BODY (oily near-black capsule) =================
const topW = bodyW*0.94, botW = bodyW*0.78;
g.beginPath();
g.moveTo(topX - topW/2, shldrY);
g.quadraticCurveTo(topX - topW/2 - u*0.06,(shldrY+hipY)/2, hipX - botW/2, hipY);
g.quadraticCurveTo(hipX,hipY+u*0.12, hipX + botW/2, hipY);
g.quadraticCurveTo(topX + topW/2 + u*0.06,(shldrY+hipY)/2, topX + topW/2, shldrY);
g.quadraticCurveTo(topX, shldrY - u*0.20, topX - topW/2, shldrY);
g.closePath();
vgrad(g, topX-topW/2, shldrY-u*0.2, topW, (hipY-shldrY)+u*0.3, shade(COL.ink,3.4), COL.ink);
g.fill();

// faint oily sheen + a stuttering scan-tear across the torso
g.save();
g.clip();
g.globalCompositeOperation='lighter';
g.globalAlpha=0.10;
g.fillStyle=shade(COL.cyan,0.7);
g.fillRect(topX - topW*0.14, shldrY, topW*0.16, hipY-shldrY);
g.globalAlpha=0.14*(0.5+0.5*Math.sin(t*3+anim));
const scanY = shldrY + ((t*0.5+anim)%1)*(hipY-shldrY);
g.fillStyle=shade(COL.ivory,0.5);
g.fillRect(topX-topW/2, scanY, topW, 1.4);
g.restore();

// ================= ARMS (too long, swing a fraction late) =================
g.save();
g.lineCap='round';
const armSw = moving? Math.sin(gait-0.9)*u*0.22 : Math.sin(t*1.2+anim-0.6)*u*0.03;
g.lineWidth = u*0.145;
g.strokeStyle = shade(COL.ink,1.9);
g.beginPath();
g.moveTo(topX - topW*0.46, shldrY+u*0.06);
g.quadraticCurveTo(topX - topW*0.55 + armSw, hipY, cx - bodyW*0.52 + armSw, hipY+u*0.42);
g.stroke();
g.beginPath();
g.moveTo(topX + topW*0.46, shldrY+u*0.06);
g.quadraticCurveTo(topX + topW*0.55 - armSw, hipY, cx + bodyW*0.52 - armSw, hipY+u*0.42);
g.stroke();
g.restore();

// ================= NECK stem into the face =================
g.save();
g.lineCap='round';
g.lineWidth=u*0.22;
g.strokeStyle=COL.ink;
g.beginPath();
g.moveTo(topX, shldrY-u*0.05);
g.lineTo(faceCx, faceCy + u*0.30);
g.stroke();
g.restore();

// ================= FACE geometry =================
const frx = u*0.30*fStr;
const fry = u*0.40;

// ---- the VOID cavity (pure black) that lives behind the stolen face ----
g.save();
g.beginPath();
g.ellipse(faceCx, faceCy, frx*0.98, fry*0.98, 0, 0, 7);
g.fillStyle='#000000';
g.fill();
g.lineWidth=1.2;
g.strokeStyle=hexA(COL.ink,0.9);
g.stroke();
g.restore();

// ---- CYAN pinprick eyes (raw signal / the truth) — revealed on slip ----
const eyeSp = frx*0.34;
const cyX = faceCx + face*frx*0.20;
const cyY = faceCy - fry*0.06;
const cyA = 0.10 + 0.90*ex;
g.save();
g.globalCompositeOperation='lighter';
softGlow(g, cyX-eyeSp, cyY, u*0.11, COL.cyan, cyA, cyA*0.35);
softGlow(g, cyX+eyeSp, cyY, u*0.11, COL.cyan, cyA, cyA*0.35);
g.globalAlpha=cyA;
g.fillStyle=shade(COL.cyan,1.35);
g.beginPath(); g.arc(cyX-eyeSp, cyY, u*0.032, 0,7); g.fill();
g.beginPath(); g.arc(cyX+eyeSp, cyY, u*0.032, 0,7); g.fill();
g.restore();

// ---- SEAM ring where mask meets void (hairline; tears RED on tele/slip/low-hp) ----
const seamR = Math.max(tele, ex, (1-hpF)*0.55);
g.save();
if(seamR>0.04){
  g.globalCompositeOperation='lighter';
  g.beginPath();
  g.ellipse(faceCx, faceCy, frx*1.03, fry*1.03, 0, 0, 7);
  g.lineWidth=1.4+2.4*seamR;
  g.strokeStyle=hexA(COL.red, 0.30+0.6*seamR);
  g.stroke();
}else{
  g.beginPath();
  g.ellipse(faceCx, faceCy, frx*1.03, fry*1.03, 0, 0, 7);
  g.lineWidth=1.3;
  g.strokeStyle=hexA(shade(COL.ivory,0.55),0.35);
  g.stroke();
}
g.restore();

// red seam-tear drips when the face peels
if(ex>0.3){
  d_drip(g, faceCx - frx*0.45, faceCy+fry*0.55, u*0.42*ex, COL.red, t*1.5+anim);
  d_drip(g, faceCx + frx*0.42, faceCy+fry*0.62, u*0.32*ex, COL.red, t*1.7+anim+1.0);
}

// ================= THE STOLEN MASK (slips/peels aside when exposed) =================
const drawFeatures = (ox,oy,col)=>{
  g.fillStyle=col; g.strokeStyle=col;
  g.beginPath(); g.arc(ox-eyeSp*0.9, oy, frx*0.095, 0,7); g.fill();
  g.beginPath(); g.arc(ox+eyeSp*0.9, oy, frx*0.095, 0,7); g.fill();
  g.lineWidth=Math.max(1.3, frx*0.065); g.lineCap='round';
  const mw = frx*0.72*(1+0.22*tele);
  const my = oy + fry*0.46;
  g.beginPath(); g.moveTo(ox-mw/2, my); g.lineTo(ox+mw/2, my); g.stroke();
};

g.save();
if(ex>0){
  const pivX = faceCx + lungeDir*frx*0.92;
  const pivY = faceCy + fry*0.25;
  const dangle = (0.45 + 0.32*Math.sin(t*2.2+anim))*ex;
  g.translate(pivX, pivY);
  g.rotate(lungeDir*dangle);
  g.translate(-pivX, pivY*0 - pivY + ex*fry*0.9);
  g.globalAlpha = 1 - ex*0.15;
}
// mask oval — pale sickly amber-grey
g.beginPath();
g.ellipse(faceCx, faceCy, frx, fry, 0, 0, 7);
vgrad(g, faceCx-frx, faceCy-fry, frx*2, fry*2, shade(COL.ivory,0.95), shade(COL.amberDim,1.55));
g.fill();
// soft painted-on shading + moving scan shimmer
g.save();
g.clip();
g.globalAlpha=0.18;
g.fillStyle=shade(COL.amberDim,1.1);
g.fillRect(faceCx-frx, faceCy+fry*0.15, frx*2, fry);
g.globalCompositeOperation='lighter';
g.globalAlpha=0.10;
g.fillStyle=shade(COL.ivory,0.6);
const msY = faceCy-fry + ((t*0.35+anim)%1)*fry*2;
g.fillRect(faceCx-frx, msY, frx*2, 1.3);
g.restore();

// features (with chromatic-split during a glitch)
const exX = faceCx + face*frx*0.18 + gjx;
const exY = faceCy - fry*0.08 + gjy;
if(gA>0){
  g.save();
  g.globalCompositeOperation='lighter';
  g.globalAlpha=0.5*gA;
  drawFeatures(exX-2.2, exY, COL.red);
  drawFeatures(exX+2.2, exY, COL.cyan);
  g.restore();
}
drawFeatures(exX, exY, shade(COL.ink,1.5));
g.restore();

// ================= low-hp: amber thread flickering where the real face once was =================
if(hpF<0.35 && Math.sin(t*23+anim)>0.35){
  g.save();
  g.globalCompositeOperation='lighter';
  g.globalAlpha=0.45;
  g.strokeStyle=COL.amber;
  g.lineWidth=1;
  g.beginPath();
  g.moveTo(faceCx-frx*0.3, faceCy+Math.sin(t*30)*2);
  g.lineTo(faceCx+frx*0.3, faceCy+Math.sin(t*30+2)*2);
  g.stroke();
  g.restore();
}

d_flash(g,e);

}

g.rotate(tilt*0.6);

g.fillStyle = shade(COL.steel,0.5); g.fill();

g.beginPath(); g.ellipse(0,0, dishR*0.95, dishH*0.95, 0,0,TAU); g.clip();
const rg = g.createRadialGradient(0,-dishH*0.1, dishR*0.08, 0,0, dishR);
rg.addColorStop(0, shade(COL.ink,1.15));
rg.addColorStop(0.6, shade(COL.grass,0.65));
rg.addColorStop(1, shade(COL.steel,0.95));
g.fillStyle = rg; g.fillRect(-dishR,-dishH, dishR*2, dishH*2);

for(let i=0;i<7;i++){

g.strokeStyle = hexA(COL.cyan, 0.28*(1-rip)); g.lineWidth = W*0.06;
g.beginPath(); g.ellipse(0,0, dishR*rip, dishH*rip, 0,0,TAU); g.stroke();
g.restore();
// ghost face-traces (amber), surfacing & sinking
const flick = (Math.sin(t*11+anim)>0.72)?1.7:1;
const ghostA = Math.max(0, (0.10+0.10*Math.sin(t*1.7+anim) + (exposed?0.5:0))*flick);
g.globalAlpha = ghostA;
g.fillStyle = hexA(COL.amber,0.9);
g.beginPath(); g.ellipse(-dishR*0.28,-dishH*0.16, dishR*0.10, dishH*0.15, 0,0,TAU); g.fill();
g.beginPath(); g.ellipse( dishR*0.28,-dishH*0.16, dishR*0.10, dishH*0.15, 0,0,TAU); g.fill();
g.beginPath(); g.ellipse(0, dishH*0.30, dishR*0.22, dishH*0.18, 0,0,TAU); g.fill();
g.globalAlpha = ghostA*0.9; g.fillStyle = COL.ink;
g.beginPath(); g.ellipse(0, dishH*0.32, dishR*0.13, dishH*0.11, 0,0,TAU); g.fill();

// chromatic split of the ghost when exposed / hurt
if(exposed || frac<0.5){

  g.fillStyle=hexA(COL.cyan,0.6);

  g.fillStyle=hexA(COL.red,0.6);
  g.beginPath(); g.ellipse(-dishR*0.28+2,-dishH*0.16, dishR*0.09, dishH*0.14,0,0,TAU); g.fill();

}
g.restore(); // end interior clip

// rim

if(wind>0) softGlow(g, feX,feY, W*0.75*dil, COL.red, 0.6*wind, 0.35*wind);
g.restore();
// contracting targeting ring (the tell)
if(wind>0){
  g.save(); g.globalCompositeOperation='lighter';
  const ringR = W*1.4*(1.05-wind) + W*0.15;
  g.strokeStyle = hexA(COL.red, 0.5+0.4*wind); g.lineWidth = W*0.08*(0.5+wind);
  g.beginPath(); g.arc(feX,feY, ringR, 0, TAU); g.stroke();
  g.strokeStyle = hexA(COL.red, 0.3*wind);

g.beginPath(); g.arc(feX,feY, W*0.08*dil, 0, TAU); g.fillStyle=COL.ink; g.fill();

  g.restore();
}
g.restore(); // end dish transform

d_flash(g,e);
}
function drawHusk(g,e){ const cx=e.x+e.w/2, fy=e.y+e.h*0.92;

    g.restore();
  }

  d_flash(g,e);
}

const finalPhase=frac<=0.25;

  const hx=cx+side*halfBot*0.9+side*conduct*halfBot*armAmp;

const WIND=0.22; // horizontal drift
function rainLayer(g, arr, speed, len, alpha, wobble){
  g.lineWidth = len>16?1.6:1; g.strokeStyle='rgba(198,212,222,'+alpha+')';
  const gust=WIND + Math.sin(Game.t*0.5)*0.06;
  g.beginPath();

    const fall=(r.y + Game.t*speed*r.s)%1;
    const x=(r.x*VIEW_W + fall*VIEW_H*gust) % VIEW_W;
    const y=fall*VIEW_H;

  }

function drawRainOver(g){

// System 2 render — hard cyan flash, collapsing iris ring, chromatic edge bars, decaying over ~0.6s
function drawSting(g){ const s=Game.sting; if(s<=0) return; const k=s*s;
  g.save(); g.globalCompositeOperation='lighter';
  g.fillStyle=hexA(COL.cyan,0.16*k); g.fillRect(0,0,VIEW_W,VIEW_H); g.restore();
  g.save(); g.globalAlpha=0.5*k; g.strokeStyle=COL.cyan; g.lineWidth=2;
  const rr=VIEW_W*(0.2+0.6*(1-s));                 // ring snaps inward as the sting decays
  g.beginPath(); g.arc(VIEW_W/2,VIEW_H/2,rr,0,7); g.stroke(); g.restore();

function wrap(g,txt,max){ const words=txt.split(' '); const out=[]; let line='';

  if(line) out.push(line); return out; }

/* ---- first-person "look out the window" — a quiet, unsettling vantage in the home base ---- */
const Window = {
  active:false, pan:0.5, fade:0, t:0, seen:0, phase:0, figX:0.6,
  open(){ this.active=true; this.pan=0.5; this.fade=0; this.t=0; this.seen=0; this.phase=0;
    this.figX=0.40+Math.random()*0.32; Game.overlay='window'; Game.toastT=0; try{Audio.ring();}catch(e){} },
  close(){ this.active=false; Game.overlay=null; try{Audio.ui();}catch(e){} },
  update(dt){ this.t+=dt; if(this.fade<1) this.fade=Math.min(1,this.fade+dt*1.5);
    let inx=0; if(keys.KeyA||keys.ArrowLeft)inx-=1; if(keys.KeyD||keys.ArrowRight)inx+=1;
    if(mouse.down){ inx += (mouse.x/VIEW_W-0.5)*2; }              // click-drag-ish: mouse side pans
    this.pan=clamp(this.pan+inx*dt*0.45, 0.04, 0.96);
    const d=Math.abs(this.pan-this.figX);
    if(d<0.085) this.seen+=dt; else this.seen=Math.max(0,this.seen-dt*0.4);   // it comes closer the longer you watch it
    if(this.seen>2.0 && this.phase<1){ this.phase=1; try{Audio.whisper();}catch(e){} }
    if(this.seen>4.2 && this.phase<2){ this.phase=2; try{Audio.noticed();}catch(e){} Game.shakeT=0.22; }
  }
};

  for(let i=0;i<120;i++){ const x=(i*97+Game.t*120)%VIEW_W, y=(i*151+Game.t*560)%VIEW_H;
    g.beginPath(); g.moveTo(x,y); g.lineTo(x-4,y+14); g.stroke(); }
  // amber vignette
  const grd=g.createRadialGradient(VIEW_W/2,VIEW_H/2-40,40,VIEW_W/2,VIEW_H/2,420);
  grd.addColorStop(0,'rgba(230,165,75,.10)'); grd.addColorStop(1,'rgba(0,0,0,0)'); g.fillStyle=grd; g.fillRect(0,0,VIEW_W,VIEW_H);
  g.textAlign='center';
  g.fillStyle=COL.ivory; g.font='36px monospace';
  g.fillText('THE WORLD FORGOT US',VIEW_W/2,VIEW_H/2-40);
  g.fillStyle=COL.amber; g.font='13px monospace';
  g.fillText('A record is not a person, but without trustworthy witnesses a person can be erased.',VIEW_W/2,VIEW_H/2);
  g.fillStyle= (Math.floor(Game.t*2)%2)? COL.cyan : '#8a8272'; g.font='13px monospace';
  g.fillText('Press any key to begin',VIEW_W/2,VIEW_H/2+50);
  if(hasSave()){ g.fillStyle='#8a8272'; g.font='11px monospace'; g.fillText('(L to continue your saved night)',VIEW_W/2,VIEW_H/2+74); }
  if(Game.reachedEnding){ g.fillStyle=COL.amber; g.font='11px monospace';
    g.fillText('— you reached an ending: '+Game.reachedEnding+' —',VIEW_W/2,VIEW_H/2+98); }
  g.fillStyle='#5a5448'; g.font='10px monospace';
  g.fillText('Cullbrook · Ashmere · Wrenfield · Tollard — full campaign',VIEW_W/2,VIEW_H-30);
  g.textAlign='left';
}

/* ------------------------------- boot ------------------------------ */
resize();
buildTextures();
loadScene('carriage317',{x:300,y:200,dir:'down'}); // preload for title backdrop safety
Game.mode='title';
requestAnimationFrame(frame);
</script>
