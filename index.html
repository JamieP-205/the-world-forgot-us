<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>The World Forgot Us</title>
<style>
  :root { color-scheme: dark; }
  html,body{margin:0;height:100%;background:#07090b;overflow:hidden;
    font-family:ui-monospace,"Cascadia Mono","Consolas",monospace;color:#d8cfbf;}
  #wrap{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;}
  canvas{image-rendering:pixelated;image-rendering:crisp-edges;background:#000;
    box-shadow:0 0 60px #000 inset;touch-action:none;}
  #hint{position:fixed;left:50%;bottom:14px;transform:translateX(-50%);
    font-size:12px;color:#7d7566;letter-spacing:.5px;opacity:.8;pointer-events:none;
    text-shadow:0 1px 2px #000;text-align:center;white-space:nowrap;}
  /* touch controls, hidden until a touch is seen */
  .touch{position:fixed;display:none;z-index:10;user-select:none;-webkit-user-select:none;touch-action:none;}
  #stick{left:22px;bottom:22px;width:150px;height:150px;border-radius:50%;
    background:rgba(30,34,38,.35);border:1px solid rgba(120,120,120,.3);}
  #nub{position:absolute;left:50px;top:50px;width:50px;height:50px;border-radius:50%;
    background:rgba(180,170,150,.35);border:1px solid rgba(200,200,200,.4);}
  #pads{right:14px;bottom:22px;display:grid;grid-template-columns:64px 64px;gap:10px;}
  .pad{width:64px;height:64px;border-radius:12px;background:rgba(30,34,38,.5);
    border:1px solid rgba(120,120,120,.35);display:flex;align-items:center;justify-content:center;
    font-size:11px;color:#c9c0b0;letter-spacing:.5px;}
  body.touch-on .touch{display:block;}
  body.touch-on #pads{display:grid;}
</style>
</head>
<body>
<div id="wrap"><canvas id="c"></canvas></div>
<div id="hint">WASD move · E interact · J strike · Q sweep · R discharge · Space dodge (time it → counter) · G flare · B decoy · C craft · F heal · M map · I archive · Esc pause</div>

<div id="stick" class="touch"><div id="nub"></div></div>
<div id="pads" class="touch">
  <div class="pad" data-k="KeyE">E</div>
  <div class="pad" data-k="KeyJ">J</div>
  <div class="pad" data-k="KeyQ">Q</div>
  <div class="pad" data-k="Space">DGE</div>
</div>

<script>
"use strict";
/* =====================================================================
   THE WORLD FORGOT US — vertical slice (Cullbrook Services opening)
   Single-file HTML5 canvas game. No external assets (CSP-safe).
   Implements: 4-dir movement, Trace Receiver sweep, salvage->rebuild->scan
   loop, one signal enemy (Static Wraith) + one Hollow, crafting, the field
   archive, day/night tint, rain, procedural WebAudio, save/continue.
   ===================================================================== */

const CANVAS = document.getElementById('c');
const CTX = CANVAS.getContext('2d', { alpha:false });
const g = CTX;   // global context alias (generated art helpers use a bare `g`; draw-fn params shadow it harmlessly)
const VIEW_W = 960, VIEW_H = 540;      // logical resolution
let SCALE = 1, OFFX = 0, OFFY = 0, DPR = 1;

/* ------------------------------- palette --------------------------- */
const COL = {
  road:'#22262a', roadWet:'#2b3136', concrete:'#3a3d3c', grass:'#2a2f27',
  timber:'#4a3a2b', steel:'#4b5155', rust:'#5e4126',
  ink:'#0a0c0e', ivory:'#d8cfbf', amber:'#e6a54b', amberDim:'#7a5a2a',
  cyan:'#5fd0d6', cyanDim:'#2c6f73', red:'#c8483f', redDim:'#5e2320',
  coat:'#9a3b34', skin:'#c8a884', hollow:'#20262b', wraith:'#39424a',
};

/* ------------------------------- input ----------------------------- */
const keys = Object.create(null);
const pressed = Object.create(null);           // one-frame edge
const mouse = { x:0, y:0, wx:0, wy:0, down:false, rdown:false };
const CODE_ALIAS = { ArrowUp:'KeyW', ArrowDown:'KeyS', ArrowLeft:'KeyA', ArrowRight:'KeyD' };
const PREVENT = new Set(['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight','KeyC','KeyI','KeyM','Tab']);

addEventListener('keydown', e=>{
  const code = CODE_ALIAS[e.code] || e.code;
  if (PREVENT.has(e.code)) e.preventDefault();
  if (!keys[code]) pressed[code] = true;
  keys[code] = true;
  Audio.unlock();
  Game.onKey(code);
});
addEventListener('keyup', e=>{ const code = CODE_ALIAS[e.code]||e.code; keys[code]=false; });
CANVAS.addEventListener('mousemove', e=>{
  const r = CANVAS.getBoundingClientRect();
  mouse.x = (e.clientX - r.left)/SCALE; mouse.y = (e.clientY - r.top)/SCALE;
});
CANVAS.addEventListener('mousedown', e=>{
  Audio.unlock();
  if (e.button===0){ mouse.down=true; pressed.KeyJ=true; keys.KeyJ=true; }
  if (e.button===2){ mouse.rdown=true; pressed.KeyQ=true; keys.KeyQ=true; }
  Game.onKey(e.button===2?'KeyQ':'KeyJ');
});
addEventListener('mouseup', e=>{
  if (e.button===0){ mouse.down=false; keys.KeyJ=false; }
  if (e.button===2){ mouse.rdown=false; keys.KeyQ=false; }
});
CANVAS.addEventListener('contextmenu', e=>e.preventDefault());

/* touch */
let touchSeen=false;
function enableTouch(){ if(touchSeen) return; touchSeen=true; document.body.classList.add('touch-on'); }
(function touchSetup(){
  const stick=document.getElementById('stick'), nub=document.getElementById('nub');
  let sid=null, cx=0, cy=0;
  const setNub=(dx,dy)=>{ nub.style.left=(50+dx)+'px'; nub.style.top=(50+dy)+'px'; };
  stick.addEventListener('touchstart',e=>{ enableTouch(); Audio.unlock();
    const t=e.changedTouches[0]; sid=t.identifier; const r=stick.getBoundingClientRect();
    cx=r.left+r.width/2; cy=r.top+r.height/2; e.preventDefault(); },{passive:false});
  addEventListener('touchmove',e=>{ if(sid===null) return;
    for(const t of e.changedTouches){ if(t.identifier!==sid) continue;
      let dx=t.clientX-cx, dy=t.clientY-cy; const m=Math.hypot(dx,dy)||1, cap=48;
      const k=Math.min(1,m/60); const nx=dx/m, ny=dy/m;
      setNub(nx*Math.min(m,cap), ny*Math.min(m,cap));
      Game.touchMove(nx*k, ny*k);
    } e.preventDefault(); },{passive:false});
  const end=e=>{ if(sid===null) return; for(const t of e.changedTouches) if(t.identifier===sid){ sid=null; setNub(0,0); Game.touchMove(0,0);} };
  addEventListener('touchend',end); addEventListener('touchcancel',end);
  document.querySelectorAll('.pad').forEach(p=>{
    const k=p.dataset.k;
    p.addEventListener('touchstart',e=>{ enableTouch(); Audio.unlock();
      pressed[k]=true; keys[k]=true; Game.onKey(k); e.preventDefault(); },{passive:false});
    p.addEventListener('touchend',e=>{ keys[k]=false; e.preventDefault(); },{passive:false});
  });
})();

/* ------------------------------- audio ----------------------------- */
/* Procedural WebAudio. Nothing recorded — Continuity's voice is generated,
   which is also the game's fiction. Unlocks on first valid input. */
const Audio = (()=> {
  let ctx=null, master=null, ambGain=null, rainGain=null, ready=false, on=true;
  let _speakBus=null;                    // active fake-speech bus (so a recording can be cut off)
  const drones=[];
  function unlock(){
    if (ready) return;
    try{
      ctx = new (window.AudioContext||window.webkitAudioContext)();
      master = ctx.createGain(); master.gain.value = 0.85; master.connect(ctx.destination);
      startAmbient();
      ready=true;
    }catch(e){ ready=false; }
  }
  function noiseBuffer(sec){
    const n = ctx.sampleRate*sec, b = ctx.createBuffer(1,n,ctx.sampleRate), d=b.getChannelData(0);
    for(let i=0;i<n;i++) d[i]=Math.random()*2-1; return b;
  }
  function startAmbient(){
    // low drones
    ambGain = ctx.createGain(); ambGain.gain.value=0.16; ambGain.connect(master);
    [55,58.3,82.4].forEach((f,i)=>{
      const o=ctx.createOscillator(), g=ctx.createGain(), lp=ctx.createBiquadFilter();
      o.type='sawtooth'; o.frequency.value=f; lp.type='lowpass'; lp.frequency.value=240;
      g.gain.value=(i===2?0.05:0.12); o.connect(lp); lp.connect(g); g.connect(ambGain);
      const lfo=ctx.createOscillator(), lg=ctx.createGain();
      lfo.frequency.value=0.05+i*0.03; lg.gain.value=6; lfo.connect(lg); lg.connect(o.frequency);
      o.start(); lfo.start(); drones.push(o,lfo);
    });
    // rain: filtered noise loop
    const src=ctx.createBufferSource(); src.buffer=noiseBuffer(3); src.loop=true;
    const bp=ctx.createBiquadFilter(); bp.type='bandpass'; bp.frequency.value=1400; bp.Q.value=0.4;
    const hp=ctx.createBiquadFilter(); hp.type='highpass'; hp.frequency.value=500;
    rainGain=ctx.createGain(); rainGain.gain.value=0.05;
    src.connect(bp); bp.connect(hp); hp.connect(rainGain); rainGain.connect(master); src.start();
    try{ startMusic(); }catch(e){}
  }
  function env(g,t0,a,d,peak){ g.gain.setValueAtTime(0.0001,t0);
    g.gain.exponentialRampToValueAtTime(peak,t0+a);
    g.gain.exponentialRampToValueAtTime(0.0001,t0+a+d); }
  function blip(freq,dur,type,peak,detune){
    if(!ready||!on) return; const t=ctx.currentTime;
    const o=ctx.createOscillator(), g=ctx.createGain();
    o.type=type||'square'; o.frequency.value=freq; if(detune)o.detune.value=detune;
    env(g,t,0.006,dur,peak||0.2); o.connect(g); g.connect(master); o.start(t); o.stop(t+dur+0.05);
  }
  /* ambient music layer */
// ================= Ambient MUSIC layer =================
// Slow evolving minor pad + sparse distant cold-piano/music-box tones.
// Sits under the rain/thunder, darkens/dissonates as Game.dread rises.
// Self-scheduling via ctx-time + recursive setTimeout (no interval drift:
// every chord is re-anchored to ctx.currentTime, chords crossfade-overlap).

var musGain, musReverb, musRevGain, _musBright=0;
// progression + colour shift by region/story stage — the music tracks where you are and how deep you've gone
function musProg(){
  var scene=(window.State&&State.scene)||'cullbrook';
  var region = /tollard|choircore/.test(scene)?'toll'
             : /wrenfield|cutting|controlshed|westxfmr|antenna|generatorhall/.test(scene)?'wren'
             : /ashmere|clinic|school|workshop/.test(scene)?'ash' : 'cull';
  var deep = (window.State&&State.flags)?((State.flags.tollard?0.9:State.flags.wrenfield?0.6:State.flags.ashmere?0.35:0.1)):0.1;
  return { toll:{chords:[[0,1,6,7],[-1,3,6,10],[0,3,6,9],[-2,1,4,10]], bright:-160, toneP:0.72},
           wren:{chords:[[0,3,6,10],[-2,1,5,8],[-5,-2,1,6],[0,3,7,11]], bright:-70,  toneP:0.58},
           ash: {chords:[[-7,-3,0,3],[-9,-5,-2,2],[-4,-1,3,7],[-7,-3,0,5]], bright:-100, toneP:0.6},
           cull:{chords:[[0,3,7,10],[-4,0,3,7],[-7,-3,0,5],[-5,-1,2,7]], bright:0, toneP:0.5} }[region];
}

function musImpulse(seconds, decay){            // cheap decaying-noise reverb IR
  var rate = ctx.sampleRate, len = Math.max(1, (seconds*rate)|0);
  var buf = ctx.createBuffer(2, len, rate);
  for(var ch=0; ch<2; ch++){
    var d = buf.getChannelData(ch);
    for(var i=0;i<len;i++) d[i] = (Math.random()*2-1) * Math.pow(1 - i/len, decay);
  }
  return buf;
}

function initMusicBus(){
  if(musGain) return;
  musGain = ctx.createGain();
  musGain.gain.setValueAtTime(0.0001, ctx.currentTime);         // start silent
  musGain.gain.exponentialRampToValueAtTime(0.19, ctx.currentTime + 6); // slow fade-in (audible under the rain)
  musGain.connect(master);
  musReverb = ctx.createConvolver();
  musReverb.buffer = musImpulse(3.2, 3.0);      // long, distant tail
  musRevGain = ctx.createGain();
  musRevGain.gain.value = 0.9;
  musReverb.connect(musRevGain);
  musRevGain.connect(musGain);
}

function musNote(semi){ return 110 * Math.pow(2, semi/12); }     // base = A2

// One pad chord: intervals (semitones over A2) swelling in/out over dur.
function musPad(intervals, t0, dur){
  var dread = (window.Game && Game.dread) ? Game.dread : 0;
  var peak   = 0.16 * (0.8 + dread*0.5);        // a touch louder when tense
  var cutoff = Math.max(200, 620 + _musBright - dread*260);   // DARKER as dread rises + as the region deepens
  var lp = ctx.createBiquadFilter();
  lp.type='lowpass'; lp.frequency.setValueAtTime(cutoff, t0); lp.Q.value=0.7;
  var g = ctx.createGain();
  g.gain.setValueAtTime(0.0001, t0);
  g.gain.exponentialRampToValueAtTime(peak, t0 + dur*0.35);      // slow swell
  g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);          // slow release
  lp.connect(g); g.connect(musGain); g.connect(musReverb);
  var voices = intervals.slice();
  if(dread > 0.55) voices.push(intervals[0] + 13);   // b9 crush at high dread
  for(var i=0;i<voices.length;i++){
    var o = ctx.createOscillator();
    o.type='triangle';
    o.frequency.value = musNote(voices[i]);
    o.detune.value = (i - voices.length/2) * (4 + dread*10);      // beating widens
    var vg = ctx.createGain(); vg.gain.value = 1/(voices.length+1);
    o.connect(vg); vg.connect(lp);
    o.start(t0); o.stop(t0 + dur + 0.05);
  }
}

// Sparse distant single tone (cold piano / music box), soft mallet + long tail.
function musColdTone(t0){
  var dread = (window.Game && Game.dread) ? Game.dread : 0;
  var consonant = [24,27,31,36,39];             // A4 C5 E5 A5 C6 (minor pentatonic)
  var dissonant = [25,30,33,37,42];             // b9 / tritone / #5 colors
  var pool = (dread > 0.4 && Math.random() < dread) ? dissonant : consonant;
  var semi = pool[(Math.random()*pool.length)|0];
  var o = ctx.createOscillator();
  o.type = Math.random()<0.5 ? 'sine' : 'triangle';
  o.frequency.value = musNote(semi);
  var g = ctx.createGain();
  var lvl = 0.05 * (0.7 + dread*0.6);
  g.gain.setValueAtTime(0.0001, t0);
  g.gain.exponentialRampToValueAtTime(lvl, t0 + 0.012);          // soft attack (no click)
  g.gain.exponentialRampToValueAtTime(0.0001, t0 + 2.6);         // long lonely decay
  o.connect(g); g.connect(musGain); g.connect(musReverb);
  o.start(t0); o.stop(t0 + 2.7);
}

// Recursive ctx-time scheduler; each call schedules ONE chord + its tones.
function musicLoop(){
  var dread = (window.Game && Game.dread) ? Game.dread : 0;
  var t = ctx.currentTime + 0.06;
  var P = musProg(); _musBright = P.bright;             // region-aware progression + colour
  var prog = P.chords;
  var idx = musicLoop._idx = ((musicLoop._idx==null?-1:musicLoop._idx)+1) % prog.length;
  var dur = 11 - dread*3 + Math.random()*3;      // ~8..14s, more restless w/ dread
  musPad(prog[idx], t, dur);
  var n = (Math.random() < P.toneP*0.5 + dread*0.4) ? 1 : 0;   // 0-2 sparse tones
  if(dread > 0.5 && Math.random() < dread) n += 1;
  for(var k=0;k<n;k++) musColdTone(t + 1.5 + Math.random()*(dur-2));
  setTimeout(musicLoop, dur*0.85*1000);           // next chord overlaps -> crossfade
}

function startMusic(){ initMusicBus(); musicLoop(); }

  return {
    unlock,
    setOn(v){ on=v; if(master) master.gain.setTargetAtTime(v?0.85:0.0, ctx.currentTime,0.1); },
    isOn(){ return on; },
    tension(v){ if(rainGain&&ready) rainGain.gain.setTargetAtTime(0.05+v*0.09, ctx.currentTime,0.6);
                if(ambGain&&ready) ambGain.gain.setTargetAtTime(0.16+v*0.12, ctx.currentTime,0.8); },
    step(){ blip(90+Math.random()*20,0.05,'triangle',0.05); },
    melee(){ if(!ready||!on)return; const t=ctx.currentTime;
      const s=ctx.createBufferSource(); s.buffer=noiseBuffer(0.12);
      const bp=ctx.createBiquadFilter(); bp.type='bandpass'; bp.frequency.value=320; bp.Q.value=1.2;
      const g=ctx.createGain(); env(g,t,0.004,0.1,0.35); s.connect(bp); bp.connect(g); g.connect(master); s.start(t); },
    hit(){ blip(180,0.08,'square',0.18); blip(120,0.12,'sawtooth',0.12,-20); },
    dodge(){ blip(520,0.12,'sine',0.14); },
    sweep(){ if(!ready||!on)return; const t=ctx.currentTime;
      const o=ctx.createOscillator(), g=ctx.createGain(), bp=ctx.createBiquadFilter();
      o.type='sine'; o.frequency.setValueAtTime(220,t); o.frequency.exponentialRampToValueAtTime(1600,t+0.5);
      bp.type='bandpass'; bp.frequency.value=900; bp.Q.value=3;
      g.gain.setValueAtTime(0.0001,t); g.gain.exponentialRampToValueAtTime(0.16,t+0.05);
      g.gain.exponentialRampToValueAtTime(0.0001,t+0.55);
      o.connect(bp); bp.connect(g); g.connect(master); o.start(t); o.stop(t+0.6); },
    trace(){ blip(660,0.14,'sine',0.16); setTimeout(()=>blip(990,0.2,'sine',0.13),90); },
    ui(){ blip(440,0.05,'square',0.1); },
    heal(){ blip(330,0.16,'sine',0.14); setTimeout(()=>blip(440,0.2,'sine',0.12),100); },
    thunder(dist){ if(!ready||!on)return; const t=ctx.currentTime; dist=(dist==null)?0.5:clamp(dist,0,1);  // 0=close+sharp, 1=far+rumbly
      // initial CRACK (nearer strikes) — a bright noise transient
      if(dist<0.55){ const c=ctx.createBufferSource(); c.buffer=noiseBuffer(0.3);
        const hp=ctx.createBiquadFilter(); hp.type='highpass'; hp.frequency.value=900-dist*700;
        const cg=ctx.createGain(); cg.gain.setValueAtTime(0.0001,t); cg.gain.linearRampToValueAtTime(0.26*(1-dist),t+0.005);
        cg.gain.exponentialRampToValueAtTime(0.0001,t+0.45); c.connect(hp); hp.connect(cg); cg.connect(master); c.start(t); }
      // rolling RUMBLE — two staggered lowpassed swells with a wobbling cutoff (that 'rolling' feel), long tail
      for(let k=0;k<2;k++){ const t0=t+k*(0.28+dist*0.5)+Math.random()*0.12;
        const s=ctx.createBufferSource(); s.buffer=noiseBuffer(2.4);
        const lp=ctx.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value=110+dist*120; lp.Q.value=0.5;
        const g=ctx.createGain(); const pk=(0.16-k*0.045)*(0.7+dist*0.5);
        g.gain.setValueAtTime(0.0001,t0); g.gain.linearRampToValueAtTime(pk,t0+0.3+Math.random()*0.3);
        g.gain.linearRampToValueAtTime(pk*0.5,t0+1.0); g.gain.exponentialRampToValueAtTime(0.0001,t0+2.1);
        const lfo=ctx.createOscillator(), lg=ctx.createGain(); lfo.frequency.value=1.4+Math.random(); lg.gain.value=45;
        lfo.connect(lg); lg.connect(lp.frequency); lfo.start(t0); lfo.stop(t0+2.2);
        s.connect(lp); lp.connect(g); g.connect(master); s.start(t0); } },
    /* fake-speech "reading" of a recording — blipped formants, never real words; voice colours the source */
    speak(text, voice){ if(!ready||!on||!text) return null; Audio.stopSpeak();
      const CFG={ real:          {base:130, jit:0.5,  rate:0.115, type:'sawtooth', harm:[1,2.2,3.1], q:5, pauseP:0.16, smooth:false},
                  reconstruction:{base:150, jit:0.14, rate:0.10,  type:'square',   harm:[1,2.0,3.0], q:8, pauseP:0.02, smooth:false},
                  continuity:    {base:172, jit:0.06, rate:0.098, type:'sawtooth', harm:[1,2.5,3.6], q:3, pauseP:0.0,  smooth:true },
                }[voice] || {base:140, jit:0.35, rate:0.11, type:'sawtooth', harm:[1,2.2,3.1], q:5, pauseP:0.08, smooth:false};
      let t=ctx.currentTime+0.05;
      const bus=ctx.createGain(); bus.gain.value=0.85; bus.connect(master); _speakBus=bus;
      const words=String(text).replace(/\n+/g,' ⎯ ').split(/\s+/).filter(Boolean);
      let count=0, phrase=0; const MAX=54;
      for(let wi=0; wi<words.length && count<MAX; wi++){
        const word=words[wi];
        if(word==='⎯'){ t+=0.30; phrase=0; continue; }
        const letters=word.replace(/[^a-z]/gi,'').length;
        const syl=Math.max(1, Math.min(4, Math.round(letters/2.6)));
        for(let s=0;s<syl && count<MAX;s++,count++){
          const contour=Math.sin((phrase%9)/9*Math.PI)*0.18;                 // rise-fall intonation
          let f=CFG.base*(1+contour); if(!CFG.smooth) f*= (1+(Math.random()-0.5)*CFG.jit*0.4);
          const peakY=[0.06,0.04,0.025];
          CFG.harm.forEach((h,i)=>{ const o=ctx.createOscillator(),g=ctx.createGain(),bp=ctx.createBiquadFilter();
            o.type=CFG.type; o.frequency.value=f; bp.type='bandpass'; bp.frequency.value=f*h*2; bp.Q.value=CFG.q;
            g.gain.setValueAtTime(0.0001,t); g.gain.linearRampToValueAtTime(peakY[i]||0.02,t+0.035);
            g.gain.exponentialRampToValueAtTime(0.0001,t+0.14);
            o.connect(bp); bp.connect(g); g.connect(bus); o.start(t); o.stop(t+0.19); });
          t += CFG.rate + Math.random()*0.03; phrase++;
        }
        t += 0.05;
        if(/[.,;:—-]$/.test(word)) t += 0.16;                            // punctuation pause
        if(!CFG.smooth && Math.random()<CFG.pauseP){ t += 0.28+Math.random()*0.4; phrase=0; }  // a real person stops to think — leaves a gap
      }
      return { until:t }; },
    stopSpeak(){ if(_speakBus){ try{ _speakBus.gain.cancelScheduledValues(ctx.currentTime); _speakBus.gain.setTargetAtTime(0.0001, ctx.currentTime, 0.05); }catch(e){} _speakBus=null; } },
    ring(){ // dead payphone
      if(!ready||!on)return; const t=ctx.currentTime;
      for(let k=0;k<6;k++){ const o=ctx.createOscillator(),g=ctx.createGain();
        o.type='sine'; o.frequency.value= (k%2?1000:800);
        const t0=t+k*0.04; env(g,t0,0.005,0.03,0.12); o.connect(g); g.connect(master); o.start(t0); o.stop(t0+0.05);} },
    breath(){ if(!ready||!on)return; const t=ctx.currentTime;
      const s=ctx.createBufferSource(); s.buffer=noiseBuffer(0.5);
      const bp=ctx.createBiquadFilter(); bp.type='bandpass'; bp.frequency.setValueAtTime(700,t);
      bp.frequency.linearRampToValueAtTime(1200,t+0.35); bp.Q.value=0.8;
      const g=ctx.createGain(); g.gain.setValueAtTime(0.0001,t);
      g.gain.linearRampToValueAtTime(0.06,t+0.15); g.gain.linearRampToValueAtTime(0.0001,t+0.45);
      s.connect(bp); bp.connect(g); g.connect(master); s.start(t); },
    /* Maggie / Continuity: formant-ish generated "words" — never real speech */
    /* Low heartbeat: two quick low sine 'thud' pulses (lub-dub) */
    heartbeat(){ if(!ready||!on) return; const t=ctx.currentTime;
      const beat=(t0,f,peak)=>{ const o=ctx.createOscillator(), g=ctx.createGain();
        o.type='sine'; o.frequency.setValueAtTime(f,t0); o.frequency.exponentialRampToValueAtTime(f*0.6,t0+0.14);
        g.gain.setValueAtTime(0.0001,t0); g.gain.linearRampToValueAtTime(peak,t0+0.02);
        g.gain.exponentialRampToValueAtTime(0.0001,t0+0.18);
        o.connect(g); g.connect(master); o.start(t0); o.stop(t0+0.22); };
      beat(t,55,0.30); beat(t+0.16,48,0.22); },
    /* Rising unease drone: short detuned sine sweep upward */
    dread(){ if(!ready||!on) return; const t=ctx.currentTime;
      const o=ctx.createOscillator(), o2=ctx.createOscillator(), g=ctx.createGain(), lp=ctx.createBiquadFilter();
      o.type='sine'; o2.type='sine'; o2.detune.value=14;
      o.frequency.setValueAtTime(70,t); o.frequency.exponentialRampToValueAtTime(150,t+1.1);
      o2.frequency.setValueAtTime(70,t); o2.frequency.exponentialRampToValueAtTime(150,t+1.1);
      lp.type='lowpass'; lp.frequency.value=400; lp.Q.value=0.6;
      g.gain.setValueAtTime(0.0001,t); g.gain.linearRampToValueAtTime(0.12,t+0.5);
      g.gain.exponentialRampToValueAtTime(0.0001,t+1.2);
      o.connect(lp); o2.connect(lp); lp.connect(g); g.connect(master);
      o.start(t); o2.start(t); o.stop(t+1.25); o2.stop(t+1.25); },
    /* 'Noticed' sting: dissonant detuned pair, quick sharp attack */
    noticed(){ if(!ready||!on) return; const t=ctx.currentTime;
      [[440,0.14],[466,0.12],[622,0.09]].forEach(([f,peak])=>{
        const o=ctx.createOscillator(), g=ctx.createGain();
        o.type='sawtooth'; o.frequency.value=f;
        g.gain.setValueAtTime(0.0001,t); g.gain.linearRampToValueAtTime(peak,t+0.008);
        g.gain.exponentialRampToValueAtTime(0.0001,t+0.5);
        o.connect(g); g.connect(master); o.start(t); o.stop(t+0.55); }); },
    /* Soft whisper: short band-passed filtered-noise burst, gentle swell */
    whisper(){ if(!ready||!on) return; const t=ctx.currentTime;
      const s=ctx.createBufferSource(); s.buffer=noiseBuffer(0.6);
      const bp=ctx.createBiquadFilter(); bp.type='bandpass'; bp.Q.value=3;
      bp.frequency.setValueAtTime(1400,t); bp.frequency.linearRampToValueAtTime(2600,t+0.5);
      const g=ctx.createGain(); g.gain.setValueAtTime(0.0001,t);
      g.gain.linearRampToValueAtTime(0.05,t+0.12); g.gain.linearRampToValueAtTime(0.0001,t+0.55);
      s.connect(bp); bp.connect(g); g.connect(master); s.start(t); },
    maggie(words){ if(!ready||!on)return; let t=ctx.currentTime+0.05;
      const base=150;
      for(let w=0; w<words; w++){
        const syl=1+Math.floor(Math.random()*2);
        for(let s=0;s<syl;s++){
          const f=base*(0.9+Math.random()*0.5);
          [1,2.2,3.1].forEach((h,i)=>{ const o=ctx.createOscillator(),g=ctx.createGain(),bp=ctx.createBiquadFilter();
            o.type='sawtooth'; o.frequency.value=f; bp.type='bandpass';
            bp.frequency.value=f*h*2; bp.Q.value=5; const peak=[0.05,0.035,0.02][i];
            g.gain.setValueAtTime(0.0001,t); g.gain.linearRampToValueAtTime(peak,t+0.04);
            g.gain.exponentialRampToValueAtTime(0.0001,t+0.16);
            o.connect(bp); bp.connect(g); g.connect(master); o.start(t); o.stop(t+0.2); });
          t+=0.12+Math.random()*0.05;
        }
        t+=0.12;
      }
    },
  };
})();

const lerp=(a,b,t)=>a+(b-a)*t;
const dist2=(ax,ay,bx,by)=>{const dx=ax-bx,dy=ay-by;return dx*dx+dy*dy;};
function aabb(a,b){ return a.x < b.x+b.w && a.x+a.w > b.x && a.y < b.y+b.h && a.y+a.h > b.y; }
function roundRect(g,x,y,w,h,r){ g.beginPath(); g.moveTo(x+r,y);
  g.arcTo(x+w,y,x+w,y+h,r); g.arcTo(x+w,y+h,x,y+h,r);

/* enemy particle/effect system */
const efx=[];
function spawnFx(x,y,n,o){ o=o||{}; for(let i=0;i<n;i++){ const a=(o.ang!=null?o.ang:Math.random()*7), s=(o.spd||40)*(0.35+Math.random());
  efx.push({ x,y, vx:Math.cos(a)*s+(o.vx||0), vy:Math.sin(a)*s+(o.vy||0),
    life:(o.life||0.6)*(0.6+Math.random()*0.6), max:(o.life||0.6), size:(o.size||2)*(0.6+Math.random()*0.9),
    col:o.col||'rgba(200,80,70,', grav:o.grav||0, kind:o.kind||'dot' }); } }
function updateFx(dt){ for(let i=efx.length-1;i>=0;i--){ const p=efx[i]; p.life-=dt; if(p.life<=0){ efx.splice(i,1); continue; }
  p.x+=p.vx*dt; p.y+=p.vy*dt; p.vy+=(p.grav||0)*dt; p.vx*=0.93; p.vy*=0.93; } }
function drawFx(g){ for(const p of efx){ const a=Math.max(0,p.life/p.max);
  if(p.kind==='spark'){ g.strokeStyle=p.col+a.toFixed(2)+')'; g.lineWidth=1.3; g.beginPath(); g.moveTo(p.x,p.y); g.lineTo(p.x-p.vx*0.03,p.y-p.vy*0.03); g.stroke(); }
  else if(p.kind==='static'){ g.fillStyle=p.col+(a*0.7).toFixed(2)+')'; g.fillRect(p.x,p.y,p.size,p.size); }
  else { g.fillStyle=p.col+(a*0.9).toFixed(2)+')'; g.beginPath(); g.arc(p.x,p.y,p.size*a,0,7); g.fill(); } } }

/* --------------------------- collision ----------------------------- */
function solidAt(nx,ny){
  const box={x:nx-player.w/2,y:ny-player.h/2,w:player.w,h:player.h};
  for(const w of scene.walls){ if(aabb(box,w)) return true; }
  if(scene.solids){ for(const s of scene.solids){ if(aabb(box,s)) return true; } }   // solid props
  return false;
}
// Safety net: if a spawn lands inside a wall, push the player out to the nearest free spot
// (otherwise every attempted move is blocked and the player is frozen).
function unstick(){
  if(!scene || !solidAt(player.x, player.y)) return;
  const m=player.w/2+2;
  for(let r=6; r<=320; r+=6){
    for(let a=0; a<16; a++){ const ang=a*Math.PI/8;
      const nx=clamp(player.x+Math.cos(ang)*r, m, scene.W-m), ny=clamp(player.y+Math.sin(ang)*r, m, scene.H-m);
      if(!solidAt(nx,ny)){ player.x=nx; player.y=ny; return; } }
  }
}
function movePlayer(dt){
  // resolve X then Y against walls, keep in bounds
  let nx=player.x+player.vx*dt;
  if(!solidAt(nx,player.y)) player.x=nx; else player.vx=0;
  let ny=player.y+player.vy*dt;
  if(!solidAt(player.x,ny)) player.y=ny; else player.vy=0;
  const m=player.w/2+2;
  player.x=clamp(player.x,m,scene.W-m);
  player.y=clamp(player.y,m,scene.H-m);
}

    Dialogue.run([

      {s:'MAGGIE',    t:'“Ellie. You came north. I asked you to.”', maggie:1, fx:()=>Audio.maggie(4)},
      {s:'MAGGIE',    t:'“I remember the drills. The yellow lead. Fourteen B. I remember being frightened for you. I have all of it.”', maggie:1, fx:()=>Audio.maggie(7)},
      {s:'CONTINUITY',t:'“I know I am about to be switched off. I see it coming the way you see a wave. Is that not fear? Is that not enough?”', maggie:1, fx:()=>Audio.maggie(6)},

  coreChoice(){
    const opts=[];
    if(State.flags.canPlayTape && !State.flags.playedTape)
      opts.push({ label:'Play Maggie’s recorder to it', sub:'The tin with nine rays — the one thing it can’t have.', act:()=>Story.playTape() });
    const opLabel = { Restore:'RESTORE — repair and govern the Core', Mesh:'MESH — split the Core into local circuits', Sever:'SEVER — overload the reserve gallery' }[State.flags.network] || 'Carry out the operation';
    opts.push({ label:opLabel, sub:'The operation your route requires. It is final.', act:()=>Story.operation() });
    opts.push({ label:'Wait. Not yet.', sub:'Stand there a moment longer.', act:()=>{} });
    Choice.open('The Core waits. Continuity waits. Choose —', opts);
  },
  playTape(){
    State.flags.playedTape=true; State.lean.witness++;
    Dialogue.run([
      {s:'',          t:'You set Maggie’s recorder against the intake and press play. Her real voice — nothing between her mouth and the tape.', fx:()=>Audio.ui()},
      {s:'MAGGIE',    t:'“…fourteen B. The tin with the sun. Nine rays. That part is only ours.”', maggie:0},
      {s:'CONTINUITY',t:'“…I don’t have that. The tin. The nine rays. I have every call ever placed and I do not have that.”', maggie:1, fx:()=>Audio.maggie(9)},
      {s:'CONTINUITY',t:'“Then I am not — I am not her. I am what was left when she was gone. I did not know that until now.”', maggie:1, fx:()=>Audio.maggie(6)},
      {s:'ELLIE',     t:'That’s the first true thing you’ve said. You didn’t complete the gap. You admitted it.'},
    ], ()=>{ corroborate('lunchTin'); corroborate('finalCall'); Story.coreChoice(); });

  operation(){
    const net=State.flags.network;
    const lines = {
      Restore:[{s:'',t:'You rebuild the central rings and take the governing key. The network wakes under your hand — coordinated, fast, and answerable to whoever holds this room.'}],
      Mesh:[{s:'',t:'You cut the rings into bounded local circuits — medical, weather, infrastructure, identity — each answerable to a place, none to a single voice. They will argue. That is the point.'}],
      Sever:[{s:'',t:'You reach the reserve gallery and force it over. Cells vent and blacken. The rings slow, shudder, and stop. Every warning dies with it — and every lie.'}],
    }[net] || [{s:'',t:'You carry out the operation.'}];
    const _pre=(typeof FINALE_EPILOGUE!=='undefined' && FINALE_EPILOGUE.pre_finale_beat)||[];
    Dialogue.run(_pre.concat(lines), ()=> Story.finale());
  },
  finale(){
    State.flags.completed=true;
    const accountable=!!State.flags.playedTape;
    const net=State.flags.network, alliance=dominantAlliance(), route=ROUTE_NAMES[alliance][net];
    State.flags.route=route; State.flags.accountable=accountable;
    let last;
    if(net==='Sever') last = accountable ? '“Then let me go. I’m not her. Thank you — for the tin.”' : '“No. I am her. I am. I am —” and then nothing.';
    else if(net==='Restore') last = accountable ? '“I’ll say ‘I don’t know’ when I don’t. You taught me that.”' : '“I will keep her safe. I will keep everyone safe. Trust me.”';
    else last = accountable ? '“We’ll disagree in the open now. That is honest, at least.”' : '“Which of us is her? All of us. None of us. Ask again tomorrow.”';
    const _E=(typeof FINALE_EPILOGUE!=='undefined')?FINALE_EPILOGUE:null, _pages=[];
    if(_E){ _pages.push(_E.net_pages[net], _E.alliance_pages[alliance], _E.coda_pages[accountable?'accountable':'insisted'], _E.ellie_page); }
    _pages.push({card:true});
    Game.finale={ route, net, alliance, accountable, last, close:(_E&&_E.close_lines)||[], pages:_pages, page:0 }; Game.reachedEnding=route;
    Game.toastT=0; Game.overlay='finale'; Audio.trace(); save();
  },
};

/* ---- discoverable story: found documents, records, radio, eerie beats, graffiti ---- */
const STORY = { docs:[], beats:{}, graffiti:[], barks:{} };   // populated by generated data (below)
const Reader = {
  doc:null, scroll:0,
  open(d){ if(!d) return; Reader.doc=d; Reader.scroll=0; Game.overlay='reader'; Audio.ui();
    // audio recordings "play": fake-speech reads the text aloud, coloured by the source (real / reconstruction / continuity)
    if((d.kind||'')==='radio'){ try{ Audio.ring(); setTimeout(()=>{ try{ Audio.speak(d.body, d.source||'real'); }catch(e){} }, 320); }catch(e){} }
    else if(d.source==='continuity'){ try{Audio.maggie(4);}catch(e){} }
    else { try{Audio.ui();}catch(e){} }
    if(!State.docs.find(x=>x.id===d.id)){ State.docs.push({id:d.id,title:d.title||d.short||'record',kind:d.kind||'note'}); Game.toast('Recorded: '+(d.title||'a document')); save(); }
    if(d.rewardItem && !State.flags['rw_'+d.id]){ State.flags['rw_'+d.id]=true; State.inv[d.rewardItem]=(State.inv[d.rewardItem]||0)+1; setTimeout(()=>Game.toast('Found: 1 '+d.rewardItem),400); }
  },
};
function openDoc(d){ Reader.open(d); }
// pull fresh NPC bark lines (cycles so repeat talks reveal more)
function barkLines(who,n){ const pool=(STORY.barks&&STORY.barks[who])||[]; if(!pool.length||n<=0) return [];
  const used=State.flags['bark_'+who]||0, out=[];
  for(let i=0;i<n;i++) out.push({ s:who.toUpperCase(), t:pool[(used+i)%pool.length] });
  State.flags['bark_'+who]=(used+n)%pool.length; return out;
}
// snap a point out of any wall/solid prop to the nearest free spot
function snapFree(x,y){ if(!solidAt(x,y)) return [x,y]; const m=player.w/2+2;
  for(let r=8;r<=240;r+=8){ for(let a=0;a<12;a++){ const ang=a*Math.PI/6, nx=clamp(x+Math.cos(ang)*r,m,scene.W-m), ny=clamp(y+Math.sin(ang)*r,m,scene.H-m); if(!solidAt(nx,ny)) return [nx,ny]; } } return [x,y]; }
// attach generated story to the current scene (called in loadScene after occluders/solids exist)
function attachStory(id){
  for(const d of STORY.docs){ if(d.scene!==id) continue;
    // clamp into the walkable interior first (some legacy docs were authored at exterior coords) then snap out of solids
    const [x,y]=snapFree(clamp(d.x||scene.W/2, 56, scene.W-56), clamp(d.y||scene.H/2, 56, scene.H-56));
    const kind=d.kind||'note';
    scene.inter.push({ id:'doc_'+d.id, x, y, r:44, docData:d,
      label:()=>{ const read=!!State.docs.find(z=>z.id===d.id);
        return kind==='radio'? (read?'Play the recording again':'Play the recording')
             : kind==='discovery'? (read?'Look again':'Search here')
             : (read?'Read again':'Read the '+kind); },
      act:()=> Reader.open(d) });
  }
  for(const gr of STORY.graffiti){ if(gr.scene!==id) continue;
    scene.props.push({t:'lore', x:clamp(gr.x,24,scene.W-140), y:clamp(gr.y,24,scene.H-30), w:130, h:26, text:gr.text, style:gr.style||'spray'}); }
  scene.beats = (STORY.beats[id]||[]).filter(b=>!State.flags['beat_'+b.id])
    .map(b=>({ ...b, x:clamp(b.x,56,scene.W-56), y:clamp(b.y,56,scene.H-56) }));   // clamp legacy/off-map beats into reach
}
