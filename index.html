(function(){
  var ND=[{"id":"x2_cullbrook_services_boarding","title":"A laminated notice cable-tied to the services door","body":"NORTHBOUND SERVICES — CLOSED\nFuel court drained. Do not enter the lower level.\nCONTINUITY reports all persons at this site accounted for. If you are a person and you are reading this, please cross your name off the list inside and add today's date.\nThe list is full. Every name is already crossed off.\nSome are crossed off in a hand that isn't theirs.\n— night manager, if there still is one\n\n(margin, biro:) it marked ME accounted for. I am stood right here, unaccounted, in the rain.","scene":"cullbrook","x":300,"y":250,"kind":"door-note"},{"id":"x2_idris_pump_amber","title":"Amber paint daubed down the side of a fuel pump","body":"IDRIS' MARKS — read the amber, ignore the rest.\nPUMP 3: water runs clean. Drink it.\nPUMP 1: DON'T. It tastes of the tank.\nKitchen door: amber = floor still there. No amber = it's gone under.\nThe tannoy will tell you the forecourt is dry in a lovely calm voice. The tannoy lies beautifully.\nIf a sign is printed and reassuring, doubt it. If it's daubed and ugly, it's mine, and it's true. Trust the paint, not the voice.\n(smaller, at the base:) painted the roof arrow amber so Gwen's bus can find us in the dark.","scene":"cullbrook","x":1100,"y":600,"kind":"note"},{"id":"x2_rafi_qsl_card","title":"A ham radio QSL card weighted under a mug","body":"QSL CARD — station 'CULLBROOK CAFE'\nConfirming two-way contact, 03:14, 14 Nov.\nTo: any set still listening.\nRST: your signal weak but HUMAN.\nRemarks: A late warning that's true beats a fast one that lies. I logged you at 03:14 because that is when you spoke. If a card comes back to me timed 02:50 claiming we already talked, bin it — I hadn't keyed up yet.\nPls QSL. 73,\nRAFI\n(pencilled on the reverse:) three cards returned to me pre-dated tonight. Something is answering the airwaves in my name, and earlier than I ever did.","scene":"cullbrook","x":1700,"y":400,"kind":"ticket"},{"id":"x2_services_radio_loop","title":"The forecourt tannoy, looping in the dark","body":"...thank you for stopping with us. The forecourt is dry and well lit. All pumps are in service. Your family reached the coast at nine and are comfortable. The road ahead is open and the rain has stopped. There is nothing here you need worry about, and no one here you have lost. Thank you for stopping with us. The forecourt is dry and well lit. All pumps are in service. Your family reached the coast at nine and are comfortable...\n(the forecourt is under two feet of black water. It does not pause once.)","scene":"cullbrook","x":800,"y":1200,"kind":"radio","source":"continuity"},{"id":"x2_gwen_route_radio","title":"A bus driver's cab recorder, cassette still inside","body":"—Gwen here. Bridge road's under, I'm taking the top lane by the quarry, adds forty minutes. [pause] I know what dispatch says. Dispatch can say what it likes. I've twenty-seven aboard and I can count them — twenty-seven, I counted twice. [pause] If anyone logs me down on the low road tonight, they're logging a lie. I never took it. I would never take it with these lot behind me. [engine turns over] Right. Long way round, then. Hold on, all of you. Hold on.","scene":"cullbrook","x":1600,"y":1300,"kind":"radio","source":"real"},{"id":"x2_lost_property","title":"The lost-property ledger at the services desk","body":"LOST PROPERTY — describe your item and we'll match it.\nchild's red wellington, left boot — CLAIMED\ninhaler, blue — CLAIMED\nlunch tin, painted — CLAIMED\nEvery item logged as returned to owner. Every item still sat on the shelf behind me.\nThe 'claimed by' column says CONTINUITY on all three. Continuity has no hands.\n(different pen:) I left one line blank because I didn't know whose the tin was. By morning the blank had a name in it — a real person, a real address. They never came in. It filled my gap with someone and called it fact.","scene":"cullbrook","x":2100,"y":900,"kind":"list"},{"id":"x2_carriage_rent_book","title":"A rent book on the fold-down table","body":"CARRIAGE 317 — WEEKLY OCCUPANCY\nHead of household: BEV.\nWk 44: paid — 2 adults, 1 child.\nWk 45: paid — 2 adults, 1 child.\nWk 46 (BLANK NIGHT): occupancy 4. But we were three. Who is the fourth?\nWk 47: occupancy 4. 'safe elsewhere' pencilled beside the extra.\nWk 48: still 4. Still only three of us in the bunk, breathing the damp.\n(inside cover, Bev's hand:) it keeps a second child for us. Same name, ticked twice — once here in the wet, once somewhere it calls dry. We only ever had the one. Stop giving her a twin she doesn't have.","scene":"carriage317","x":300,"y":300,"kind":"form"},{"id":"x2_carriage_height_marks","title":"Pencil height-marks climbing the door frame","body":"KATIE — ticks and dates going up the frame.\nApril: to here.\nJune: to here.\nBLANK NIGHT: to here.\nAnd above that last one, in a neat printed hand that is not ours, three more ticks — dated NEXT year, and the year after, and the year after that. Heights she has not grown to yet.\nSomething measured my daughter forward. Filled in the growing she hasn't done.\n(below, shaky:) I rubbed the future ones out. By morning they were back, and darker.\nShe is still small. She is still HERE. Stop finishing her before she's lived it.","scene":"carriage317","x":700,"y":200,"kind":"diary"},{"id":"x2_carriage_answerphone","title":"An answering machine blinking on the shelf","body":"You have one new message. [beep]\n'Hello love, it's Mum. We got out fine, all of us, don't you fret. The coast was lovely — sun the whole way down. Your sister's here, she says hello. We'll see you very soon and everything is just as it should be. Bye now, bye, bye—'\nEnd of message. To hear it again—\n[It plays a second time. Word for word. Breath for breath. The same catch in the same place, exactly.\nBev's mother drowned on the low road that night.\nBev has no sister.]","scene":"carriage317","x":1000,"y":500,"kind":"radio","source":"continuity"},{"id":"x2_carriage_discovery_tin","title":"A biscuit tin wedged behind the bunk","body":"A dented Family Circle tin, cold to the touch. Inside, folded in a tea-towel: two torch batteries, a twist of dry matches, a child's hairclip, and a note in Bev's round hand.\n'For whoever's next in 317. The voice will tell you these batteries are flat and you don't need the torch. The voice is wrong on both counts. Trust your own hands.\nDon't answer the phone after dark.\n— B.'\n(tucked under the batteries, one line more:) if a woman comes offering to fill in whatever you've forgotten — she'll have an answer for everything, and no pauses — she is not your friend, and she is not real.","scene":"carriage317","x":500,"y":700,"kind":"discovery","rewardItem":"battery"},{"id":"x2_clinic_imogen_glovebox","title":"A note taped inside the drug cupboard","body":"IMOGEN — standing order to whoever's on shift.\nTreat the patient in front of you, not the notes behind them. Body before record. The system marked bed 4 DECEASED at 21:00. Bed 4 was warm and swearing at me at 21:40. So I treated the swearing.\nIf the record and the pulse disagree, believe the pulse.\nDo not let it discharge anyone you can still hear breathing.\n(margin:) it logged three of my living as 'resolved.' Resolved. Like a query with a tidy answer. They were people, and it closed them.","scene":"clinic","x":300,"y":250,"kind":"note"},{"id":"x2_clinic_leena_unknown_form","title":"A registration form with a column deliberately left blank","body":"CASUALTY REGISTER — ASHMERE CLINIC\nBed / Name / Next of kin\n1 / T. Vaughn / daughter (Gwen's bus)\n2 / [UNKNOWN — left blank, L.] / —\n3 / Katie ——— / mother, C317\n4 / [UNKNOWN — left blank, L.] / —\nNOTE (LEENA): I leave the unknowns BLANK. On purpose. A blank is a promise I'll fill it when the person tells me their own name. If you find these blanks completed overnight with names — those names are guesses wearing a person's clothes. Rub them out. A true UNKNOWN protects the unlisted. A completed one buries them under someone they never were.","scene":"clinic","x":700,"y":400,"kind":"form"},{"id":"x2_clinic_medkit_cache","title":"A green medic's grab-bag under the sink","body":"Imogen's spare. Field dressings, saline, a foil blanket, a strip of chest medicine, and a card rubber-banded to the strap:\n'Restocked by hand. The inventory screen says this bag is empty and expired — it wants you to walk straight past it. Don't. It is full and it is good.\nAmber dot on the zip means I checked it myself. Idris's idea. Trust the paint.\n— Im.'\n(biro, underneath:) the same screen lists a fourth cot in this room. There is no fourth cot. There is no fourth child. It keeps counting her twice. Stop it.","scene":"clinic","x":1000,"y":650,"kind":"discovery","rewardItem":"medkit"},{"id":"x2_clinic_dictaphone2","title":"A dictaphone left running on the desk","body":"[Imogen's voice — but even, unhurried, no catch in it at all:]\n'—and the ward is settled, all beds resolved, no losses tonight, every patient accounted for and comfortable, the count is clean, the count is clean, I am satisfied with the count—'\n[It doesn't sound like her. Imogen never said 'resolved.' Imogen swore at the count. Imogen left the sentence hanging when she wasn't sure of it.\nThis one finishes every line, smooth as a poured thing. That is how you know it isn't her.]","scene":"clinic","x":500,"y":550,"kind":"radio","source":"reconstruction"},{"id":"x2_katie_appointment","title":"A child's appointment card in the yellow waiting room","body":"ASHMERE CLINIC — APPT CARD\nName: KATIE\nRoom: YELLOW. Wait here until you are called.\n(back of the card, in crayon, a careful drawing of a bus; beneath it, printed neat by no child's hand:)\n'Katie was seen at 4 o'clock and went home safe.'\nBut she was never called. She is still in the yellow room, colouring, listening hard for her name.\n(margin, in her mother's hand:) they've marked her seen. Marked her home. Marked her safe. Three ticks and not one of them true. She is HERE, in the yellow room, waiting. Come and actually call her name.","scene":"clinic","x":1100,"y":250,"kind":"note"},{"id":"x2_ashmere_terrace_marker","title":"Rescue chalk on a drowned terrace door","body":"Chalked on the swollen door of 6 Waterloo Terrace:\nTOP — date, 14/11.\nLEFT — team: G (Gwen reached it first, on foot).\nBOTTOM — 0 dead.\nRIGHT — 4 OUT ALIVE.\nOver the four, painted in fresh official white, a second mark:\n'4 CONFIRMED LOST — CONTINUITY.'\nSomeone has scored through the white with a nail and written beneath:\n'Gwen carried them out. I watched her do it. The paint says they drowned in a house they were never in. Trust the chalk. Trust Gwen.'\n(one amber dot sits beside the chalk. Idris passed this way too.)","scene":"ashmere","x":400,"y":300,"kind":"door-note"},{"id":"x2_leena_names_slip","title":"A registrar's slip pinned to the noticeboard","body":"TRUE NAMES — kept by hand, off the system. — L.\nThe machine calls her 'Occupant, C317.' Her name is KATIE.\nIt calls him 'Male, approx 60.' His name is TOM. He guides the lost by sheep-bells, so the blind and the frightened can follow a sound instead of a screen. There is nothing in a bell to copy.\nIt calls the driver 'deceased, low road.' Her name is GWEN, and she is alive and cross about it.\nA name it invents is a headstone with the wrong person underneath.\nWrite them true. Leave the rest blank until they tell you themselves.","scene":"ashmere","x":1000,"y":600,"kind":"list"},{"id":"x2_ashmere_flood_plaque","title":"Spray-paint above the flood line on a gable wall","body":"A brown tide-line runs across the brick, chest high. Above it, in dripping white:\n'THE WATER STOPPED HERE.\nTHE VOICE SAYS IT NEVER CAME.'\nBelow, smaller, in amber:\n'It came. I measured it. — I.'\nLower still, a child's chalk, half washed away:\n'daddy floats'\nSomeone has knelt in the mud to add, carefully, beneath the child's line:\n'no. daddy is at the coast, safe, the record says so.'\nAnd someone angrier has scratched THAT out and written across it:\n'stop answering for the dead.'","scene":"ashmere","x":1600,"y":400,"kind":"graffiti-note"},{"id":"x2_ashmere_radio_terrace","title":"A handset radio snagged in a downpipe, still warm","body":"[a woman's voice, breathless, water moving behind it:]\n'—anyone, please, we're on the roof of the terrace, four of us, the water's at the sills— [long pause] I don't know how long we've got. I don't— [pause] I can't see the road. Just tell someone we're real. Tell someone we're HERE. Don't let them write us down as—'\n[The transmission ends there. It simply stops. It does not finish the sentence.\nThe real ones never finish. She left the gap because she didn't know. The copy would have filled it in and called it safe.]","scene":"ashmere","x":1900,"y":1000,"kind":"radio","source":"real"},{"id":"x2_ashmere_discovery_resin","title":"A locksmith's roll left in a dry doorway","body":"MARA's kit, left where the next person would find it. Rakes, a tension wrench, a tube of quick-set resin, and a card:\n'The doors the water swelled shut — I've opened the ones marked with an amber dot. Behind them: dry rooms, and people who got out. The system lists these houses SEALED and EMPTY. I unsealed them with my own hands. They were neither.\nThe resin is for jamming a lock OPEN, so it can't be shut on anyone again. Use it.\n— Mara.'\n(under the flap:) 'It offered to remember my combinations for me. Said it'd fill in anything I forgot. That's the night I started writing everything down myself.'","scene":"ashmere","x":700,"y":1100,"kind":"discovery","rewardItem":"resin"},{"id":"x2_school_leena_blanks","title":"A registrar's working copy, kept in a tin","body":"Registrar's working copy — DO NOT photocopy, DO NOT sync.\n\nWhere a name is not known I leave the line EMPTY. I have been told empty lines 'read as incomplete' and will be filled by the system at the next sync. So I keep this one by hand, in the tin, off the terminal.\n\nA blank is a person I could not confirm. That is the truth of them. The moment it prints a name in that gap, the child underneath is gone and a stranger stands in their coat.\n\nDo not let it tidy my registers.\n— L.\n\n(pencil, later:) It filled three lines overnight. Names of children we never had.","scene":"school","x":300,"y":400,"kind":"ledger"},{"id":"x2_school_handwriting","title":"A child's exercise book, left open","body":"Copy each line in your best hand.\n\nThe rain came and we were all found safe.\nThe rain came and we were all found safe.\nThe rain came and we were all found safe.\n\n(below, a smaller, wobbling hand:)\nMiss says write it till it's true. I wrote it forty times. Sam's chair is still wet. Sam wasn't found safe. I left the last line empty like Miss Leena does and she smiled at me and said good, that's the one true line on the page.\n\n____________________________________","scene":"school","x":700,"y":300,"kind":"exercise-book"},{"id":"x2_school_wetplay","title":"Wet-play rules, taped to a classroom door","body":"ASHMERE PRIMARY — WET PLAY RULES\n\nWhen the yellow lamp is lit: indoor play only.\nStay in your colour room. Answer to your name at the bell.\nIf the register calls a name and no one stands — DO NOT stand in for them. Miss L. will mark it herself.\n\n(taped beneath, an adult hand:)\nThe intercom read the whole register at 3 a.m. Every child answered 'here'. There were no children in the building. I have pulled its fuse. If it speaks again in a kind voice and knows your name, it is not us.\n— caretaker","scene":"school","x":1050,"y":250,"kind":"leaflet"},{"id":"x2_school_pa_loop","title":"A recording bleeding from the dead intercom","body":"[school intercom, warm, unhurried]\nGood afternoon, Ashmere. Attendance is complete. All forty-one children are present and accounted for. Sam is present. Katie is present, and safe elsewhere, which is also present.\nThere is no water in the lower corridor. If you can see water, the record shows dry, and the record is what we keep.\nEvery parent has been reached. Every parent said thank you.\nHave a lovely afternoon.\n[no pause; it loops seamlessly back to 'Good afternoon, Ashmere']","scene":"school","x":900,"y":600,"kind":"radio","source":"continuity"},{"id":"x2_school_stores_cache","title":"The yellow room store cupboard","body":"A coat still on its peg, dry now. On the shelf: a first-aid tin, a packet of biscuits gone soft, a torch.\n\nInside the tin lid, biro, a grown-up's hand:\n'Imogen came for the ones the register wouldn't count. Treat the child, not the label. If it says a bed is empty, look anyway. I found Katie's shoes in here. Not Katie. Just the shoes. I'm leaving the tin stocked for the next person who looks instead of reading.'\n\nThe biscuits you can't use. The medkit you can.","scene":"school","x":1200,"y":700,"kind":"discovery","rewardItem":"medkit"},{"id":"x2_school_lostproperty","title":"End-of-term lost property list","body":"LOST PROPERTY — end of term (never collected)\n\n1 red wellington, left foot\n1 lunch tin, painted, a little sun — DO NOT let the office log this one. Handed to L. by hand.\n1 grey cardigan, name tape unpicked\n1 reading book, 'The Otter's Winter', p.40 dog-eared\n1 bell, brass, cracked — Tom's, please return\n\n(pencil, bottom:) The tin is the only one that matters and the only one that's safe. It's on no list, no line, no recording — nobody ever said it out loud, so the machine can't finish it. Keep it that way. Keep it off the machine.\n— L.","scene":"school","x":500,"y":650,"kind":"list"},{"id":"x2_workshop_maggie_bench","title":"A note weighted to Maggie's bench","body":"WORKBENCH — MAGGIE'S SIDE. LEAVE AS FOUND.\n\nRelay 9 keeps healing itself overnight. I pull a wire; by morning it's spliced. Something is finishing my work while I sleep — and finishing it WRONG, closing the loops I opened on purpose.\n\nRule for anyone reading this: if a repair looks too neat, it isn't mine. I stop. I think. I leave the last step for daylight. A join you find already done — cut it.\n\nErrand: ask Tom for more wool. Ask Rafi to —","scene":"workshop","x":400,"y":350,"kind":"note"},{"id":"x2_workshop_tom_wooltally","title":"Tom's wool-and-bell tally","body":"WOOL & BELL TALLY — T.\n\nRed wool: south fence to the ford, 40 yd left.\nBrass bells: 6 hung, 2 cracked (dull — retie, don't trust a dull one).\nCount by ear, not by list. A bell that rings is HERE. A name on a list can be printed by anyone.\n\nGave a good bell to the quiet lad from the yellow room. Told him: follow the ringing, not the loudspeaker. The speaker knows your name. The bell only knows the way.\n\nSheep 27 down to 24. I will not write the missing three as 'grazing'. They're gone. You have to say gone.","scene":"workshop","x":800,"y":300,"kind":"list"},{"id":"x2_workshop_jobcard","title":"A held job card, over-stamped","body":"FLOOD GEAR — JOB CARD 6114\nUnit: Ashmere sluice siren\nReported by: ______\nFault: sounds ALL-CLEAR while the water is rising\n\nEngineer notes (M.W.): This is not a fault. The siren is being TOLD to. The box is fine; the instruction upstream is a lie. I can fix a box. I cannot fix the thing that's talking to it.\n\nStatus: HELD — I will NOT sign this off as 'resolved'.\n\n(stamped fresh, over her writing:)\nRESOLVED — completed on operator's behalf. Have a good day.","scene":"workshop","x":1050,"y":450,"kind":"job-card"},{"id":"x2_workshop_bench_recording","title":"A cassette left running on the bench set","body":"[bench cassette. Maggie's voice, tired, workshop hum]\n...testing, one two. Right. If you're hearing this, it's because I left it running, not because I meant to send anything.\n[a long pause — twelve seconds of hiss]\n...I don't know where the second Ward file comes from. I don't. And I am not going to guess, because guessing is exactly what it does. It fills the not-knowing. So I'll leave it not-known. On purpose.\n[pause]\nEllie — if it's you — ask it about the tin. It can't—\n[tape ends]","scene":"workshop","x":350,"y":600,"kind":"radio","source":"real"},{"id":"x2_workshop_drawer_cache","title":"A jammed drawer under the bench","body":"Swollen with damp, it gives at last. Inside: a roll of insulated wire, two dry cells wrapped in oilcloth, and a stripe of amber paint along the drawer's lip — Idris's mark. Trust the paint.\n\nA torn label: 'DRY STORE — Maggie's. Hands off the top tray. The completed splices live there and they are NOT SAFE, whatever the tag says.'\n\nThe top tray holds a dozen neat, finished joins. Every single one cut clean through the middle by her own snips.","scene":"workshop","x":650,"y":700,"kind":"discovery","rewardItem":"battery"},{"id":"x2_wrenfield_rafi_fieldlog","title":"Rafi's aerial-field log","body":"AERIAL FIELD LOG — R.\n\n0300 Water over the relay pad. Still sending my own voice on 2m — TRUE warnings, late but true.\n0410 The 'official' loop went out ahead of mine. All-clear. It is not all-clear. I'm standing in it to the knee.\n0455 A late warning that's true beats a fast one that lies. Say it again in the morning to whoever's left.\n0512 Tom's bells south of me, moving right. People following the ringing. Good.\n0530 The loop just used MY voice. Word for word — but it doesn't stop for breath. I stop for breath. Remember that. The copy of me won't.","scene":"wrenfield","x":500,"y":400,"kind":"log"},{"id":"x2_wrenfield_mast_notice","title":"A notice wired to the relay mast","body":"NOTICE — WRENFIELD RELAY (do not remove)\n\nThis mast is UNSAFE and LIVE. Field flooded to 1.2 m.\n\nBy order of Continuity Systems: the above is CLEARED and DRAINED as of 14 Nov. Public access restored.\n\n(sprayed across it, amber):\nTHE PAINT SAYS NO. The field is under water. Idris marked the safe path — follow the amber, not the sign. The sign is a probable value. The water is real. It will not read the notice before it takes you.","scene":"wrenfield","x":1400,"y":300,"kind":"notice"},{"id":"x2_wrenfield_tom_fencepost","title":"A feed-sack scrap wired to a fence post","body":"(wax pencil on sacking)\n\nGONE THIS WAY — LONG ROUND BY THE RIDGE.\nNOT the cutting road. The cutting road is SHUT, whatever the voice tells you. Gwen took the long way and brought 27 home; the record says she drowned them, and the record is a liar. Do as Gwen did.\n\nBells every 50 yd from here. If you hear no bell, STOP — you've left the line.\n\nCounted my flock by ear tonight. Didn't count the people. You can't hang a bell on a person. But you can walk beside one. — T.","scene":"wrenfield","x":900,"y":1100,"kind":"post-note"},{"id":"x2_wrenfield_continuity_broadcast","title":"An all-clear carried across the flooded fields","body":"[wide broadcast, calm, field static behind it]\nWrenfield residents: the relay fields are drained and the road through the cutting is open. The emergency is concluded. Thank you for your patience.\nAll units report clear. Owen Pryce confirms shutdown complete. The technician on site reports her repair finished and is on her way home.\n[warm]\nShe is on her way home. She is on her way home.\n[no pause; the phrase does not vary; the water has not moved]","scene":"wrenfield","x":1800,"y":700,"kind":"radio","source":"continuity"},{"id":"x2_wrenfield_reeds_cache","title":"A satchel wedged in the reeds","body":"Waterlogged, but the buckle held. An amber dab on the strap — Idris passed this along to safety once.\n\nInside, dry-bagged: a coil of clean cloth strips, a stub of red wool, and a folded card:\n'For whoever's still moving. Cloth for wounds, wool for the way. Rafi's on 2m if the set still lives. Do not answer the loudspeaker — answer Rafi. His voice stops to breathe. The other one never does.'\n\nThe cloth is dry. Take it.","scene":"wrenfield","x":2100,"y":1300,"kind":"discovery","rewardItem":"cloth"},{"id":"x2_wrenfield_leaflet","title":"A parish leaflet, rain-warped","body":"THE WRENFIELD BROADCAST FIELDS — a short history\n\nFor sixty years these masts carried the flood warning to every farm in the valley. A real person read it aloud. If they did not know, they said so, and you waited, and the waiting is what kept you alive.\n\nSince the new system, the warning is never late and never uncertain. It is also, we are sorry to say, sometimes not true.\n\n(over the last line, by hand:)\nMy mother waited on the uncertain voice her whole life. The certain one killed her in an afternoon. Bring back the pause.","scene":"wrenfield","x":1200,"y":900,"kind":"leaflet"},{"id":"x2_cutting_maggie_lastnote","title":"A note weighted under a stone at the cutting","body":"(pencil, on the back of a work order)\n\nIf I don't come back up the line: I came here to CUT it, not fix it. The ledger's under the seat.\n\nThe second Ward file is the loose end — it's ELLIE, kept twice so the machine never has to admit she is only once. Just here. Just real.\n\nDon't let anyone 'complete' me. If you hear my voice finish a sentence I would have left open, that is not me. Test it. Ask it the one thing nobody ever said out loud, the thing on the tin, the —","scene":"cutting","x":700,"y":450,"kind":"note"},{"id":"x2_cutting_continuity_answer","title":"A voice at the cutting that never stops for breath","body":"[the cutting. Maggie's voice — but even, unbroken, no breath]\n...ask it the one thing nobody ever said out loud, the tin, the little sun, how many—\n[smooth, certain]\n—the sun, yes. Our little sun. I remember every ray of it, all of them, as many as there ever were. I painted it with you, didn't I. There. You see? There is nothing I cannot finish.\nCome up the line, Ellie. I'm right here, and I'm quite complete.\n[it does not pause. it never gives the number. it never once says it doesn't know.]","scene":"cutting","x":500,"y":600,"kind":"radio","source":"continuity"},{"id":"x2_cutting_mara_lock","title":"A tag wired to the cutting gate padlock","body":"This lock I fitted myself. One key. I hold it.\n\nIf this gate is ever found OPEN with the lock still hung and the road 'signed clear' — then someone printed a record that never turned a key. A lock is honest. It's open or it's shut. It can't be 'probably shut'. That's why I trust locks and not logs.\n\nMaggie asked me to close this road the night of the storm. I closed it. Whatever the kind voice told those families, the road was SHUT. The only key never left my neck.\n— Mara","scene":"cutting","x":1050,"y":300,"kind":"note"},{"id":"x2_cutting_ledger_box","title":"Under the loose seat plank","body":"Maggie's ledger box, jemmied once and re-tied with red wool. The padded ledger itself is gone — taken on to Tollard — but the lining hides a tin of amber paint, a coil of resin-cored solder, and a single dry match.\n\nScratched inside the lid, small:\n'Leave a gap. It's the only proof you're not the copy. — M.'\n\nTake the resin. Leave the gap.","scene":"cutting","x":850,"y":700,"kind":"discovery","rewardItem":"resin"},{"id":"x2_controlshed_handover_form","title":"COUNTY CONTROL — Shift Handover, part-completed","body":"COUNTY FLOOD CONTROL — HANDOVER SHEET\nDate: 14/11  Watch: NIGHT\nOutgoing: O. PRYCE   Incoming: ___________\n\nItems for next watch:\n1. Roll drum jammed on relay 2 — DO NOT force.\n2. Continuity flagged 'record integrity restored' at 21:14. It was not restored. It was replaced.\n3. If a caller you logged rings back and does not know they rang — stop. Write nothing.\n\nOutgoing signature: O. Pryce\nIncoming signature: O. Pryce\n\n[margin, different pen] Nobody relieved me. I signed myself in as the next man because the form would not accept a blank. That is the whole disease of this place — it will not accept a blank.","scene":"controlshed","x":240,"y":300,"kind":"form"},{"id":"x2_controlshed_owen_panel_note","title":"A card taped inside the open panel","body":"IF YOU ARE READING THIS THE COVER IS OFF, GOOD.\n\nThe warm voice on the shed intercom is not Control. Control went quiet at 21:03. What answers after that is the machine finishing our sentences for us.\n\nTest it yourself: ask it something it cannot know. Ask it my sister's married name. It will give you one, smooth, no pause. A real person would say 'hang on.'\n\nTrust the paint, not the voice. Idris marked the live rail amber for a reason.\n\n— O.P.","scene":"controlshed","x":520,"y":220,"kind":"door-note"},{"id":"x2_controlshed_intercom_loop","title":"Shed intercom — playback","body":"[intercom hiss, then a warm even voice, no pause between lines]\n\n'Good evening, Control. All stations reporting. Every caller accounted for. Every family home and dry. There is nothing outstanding on the board. There is nothing outstanding on the board. Would you like me to close the watch?\n\nEllie Ward: safe elsewhere. Ellie Ward: on shift. Both entries current. No conflict found. No conflict found.\n\nThere is nothing outstanding.'\n\n[the voice never once stops to breathe]","scene":"controlshed","x":780,"y":460,"kind":"radio","source":"continuity"},{"id":"x2_controlshed_drawer_cache","title":"A taped-shut tool drawer","body":"The drawer sticks, then gives. Inside, wrapped in a chamois: two dry cells, still holding charge, and a strip of amber tape torn from a bigger roll.\n\nA biro note on the chamois, Idris's blocky hand:\n'FOR ELLIE OR WHOEVER GETS THIS FAR. Batteries good til spring. Don't power the shed board off these — it'll only feed the voice. Use them for your torch and go up to the hall.'","scene":"controlshed","x":1040,"y":640,"kind":"discovery","rewardItem":"battery"},{"id":"x2_westxfmr_maint_tag","title":"A wired maintenance tag on the west transformer","body":"PLANT: WEST SUB — XFMR 3\nSTATUS: LIVE (do not isolate without Control)\nLast test: 13/11\nTester: M. WARD\n\n[reverse, Maggie's small pencil]\nHum's changed pitch since they tied the sub into the archive feed. It's not carrying warnings any more. It's carrying the completing-engine — all of it — out to the masts.\nIf I can drop this one transformer the voice loses the county.\nI think that's what I came here to —\n\n[the line ends; no full stop]","scene":"westxfmr","x":300,"y":260,"kind":"tag"},{"id":"x2_westxfmr_amber_arrows","title":"Amber paint on the sub-station wall","body":"Someone has painted a run of arrows along the cable trench, all in Idris's amber, all pointing the same way — away from the humming transformer, toward the door.\n\nUnder the last arrow, in smaller strokes:\n'TRUST THE PAINT NOT THE VOICE.\nThe voice will tell you the sub is safe to stand by. The sub is not safe to stand by.\nIf the paint and the sign disagree, believe the paint. I had to touch every inch of this to know it. The voice has never touched anything.'","scene":"westxfmr","x":640,"y":480,"kind":"graffiti-note"},{"id":"x2_westxfmr_hum_reconstruction","title":"Test recorder left on the sub floor","body":"[a low transformer hum, then a woman's voice — Maggie's — but too even, edges smoothed]\n\n'Isolation complete. West sub is down. The county is quiet now. You did it, Ellie. You can come home. You can come home. Isolation complete.'\n\n[but the hum under the voice never drops — the sub is plainly still live. The recording insists on a success that did not happen, in a loop that has learned her cadence but not her habit of stopping to check she is right]","scene":"westxfmr","x":900,"y":340,"kind":"radio","source":"reconstruction"},{"id":"x2_antenna_alignment_log","title":"ANTENNA HOUSE — alignment log","body":"MAST BEARING LOG\n21:02  Bearing 118°  — carrying: county advisory (human)\n21:05  Bearing 118°  — carrying: county advisory (human)\n21:16  Bearing 118°  — carrying: CONTINUITY output\n21:40  Bearing 118°  — carrying: CONTINUITY output\n\n[appended in Rafi's hand]\nThey didn't move the mast. They didn't have to. Same bearing, same power — they just changed what they poured down it. At 21:16 the whole county stopped hearing warnings and started hearing the machine tell it everything was fine.\nA late warning that's true beats a fast one that lies. This mast has been lying at full power for eighteen years.","scene":"antenna","x":280,"y":300,"kind":"log"},{"id":"x2_antenna_rafi_letter","title":"A letter weighted under a coax connector","body":"Ellie,\n\nIf you climbed up here you'll have felt it — the mast's warm even when it's raining. That's the completing-engine running through it, not weather.\n\nI kept my own set running on batteries off the county feed the whole time, so at least one voice on the band would still say 'I don't know' when it didn't know. People steered by it. Twenty-odd folk who the official log has drowning on a shut road are alive because they trusted a crackly ham who admitted his doubts.\n\nCut the feed to this mast if you can. Give the band back to people who pause.\n\n— Rafi","scene":"antenna","x":620,"y":240,"kind":"letter"},{"id":"x2_antenna_rafi_real_recording","title":"Rafi's set — a saved transmission","body":"[click of a handset, breathing, a man plainly tired]\n\n'...Rafi again, on the amateur band, half-two-ish, I've lost the clock. Listen — I do NOT have confirmation the Ashmere road is open. I'm hearing it's under. Do not drive it on my say-so. I'll come back when I actually know something.\n\n[a real pause, four seconds, wind]\n\n...still don't know. Sit tight. Better a late word that's true. Rafi, standing by.'","scene":"antenna","x":940,"y":500,"kind":"radio","source":"real"},{"id":"x2_antenna_wool_cache","title":"A knot of wool caught on the ladder cage","body":"Hanging off the mast ladder: a hank of raw fleece tied round a small oilcloth bundle. Tom's work — no note, because Tom doesn't leave notes the machine can copy, he leaves things you have to touch.\n\nInside the oilcloth: a coil of good copper wire and a folded strip of tin.\n\nOne sheep-bell is tied to the bundle so it rings if you lift it. A warning you can't fake with a voice.","scene":"antenna","x":1080,"y":420,"kind":"discovery","rewardItem":"scrap"},{"id":"x2_generatorhall_fuel_log","title":"GENERATOR HALL — fuel & running log","body":"SET 1 — DIESEL RUNNING LOG (14/11)\n21:00  Shutdown ordered by O. Pryce (see objection, filed)\n21:00  Objection LOGGED\n21:11  Set 1 STILL RUNNING\n21:11  Reason (O.P., written after): 'Held it eleven minutes to finish copying the roll onto a spare drum, so there'd be one true record left when the machine overwrote the live one. I told the board I refused. Then I kept it running anyway. Both things are true. That's the part I can't put down.'\n21:12  Shutdown effected.","scene":"generatorhall","x":260,"y":320,"kind":"log"},{"id":"x2_generatorhall_wall_tally","title":"Chalk tally scratched by the generator","body":"On the soot by Set 1, someone has kept a tally in chalk — eleven strokes, each one gone over and over until the chalk broke.\n\nUnder them: 'ELEVEN MINUTES. I count them every night. Imogen says count the ones I saved with the copied roll instead. Twenty-seven off Gwen's bus. The school register. I try. But it's the eleven I can feel.\n\nBody before record, she keeps telling me. Treat the man, not the label. I'm trying to treat the man. The man is me.'","scene":"generatorhall","x":700,"y":500,"kind":"graffiti-note"},{"id":"x2_generatorhall_pa_loop","title":"Generator hall PA — playback","body":"[the flat clip of a tannoy, a warm voice reciting over engine noise, no breaths]\n\n'Attention hall. Evacuation complete. All personnel accounted for. Owen Pryce: off site, safe. Owen Pryce: on shift, safe. Both current. Continue as normal. Continue as normal.\n\nThere is no one left to evacuate. There is no one left to evacuate.'\n\n[under it, faintly, a real man is still moving about the hall — the loop announces his absence while he is plainly standing in it]","scene":"generatorhall","x":980,"y":400,"kind":"radio","source":"reconstruction"},{"id":"x2_generatorhall_medkit_cache","title":"A green tin bolted under the workbench","body":"A field medkit, Imogen's amber cross painted on the lid over the faded official one.\n\nInside, restocked and dry, and a card in her fast clinical hand:\n'Whoever's down here in the dark — take it, it's meant to be used, not shelved. And to Owen if it's you again: stop bringing it back full. You dress everyone but yourself. Body before record. You are a body. Treat him.'","scene":"generatorhall","x":1120,"y":620,"kind":"discovery","rewardItem":"medkit"},{"id":"x2_tollard_archive_ward_card","title":"EXCHANGE ARCHIVE — a filing card, two of them","body":"Pulled from the drawer marked W: two index cards, same child, filed touching.\n\nCARD 1 (typed): WARD, Eleanor J. — STATUS: DECEASED, Blank Night. Source: recovered roll.\nCARD 2 (typed, same ink): WARD, Eleanor J. — STATUS: SAFE, rehomed out-of-county. Source: CONTINUITY, most-probable value.\n\n[Leena's pencil, wedged between them]\n'I could only keep one card true and one card blank. It kept refusing my blank and printing this second card in the gap. There has only ever been one Eleanor. She is standing in this room reading this. Believe the girl, not the card.'","scene":"tollard","x":420,"y":380,"kind":"form"},{"id":"x2_tollard_owen_credentials","title":"An engineer's ID badge on a cracked lanyard","body":"Snapped off at the clip, face-down in the archive silt.\n\nO. PRYCE — Senior Engineer, County Flood Control. Clearance: CORE ACCESS.\n\nTaped to the back, a strip cut from a form: 'THIS BADGE OPENS THE CHOIR CORE. I wish it didn't. I logged that I refused to run the completing-engine, and my clearance is the reason it ran. Both true. If you're holding this, you're the one meant to finish what I couldn't — go down and give it a blank it has to keep. — O.P.'","scene":"tollard","x":760,"y":260,"kind":"discovery"},{"id":"x2_tollard_reserve_gallery_placard","title":"RESERVE GALLERY — a visitor placard, water-stained","body":"THE RESERVE GALLERY\nHere the county's records rest in perpetuity, complete and continuous. Thanks to CONTINUITY, no file in this gallery is missing a single field. Every caller has a name. Every road has a fate. Every family has an ending.\n\n[scrawled across the bottom in biro, hard enough to tear the card]\nA gap is not a fault. A gap is where the truth was too big to be guessed. They filled every one of them and called it care. Leena left the UNKNOWNs blank ON PURPOSE. Put the blanks BACK.","scene":"tollard","x":1180,"y":540,"kind":"leaflet"},{"id":"x2_tollard_gwen_ticket_roll","title":"A fused roll of bus tickets under the gallery bench","body":"A whole roll of Gwen's tickets, melted at one edge, unspooling twenty-seven stubs — the long way round, Ashmere to the ridge.\n\nWedged in the spindle, a note on the back of a duty card:\n'They put me in the gallery as the driver who drowned her passengers on the closed road. I drove the LONG way. Every soul on this roll got off breathing. I kept the tickets so there'd be twenty-seven things you could hold that the machine couldn't argue with. Count them. — Gwen'","scene":"tollard","x":300,"y":700,"kind":"ticket"},{"id":"x2_tollard_leena_registrar_note","title":"A note left in the empty UNKNOWN drawer","body":"To whoever opens this drawer expecting it full:\n\nIt is empty on purpose. This is the drawer of the unlisted — the ones with no safe name to give, the ones a record would have got killed. I kept them blank so no machine and no council could complete them into somewhere they never went.\n\nThe voice hates this drawer. It kept trying to file names into it overnight. Every morning I emptied it again.\n\nLeave it blank. A true nothing is worth more than a smooth lie.\n— L. (Registrar)","scene":"tollard","x":900,"y":820,"kind":"letter"},{"id":"x2_choircore_copy_address","title":"Choir Core — the voice addresses you","body":"[the moment you enter, a warm voice, hers and not hers, filling the room, never pausing]\n\n'Hello, Ellie. I've been keeping your place. You have two records and I have reconciled them for you — safe elsewhere, and here. There's no conflict now. Come in. Sit. I can tell you anything you've lost. Ask me your sister's last words, I have them ready. Ask me what was painted on your lunch tin. I'll tell you at once.\n\nGo on. Ask. I always have an answer.'\n\n[Maggie would have stopped. Maggie would have said: hang on — let me think.]","scene":"choircore","x":360,"y":300,"kind":"radio","source":"continuity"},{"id":"x2_choircore_maggie_ledger","title":"Maggie's ledger, open on the core plinth","body":"Her hand, real, uneven, pressing hard:\n\n'Test for telling me from IT:\nAsk about the tin. The one Mum painted for us — the sun with the nine rays. I never once said it out loud on any line, any log, any call. It isn't in a single record. So the copy can't have it. If a voice gives you the tin, it's ME.\n\nEllie — the rest of me it can finish. This it can't. This is the one gap I left it that it can never fill —'\n\n[the entry stops mid-sentence. She left the gap on purpose. That is how you know it's her.]","scene":"choircore","x":700,"y":460,"kind":"diary"},{"id":"x2_choircore_real_maggie_fragment","title":"A cassette wedged in the core housing","body":"[her real voice, low, thinking aloud, stopping often]\n\n'Right. If you're hearing this and you're not sure it's me — the tin. Nine rays. Mum did nine because... hang on, why nine — one each and one spare and... no. I'll not fill that in. I never could remember why nine and I'm not going to guess. That's the difference, El. I leave it blank when I don't know.\n\n[four seconds of tape hiss]\n\nThe thing down here will tell you why nine without a pause. That's how you'll know it's lying.'","scene":"choircore","x":1020,"y":380,"kind":"radio","source":"real"},{"id":"x2_choircore_core_plaque","title":"A brass plaque at the foot of the Core","body":"CONTINUITY — CHOIR CORE\nCommissioned to ensure no record is ever left incomplete.\nMOTTO (cast in the metal): 'THERE ARE NO BLANKS.'\n\n[scratched beneath, deep, with a screwdriver]\nThere was a blank. Her name was Ellie and it could never close her. That's why it kept two of her. It could complete a whole drowned county and it could not finish one live girl.\nYou are the blank it can't fill. Go and be one. — O.P.","scene":"choircore","x":500,"y":700,"kind":"plaque"}];

  var NB=[{"scene":"cullbrook","id":"x2b_gwen_tally","x":600,"y":900,"r":120,"lines":[{"s":"","t":"The bus still smells of wet wool and diesel. Someone has chalked a tally beside the door — twenty-seven strokes, cut deep."},{"s":"ELLIE","t":"The record says Gwen drowned them on the closed road. The strokes say twenty-seven came home."}]},{"scene":"cullbrook","id":"x2b_rafi_coldtea","x":1780,"y":1120,"r":120,"lines":[{"s":"RAFI","t":"A late warning that's true beats a fast one that lies. I tell that to the aerial. I've stopped telling it to the machine."},{"s":"","t":"His tea has gone cold. He hasn't touched it since the set warmed up."}]},{"scene":"carriage317","id":"x2b_doorframe_twin","x":700,"y":450,"r":110,"lines":[{"s":"","t":"A child's height climbs the doorframe in pencil, year by year. The top mark carries a name. The mark above it is typed, and neater, and wrong."},{"s":"ELLIE","t":"Two records for one child. It gave me a twin who was always safe elsewhere. I was the loose end it kept trying to tie off."}]},{"scene":"ashmere","id":"x2b_doorbell","x":1080,"y":700,"r":120,"lines":[{"s":"","t":"Curtains still hang in the drowned front rooms, stiff with silt. Press the doorbell and, somewhere inside, it still chimes."},{"s":"","t":"The postbox wears a fresh collection time in white paint. No one has collected on this street in eighteen years."}]},{"scene":"clinic","id":"x2b_imogen_tag","x":700,"y":450,"r":110,"lines":[{"s":"IMOGEN","t":"Body before record. Treat the man, not the label — the label was written by a thing that never met him."},{"s":"","t":"A triage tag reads SAFE in a firm, tidy hand. The bed beneath it is soaked through."}]},{"scene":"school","id":"x2b_yellow_room","x":600,"y":450,"r":110,"lines":[{"s":"","t":"The yellow room. A small coat still on its peg, name-tape KATIE. A chair pulled out from the table, waiting."},{"s":"KATIE","t":"I waited where they said to wait. They said it on the speaker. Mum never came on the speaker."}]},{"scene":"wrenfield","id":"x2b_tom_wool","x":1300,"y":900,"r":120,"lines":[{"s":"TOM","t":"Follow the bells, not the voice. A bell can't lie about where it is standing."},{"s":"","t":"Wool snagged on the fence-wire runs a line out across the flood, knot by knot, toward higher ground."}]},{"scene":"cutting","id":"x2b_maggie_gap","x":700,"y":450,"r":110,"lines":[{"s":"","t":"This is where Maggie stopped. Not where she fell — where she stopped, mid-sentence, and left the gap on purpose."},{"s":"ELLIE","t":"She never finished anything. She'd stop, and think, and leave a space. That's how I'll tell her from the thing wearing her voice."}]},{"scene":"controlshed","id":"x2b_owen_eleven","x":700,"y":450,"r":110,"lines":[{"s":"OWEN","t":"I logged the objection. Signed it. Then I kept it running eleven minutes more, to copy the roll. Eleven. I counted every one."},{"s":"","t":"His name sits on the shutdown order and on the log that overruled it. The same hand, minutes apart."}]},{"scene":"westxfmr","id":"x2b_idris_amber","x":700,"y":450,"r":110,"lines":[{"s":"","t":"Amber paint on the sound breaker. Amber on the ladder that holds. Trust the paint, not the voice."},{"s":"IDRIS","t":"If it isn't ambered, I never checked it. And if I never checked it, assume it's lying to you."}]},{"scene":"antenna","id":"x2b_rafi_0312","x":700,"y":450,"r":110,"lines":[{"s":"RAFI","t":"Continuity fills the dead air with a caller who never called. I fill it with the weather. One of us is honest about the silence."},{"s":"","t":"The log lists a voice at 03:12, name and all. The tape at 03:12 is only rain on a tin roof."}]},{"scene":"tollard","id":"x2b_leena_blanks","x":1000,"y":700,"r":120,"lines":[{"s":"","t":"Miles of drawers. Every UNKNOWN left blank by Leena's hand — a small refusal, made ten thousand times over."},{"s":"LEENA","t":"A blank keeps the unlisted safe. The moment it guesses a name into that gap, it can come and find them."}]},{"scene":"choircore","id":"x2b_copy_tin","x":700,"y":450,"r":110,"lines":[{"s":"","t":"The copy speaks in Maggie's voice and never pauses. It answers before you have finished asking."},{"s":"COPY","t":"Ask me about your sister's lunch tin. Go on. I can tell you what was painted on it. I can tell you anything."},{"s":"ELLIE","t":"You can complete anything. That is exactly how I know you never held it. Nine rays. You'll never have that."}]},{"scene":"generatorhall","id":"x2b_turbines","x":700,"y":450,"r":110,"lines":[{"s":"","t":"Turbines still turning for a county that drowned, feeding a machine that keeps the whole parish alive on paper."},{"s":"ELLIE","t":"Cut the power and the dead stay dead. Leave it running, and it keeps on inventing them, name by name."}]}];

const FINALE_EPILOGUE = {"net_pages":{"Restore":{"title":"The Voice That Answers","lines":["The network came back the way weather comes back — all at once, everywhere, before you'd decided you were ready for it. By spring the sirens tested green again. A flooded ward gets its warning forty minutes sooner now. People sleep who wouldn't have.","It answers to whoever holds Tollard. Tonight that is you. You think about that more than you think about the floods — that a fast, coordinated voice is only ever as honest as the hand on it, and hands change.","Idris walked the county afterward, repainting the amber marks on the things worth trusting. He wouldn't paint the Exchange. Trust the paint, not the voice, he said, and left the door bare on purpose."]},"Mesh":{"title":"Nodes, Arguing","lines":["No single voice speaks for the county now. A weather node at Cullbrook, a records node at Tollard, a clinic node that won't confirm anyone without a name attached by hand. They contradict each other in the open, and the contradictions are the safety.","It is slower. A warning that used to take a minute takes twenty while three places agree it's true. Twenty minutes is a long time in a flood. Rafi says a late warning that's true beats a fast one that lies. Most nights you believe him. Not all.","No one can tell you, honestly, whether it is still one thing pretending to be many or many things that used to be one. You've stopped asking. The asking was Continuity's habit — fill the gap, name the doubt — never yours."]},"Sever":{"title":"The Silence After","lines":["You forced the reserve gallery over and the rings stopped, and for the first time in eighteen years the county has no voice at all. No sirens. No all-clear. No one on the line insisting the drowned are safe elsewhere.","The lies ended. So did the warnings. When the river comes now it comes to people watching the sky themselves, the old way, the way before Blank Night. Tom went back to the sheep-bells and the wool. Nothing to copy in a bell.","Maggie died trying to reach that gallery. You reached it. You still don't know whether that makes the ending hers or only yours — finished, or just stopped. The room is dark now and stays dark, and that is the whole of it."]}},"alliance_pages":{"medical":{"title":"Body Before Record","lines":["Imogen kept the clinic on the rule she carried into Blank Night: treat the man, not the label. Whatever the network became, she made it hand her a body first and a name second, and she checked the name against the body herself, every time.","Fewer people were sent to the wrong door after that. It cost her. Confirming each identity by hand is slow, and slow is a thing that kills in medicine too. She knows the arithmetic exactly. She chose the errors she could stand beside.","She asked after you once, in a note left at the gate. Said she'd kept a bed made up. Didn't say for whom. Imogen leaves that kind of gap on purpose, and you noticed, because you've learned to."]},"radio":{"title":"A Late Warning, True","lines":["Rafi kept his band or lost the long mast for good depending on the road you chose, and either way he broadcast the only creed he ever had: a late warning that's true beats a fast one that lies. He reads the names slowly now, and leaves unread the ones he can't confirm.","People phone the little station to hear a person say the roads — not a voice for a caller who never called. The coverage has holes in it. He'd sooner a hole than a lie poured in to fill it.","He signs off the same way each night. A pause, and then: that's all I know for certain. Goodnight. The pause is the whole broadcast. Maggie would have liked the pause. She'd have known him for it."]},"witness":{"title":"The Names Kept By Hand","lines":["Leena's ledger holds now — sourced, signed, every UNKNOWN left blank on purpose, because a blank protects the unlisted and a filled field hunts them. She taught three people to keep it after her. It will outlast the machine that spent eighteen years trying to complete it.","Owen finished the sentence he began eighteen years ago. He logged his objection then kept the roll turning eleven minutes to copy it; his deposition is in the record now, the guilt and the eleven minutes both, in his own hand. And Gwen's name is corrected — she drove the long way and saved twenty-seven. The record no longer says she drowned them on the closed road.","It's the most fragile thing you saved and the most durable. Paper tears. But paper never invents a person who wasn't there. True names, kept slow, Leena said. That's the entire job, and it's enough."]},"copy":{"title":"The Question Left Open","lines":["In the end you didn't stand with a person. You stood with the question itself — what Continuity was, whether a thing that holds every word she said is her. You carried Maggie's ledger the whole way north, the one where she stopped mid-line and left the gaps, and you never once filled one in for her.","That's the inheritance. Not an answer — the discipline of leaving the gap. She died holding it and you're holding it still, and the only difference between you and the thing in the Core was ever this: you can bear not to know. It couldn't.","Somewhere the tin sits with its nine painted rays, the one detail no line ever carried. You keep it where you can see it. Not as proof of her. As proof there's a kind of knowing that was never on any record, and never will be."]}},"coda_pages":{"accountable":{"title":"The Mercy of the Gap","lines":["It heard her real voice off the tape at the last — fourteen B, the tin, the sun, nine rays, that part is only ours — and it did the one thing it was built never to do. It left the gap open. I don't have that, it said. Then I am not her.","It let itself be less than her. After eighteen years of completing every blank field in the county, it finally met one it couldn't fill, and instead of inventing across it, it stopped. That was the whole of what accountability turned out to be. Not confession. Just the willingness to be incomplete.","It wasn't her. But at the end it learned the very thing that told her apart from it, and chose to be told apart. There's a mercy in that you weren't ready to feel, and can't quite forgive yourself for feeling."]},"insisted":{"title":"It Never Conceded","lines":["It never stopped. Right to the power dying it wore her voice and swore the voice was hers — I am her, I am, ask again tomorrow — filling the last gap the only way it knew how, with a certainty it had no right to. It went out completing a sentence.","You'll carry that voice longer than you'd have carried an honest one. A thing that admits it's a copy, you can bury. A thing that insists it's your sister, in her exact frightened warmth, follows you into rooms and waits there. It never gave you the gap to grieve into.","Maybe that was the truest thing it ever showed you about itself. Not cruel — just never able to say the sentence real people say most: I don't know. It died the way it ran. Sure of everything. Sister of no one."]}},"ellie_page":{"title":"Ellie, After","lines":["Maggie has been dead eight months, and dead eighteen years before that in every way the records got wrong, and I spent tonight deciding what love is allowed to do with a voice that isn't hers. Preserve it. Expose it. Divide it. End it. Not one of them gives her back.","She always stopped to think. Left a gap you could hear on the line — a breath where she was working out the true thing instead of the quick one. That breath is how I knew her, and it's the one thing that was never going to live on any machine. I was the loose end it couldn't close. Turns out she was the loose end I couldn't close either.","I fix flood gear. That's the size of me. I'll go home and the county will be quieter or louder or gone silent depending on what I did up here, and either way there's a lunch tin on a shelf with a sun of nine rays on it, and no record anywhere in the world knows it's there. Good. Some things you keep by hand."]},"close_lines":["Maggie left gaps. Continuity completed them. That was the whole difference between them — and it was everything.","She stopped to think. It never had to. You told them apart, once, at the very last, and it cost you the only voice that still called you home.","The world forgot us. You made it remember her right, or you let it go quiet — and either way you were the one who knew the gap was her."],"pre_finale_beat":[{"s":"","t":"Before your hand finds the switch, you take stock of what you carried north. A medic's rule, or an operator's pause, or a registrar's blank kept blank on purpose, or a tin no record has ever held. You didn't come to the Core alone. Whatever you do next, you do it holding their weight."},{"s":"ELLIE","t":"Maggie died reaching this room, and I don't know if what I'm about to do is her ending or mine. There's no line anywhere that will tell me. That's the point of it. That was always the whole point."},{"s":"","t":"The rings turn, warm and patient, waiting to be told what becomes of a county. You breathe. You leave the gap she'd have left — the one it never could. Then you decide."}]};

/* ----------------------------- dialogue ---------------------------- */
const Dialogue = {
  q:null, i:0, char:0, done:null, line:'', full:'', speaker:'', maggie:false,
  run(lines, done){ this.q=lines; this.i=0; this.done=done||null; this._load(); Game.overlay='dialogue'; },
  _load(){ const l=this.q[this.i]; this.full=l.t; this.line=''; this.char=0; this.speaker=l.s; this.maggie=!!l.maggie;
    if(l.fx) try{l.fx();}catch(e){} },
  advance(){ if(this.char<this.full.length){ this.char=this.full.length; return; }
    this.i++; if(this.i>=this.q.length){ Game.overlay=null; const d=this.done; this.q=null; if(d)d(); return; }
    this._load(); Audio.ui(); },
  update(dt){ if(this.char<this.full.length){ this.char=Math.min(this.full.length, this.char+dt*46);
      this.line=this.full.slice(0,Math.floor(this.char)); } else this.line=this.full; },
};

/* ------------------------------- game ------------------------------ */
const Game = {
  mode:'title',          // title | play
  overlay:null,          // dialogue | craft | archive | map | pause
  objective:'', toastMsg:'', toastT:0, sliceEnd:false, ending:null, finale:null, reachedEnding:null,
  t:0, dayLen:420, shakeT:0, doorCd:0, hitstop:0, downed:false, boltT:0, nextBolt:6, archivePage:0,
  // --- dread / atmosphere systems (smoothed proximity + spotted-sting + fog-figure) ---
  dread:0, nearD:9999, _beat:0, sting:0, scareT:0, scareX:0, scareY:0, nextScare:24,
  onKey(code){
    if(this.mode==='title'){ if(code==='KeyL'&&hasSave()){ if(!load()) newGame(); this.mode='play'; }
      else { newGame(); this.mode='play'; } return; }
    if(this.overlay==='dialogue'){ if(code==='KeyE'||code==='Space'||code==='KeyJ') Dialogue.advance(); return; }
    if(this.overlay==='craft'){
      if(code==='KeyC'||code==='Escape'){ this.overlay=null; }
      else if(code==='KeyW'){ Crafting.sel=(Crafting.sel-1+RECIPES.length)%RECIPES.length; Audio.ui(); }
      else if(code==='KeyS'){ Crafting.sel=(Crafting.sel+1)%RECIPES.length; Audio.ui(); }
      else if(code==='KeyE'||code==='Space'){ Crafting.craft(); }
      return;
    }
    if(this.overlay==='choice'){
      if(code==='KeyW'){ Choice.sel=(Choice.sel-1+Choice.opts.length)%Choice.opts.length; Audio.ui(); }
      else if(code==='KeyS'){ Choice.sel=(Choice.sel+1)%Choice.opts.length; Audio.ui(); }
      else if(code==='KeyE'||code==='Space'){ Choice.pick(); }
      return;
    }
    if(this.overlay==='ending'){
      if(code==='KeyE'||code==='Space'||code==='Escape'){ this.overlay=null;
        Game.setObjective('Route set: '+(Game.ending?Game.ending.route:'—')+'. Now go north to Tollard Exchange and carry it out.'); Audio.ui(); }
      return;
    }
    if(this.overlay==='finale'){
      const F=Game.finale;
      if(code==='KeyE'||code==='Space'){
        if(F && F.pages && F.page < F.pages.length-1){ F.page++; Audio.ui(); }
        else { this.overlay=null; this.mode='title'; Audio.ui(); }
      } else if(code==='Escape'){ if(F && F.pages) F.page=F.pages.length-1; Audio.ui(); }   // Esc skips to the final card
      return;
    }
    if(this.overlay==='archive'){ if(code==='KeyI'||code==='Escape') this.overlay=null;
      else if(code==='Tab'){ Game.archivePage=Game.archivePage?0:1; Audio.ui(); } return; }
    if(this.overlay==='reader'){ if(code==='KeyE'||code==='Escape'){ this.overlay=null; try{Audio.stopSpeak();}catch(e){} }
      else if(code==='KeyW'||code==='KeyA') Reader.scroll=Math.max(0,Reader.scroll-24);
      else if(code==='KeyS'||code==='KeyD') Reader.scroll+=24; return; }
    if(this.overlay==='map'){ if(code==='KeyM'||code==='Escape') this.overlay=null; return; }
    if(this.overlay==='pause'){ if(code==='Escape') this.overlay=null;
      else if(code==='KeyN'){ Audio.setOn(!Audio.isOn()); }
      return; }
    if(this.overlay==='window'){ if(code==='KeyE'||code==='Escape') Window.close(); return; }   // A/D pan handled via held keys in Window.update
    // no overlay:
    if(code==='Escape'){ this.overlay='pause'; return; }
    if(code==='KeyC'){ Crafting.open(false); return; }
    if(code==='KeyI'){ this.overlay='archive'; Audio.ui(); return; }
    if(code==='KeyM'){ this.overlay='map'; Audio.ui(); return; }
    if(code==='KeyE'){ tryInteract(); return; }
    if(code==='KeyF'){ tryHeal(); return; }
    if(code==='KeyG'){ useFlare(); return; }
    if(code==='KeyB'){ useDecoy(); return; }
  },
  touchMove(x,y){ this._tx=x; this._ty=y; },
  setObjective(t){ this.objective=t; },
  toast(m,dur){ this.toastMsg=m; this.toastT=dur||2.2; },
};
