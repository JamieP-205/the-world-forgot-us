name: Build and deploy Godot Web

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

env:
  GODOT_TEMPLATE_VERSION: "4.7.stable"
  GODOT_EDITOR_ARCHIVE: "Godot_v4.7-stable_linux.x86_64.zip"
  GODOT_EDITOR_URL: "https://github.com/godotengine/godot-builds/releases/download/4.7-stable/Godot_v4.7-stable_linux.x86_64.zip"
  GODOT_TEMPLATES_URL: "https://github.com/godotengine/godot-builds/releases/download/4.7-stable/Godot_v4.7-stable_export_templates.tpz"
  GODOT_CHECKSUMS_URL: "https://github.com/godotengine/godot-builds/releases/download/4.7-stable/SHA512-SUMS.txt"

jobs:
  build:
    name: Export Web build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out source
        uses: actions/checkout@v7

      - name: Verify generated normal maps
        shell: bash
        run: |
          set -euo pipefail

          python3 -m pip install --disable-pip-version-check --no-input --quiet "numpy==2.5.1" "Pillow==12.3.0"
          python3 tools/generate_normal_maps.py --check

      - name: Install Godot 4.7 editor
        shell: bash
        run: |
          set -euo pipefail

          install_dir="$RUNNER_TEMP/godot"
          archive="$RUNNER_TEMP/$GODOT_EDITOR_ARCHIVE"
          checksums="$RUNNER_TEMP/SHA512-SUMS.txt"
          mkdir -p "$install_dir"

          curl --fail --location --silent --show-error --retry 5 --retry-all-errors --retry-delay 2 "$GODOT_EDITOR_URL" --output "$archive"
          curl --fail --location --silent --show-error --retry 5 --retry-all-errors --retry-delay 2 "$GODOT_CHECKSUMS_URL" --output "$checksums"

          expected_line="$(awk -v file="$GODOT_EDITOR_ARCHIVE" '$2 == file { print; exit }' "$checksums")"
          test -n "$expected_line"
          printf '%s\n' "$expected_line" | (cd "$RUNNER_TEMP" && sha512sum --check --strict -)

          unzip -q "$archive" -d "$install_dir"
          godot_bin="$(find "$install_dir" -type f -name 'Godot_v4.7-stable_linux.x86_64' -print -quit)"
          test -n "$godot_bin"
          chmod +x "$godot_bin"
          echo "GODOT_BIN=$godot_bin" >> "$GITHUB_ENV"

      - name: Install single-threaded Web template
        shell: bash
        run: |
          set -euo pipefail

          template_dir="$HOME/.local/share/godot/export_templates/$GODOT_TEMPLATE_VERSION"
          python3 web/install_godot_web_template.py --archive-url "$GODOT_TEMPLATES_URL" --output-dir "$template_dir" --template web_nothreads_debug.zip --template web_nothreads_release.zip

          test -s "$template_dir/web_nothreads_debug.zip"
          test -s "$template_dir/web_nothreads_release.zip"

      - name: Import project resources
        shell: bash
        run: |
          set -euo pipefail

          import_log="$RUNNER_TEMP/godot-import.log"
          "$GODOT_BIN" --headless --path . --import 2>&1 | tee "$import_log"
          if grep -Eq 'SCRIPT ERROR:|ERROR:' "$import_log"; then
            echo "Godot reported an error while importing resources." >&2
            exit 1
          fi

      - name: Run game contracts
        shell: bash
        run: |
          set -euo pipefail

          contracts=(
            'audio_release_smoke.tscn|AUDIO RELEASE CONTRACT: PASS'
            'crafting_smoke.tscn|CRAFTING_SMOKE: PASS'
            'crafting_progression_reachability.tscn|CRAFTING_PROGRESSION_REACHABILITY: PASS'
            'crafting_ui_effect_smoke.tscn|CRAFTING_UI_EFFECT_SMOKE: PASS'
            'narrative_route_smoke.tscn|NARRATIVE_ROUTE_SMOKE: PASS'
            'route_production_reachability.tscn|ROUTE_PRODUCTION_REACHABILITY: PASS'
            'npc_population_smoke.tscn|NPC_POPULATION_SMOKE: PASS'
            'npc_service_contract.tscn|NPC_SERVICE_CONTRACT: PASS'
            'trace_anchor_smoke.tscn|TRACE ANCHOR CONTRACT PASS'
            'animation_contract_smoke.tscn|ANIMATION CONTRACT PASS'
            'mobile_controls_smoke.tscn|MOBILE CONTROLS CONTRACT PASS'
            'railhome_base_smoke.tscn|RAILHOME_BASE_SMOKE: PASS'
            'map_flow_collision_smoke.tscn|MAP FLOW + COLLISION SMOKE: PASS'
            'interior_identity_smoke.tscn|INTERIOR IDENTITY CONTRACT: PASS'
            'secondary_ui_contract_smoke.tscn|SECONDARY_UI_CONTRACT: PASS'
            'complete_game_smoke.tscn|COMPLETE_GAME_SMOKE: PASS'
          )

          for contract in "${contracts[@]}"; do
            IFS='|' read -r scene marker <<< "$contract"
            name="${scene%.tscn}"
            data_dir="$RUNNER_TEMP/twfu-$name-data"
            log="$RUNNER_TEMP/$name.log"
            mkdir -p "$data_dir"

            XDG_DATA_HOME="$data_dir" "$GODOT_BIN" --headless --path . --scene "res://tools/$scene" 2>&1 | tee "$log"

            if grep -Eq 'SCRIPT ERROR:|ERROR:' "$log"; then
              echo "Godot reported an error during $scene." >&2
              exit 1
            fi
            if ! grep -Fq "$marker" "$log"; then
              echo "$scene did not report its pass marker." >&2
              exit 1
            fi
          done

      - name: Export release
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p builds/web
          export_log="$RUNNER_TEMP/godot-export.log"
          "$GODOT_BIN" --headless --path . --export-release "Web" "builds/web/index.html" 2>&1 | tee "$export_log"
          if grep -Eq 'SCRIPT ERROR:|ERROR:' "$export_log"; then
            echo "Godot reported an error while exporting the Web release." >&2
            exit 1
          fi

      - name: Verify Web artifact
        shell: bash
        run: |
          set -euo pipefail

          for artifact in index.html index.js index.wasm index.pck; do
            test -s "builds/web/$artifact"
          done

          if grep -Eq '\$GODOT_[A-Z_]+' builds/web/index.html; then
            echo "Godot shell placeholders were not expanded." >&2
            exit 1
          fi

          pck_bytes="$(stat -c '%s' builds/web/index.pck)"
          total_bytes="$(find builds/web -maxdepth 1 -type f -printf '%s\n' | awk '{ total += $1 } END { print total + 0 }')"
          max_pck_bytes=$((64 * 1024 * 1024))
          max_total_bytes=$((100 * 1024 * 1024))

          printf 'Web payload: %.2f MiB PCK / %.2f MiB total\n' \
            "$(awk -v bytes="$pck_bytes" 'BEGIN { print bytes / 1048576 }')" \
            "$(awk -v bytes="$total_bytes" 'BEGIN { print bytes / 1048576 }')"

          if (( pck_bytes > max_pck_bytes )); then
            echo "Web PCK exceeds the 64 MiB loading budget." >&2
            exit 1
          fi
          if (( total_bytes > max_total_bytes )); then
            echo "Web artifact exceeds the 100 MiB loading budget." >&2
            exit 1
          fi

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: builds/web

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v5
